body:
  text: 卷之七背奇病方云有人患背脊裂開一縫出蝨千餘此乃腎中有風得陽氣吹之故也不覺破裂蝨現即服活水止蝨丹三劑以減縫中之蝨再萆麻三粒紅棗三枚搗和為丸如彈子大置火薰衣使不盡之蝨俱死而縫自合矣萆麻子能殺蝨去風故用之相宜徐弦稽神録云浮梁李生肩起如盂惟癢不可忍人皆不識醫士秦德立云此蝨瘤也以藥敷之一夕瘤破出蝨鬥余即日體輕但小竅不合出蝨不止而死濟生方云有人患虛寒積癖在背膜之外流於兩脅氣逆喘急久則凝滯潰為癰疽多致不救用胡椒三百五十粒蠍尾四個生木香二錢半為末粟米飯丸緑豆大每服二十丸橘皮湯下名磨積丸袖珍方云有人患背腿間一點痛不可忍者此痰血也芫花根為末米醋調敷之如不住以帛束之婦人産後尤多朱丹溪治一男子忽患背胛縫有一線痛上肩跨至胸前側脅而上其病晝夜不歇痛不可忍脈弦而數重取豁大左大於右夫背胛小腸經也此必思慮傷心心臟未病而腑小腸先病故從背胛起又慮不能決又歸之於膽故痛至胸脅而止乃小腸火乘肝木子來乘母是為實邪詢止果因謀事不遂所致用人參四分木通二分煎湯吞龍膽丸數服而愈戴人治一男子年六十餘患腰尻脊胯皆痛數載不愈晝靜夜躁大痛往來屢求自盡日夕痛作必令人以手捶擊至四五更雞鳴則漸減向曙則病止左右及病者皆疑祟病朝禱暮祝如僧道禁師至則其痛似減又夢鬼神戰鬥山川神廟無不祭者淹延歲月肉瘦皮枯飲食減少暴怒日增惟候一死有書生曰既云祟病如此禱祈何無一應聞陳郡有張戴人精於醫可以請治其家請張戴人診其兩手脈皆沉滯堅徑曰病雖瘦難以食然腰尻脊胯皆痛者必大便堅硬其左右曰有五七日或八九日見燥糞一兩塊如彈丸大結硬不可言曾合人剜去之僅下一兩塊渾身燥癢皮膚皺揭枯澀如麩片戴人既得病人之虛實遂用大承氣湯以薑棗煎之加牽牛頭末二錢不敢言瀉劑蓋病者聞暖則悅聞寒則懼説補則從説瀉則忌此弊非一日也而況一齊人傳之衆楚人咻之乎及煎成使稍熱飲之從少至多服至三日臟腑下泄四五行約半碗以燈視之皆燥糞及瘀血雜至穢不可近須臾痛減九分昏睡鼻息調如常人睡至明日將夕始覺飢而索粥溫涼與之又困睡一二日其病盡去次令飲食調養日服導赤甘露滑利便溺之藥四十餘日乃康嗚呼世傳三十六虎書三十六黃經乃小兒三十六吊誰為之耶始作俑者其無後乎古人以醫為重故醫之道行今之人以醫為輕故醫之道廢學者自局於朮藝病者亦不擇精粗耳靈樞經云刺與汗雖久猶可拔而雪結與閉雖久猶可解而決夫腰脊胯痛者足太陽膀胱經也兩胯又足少陽膽經之所過也難經曰諸病為實內經曰諸痛瘍瘡皆屬心火注曰心寂則痛減心躁則痛甚病見僧道禁師至則病稍去者心寂也少頃仍復是耳古之稱痛隨利減不利則痛何由去故凡躁症皆三陽病也源按心寂則痛減心躁則痛甚此皆氣隨心役之道如僧道禁師至而痛稍減者所謂心寂是也蓋心寂則氣靜氣靜故病覺減也未幾心復躁而氣亦不寧故痛復如舊要知人身最靈者氣也如思食思色著哀著怒未有不隨心感發不但人身之中感發如是即人子而能時念父母亦能與父母之氣暗暗相感雖遠離亦能相應如曾子心痛黔婁心驚此氣之相應故也若父母在時及歿後無時不念則根本之氣不絶枝葉必茂否則氣已絶焉得善後即善亦終必敗孔聖云身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本傷其本枝從而亡所以人能敬其身即孝其親也孝其親者必好善好善則善氣臨外雖困必榮惡則惡氣外繞雖榮必敗人不知氣數之理乃天定氣數即善惡之氣定數並非別有數也孫東宿治周鳳亭孫女年六歲忽發寒熱一日過後腰脊中命門穴骨節腫一塊如大饅頭之狀高三四寸自此不能平身而立絶不能下地走動如此者半年人皆以為龜背痼疾莫能措治即如幼科將龜背古方治之亦不效孫曰此非龜背凡龜背在上令在下部必初年乳母放地坐早之故此時筋骨未堅坐久而背曲因受風邪初不覺其漸入骨節間而生痰涎致今骨節腫滿而大不急治之必成痼疾今起未久可用萬靈黑虎比天膏貼之外再以晚蠶沙醋洗炒熟絹片包定於膏上帶定尉之一夜一次再以威靈仙為君五加皮烏藥紅花防風獨活水煎服之一月而消其半骨節柔軟不復腫硬便能行走如初後三月復不能行問之足膝痠軟載身不起故不能行孫知其病去而下元虛也用杜仲晚蠶沙五加皮苡仁當歸人參牛膝獨活蒼耳仙茅水煎服二十劑行動如故又治查良本內眷怒後偶食魚頭骨梗於喉即以饅頭粽肉等壓之骨雖下便覺胸膈不快又服消骨藥兩日逮今乃七日矣胸膈脹痛殊甚飲食悉從背後而下惡寒發熱六脈弦數孫思骨梗之後用硬物壓之傷其胃脘必有瘀血停蓄膈間將食管逼在背後故飲食覺從背後而下也今但消去瘀血使食管復原胸膈之痛可瘳矣藥以五靈脂為君山楂元胡桃仁枳殼為臣赤芍藥牡丹皮香附山梔仁為佐柴胡石菖蒲為使水煎臨服入韭菜汁一酒杯飲之其夜胸膈寬快大便瀉一次痛減大半飲食乃從右邊而下右邊胸膈稍痛吞物甚艱痰出皆血腥氣改以山梔赤芍藥歸尾桃仁劉寄奴五靈脂牡丹皮穿山甲煎入韭汁服之兩帖全瘳又治一婦右背鹽匙骨邊一點疼痛夜尤其醫治半月不效輾轉加劇即以右邊手臂肢節皆脹痛筋皆暴起肌肉上生紅點脈兩手皆數右尺軟弱乃濕熱傷筋而成痛痹以東垣舒經湯為主羌活升麻桃仁麻黃紅花當歸防風甘草獨活豬苓黃柏防己知母黃連兩帖痛減腫消再亦不發金少遊治黃渟之室庚午秋娩身後腰胯痛痛久脊膂突出一骨一二寸許腹下季脅發一腫如拳大每抽挈亦痛遍身如刀剮不能行不能轉側每欲舒展則婦女八人舁之三吳醫者莫不就診無效辛未秋延少遊診其脈無他兼以飲食不廢謂之曰奇經八脈俱受病矣幸十二正經無恙中氣不虛可療渟問其故答曰蓋脊梁突督脈也季脅癰腫腹與胃痛衛任也兩足筋急不能屈伸陽蹺陰蹺也腰以下冷溶溶如坐水中帶之為病也初進龜鹿二仙膏二三兩煎劑以骨碎補續斷為君佐以溫經大養氣血之劑四服即緩繼以鹿茸河車自然銅骨碎補等劑丸服一半即能下床行動療此症不過兩月而愈愈而妊更屬意外其季脅近胯之瘤為庸工決破而死惜哉活水止蝨丹熟地黃山萸肉三兩杜仲一兩防己一錢豨蘞草三錢水煎服大承氣湯大黃芒硝厚朴枳實先煎朴實將大黃煮二三沸頃碗內和芒硝服得利則止導赤散生地木通甘草梢淡竹葉等分煎甘露飲生地熟地天冬麥冬石斛茵陳黃芩枳殼枇杷葉甘草等分每服五錢舒筋湯片薑黃一錢甘草炒羌活各三分白朮海桐皮赤芍當歸各五分上水煎服龜鹿二仙膏鹿角十斤龜板五斤枸杞二斤人參一斤先將鹿龜板鋸截刮淨水浸桑火熬煉成膠再將人參枸杞熬膏和入生肌散見頭門龍膽丸即龍膽瀉肝湯見溺孔門手足夏子益奇疾方云有人手足十指節斷壞惟有筋連無節肉蟲出如燈心長數寸遍身緑毛卷名曰血餘以茯苓胡黃連煎湯飲之自愈源按經云脾熱生肉痿肉痿者色黃而蠕動又云地之濕氣感則害皮肉關節注云濕自下受先入皮肉濕流關節則傷筋脈筋脈傷則肝亦受病此症由皮肉化蟲至十指斷壞無節肉而更感肝木之氣化生緑毛卷蟲又經所謂東方生木木生風在臟為肝其蟲毛蟲毛者森森之象故有是形耳而病名血餘因肝藏血所得肝之餘氣而生蟲毛故也然不生別色而獨生緑蓋脾屬土其色黃肝屬木其色青青黃二氣相感則生是色也茯苓補脾利濕胡黃連清肝木之熱使木平脾強則症自愈又云有人患四肢節脫但有皮連不能舉動名曰筋解用酒浸黃蘆三兩經一宿取出焙乾為末每服二錢酒調下服盡安源按此症四肢節脫但有皮連因四肢筋脈痿而不用故謂之筋解解者為筋脈解散不堪任用耳然痿有虛痿實痿劉河間曰四肢不舉俗曰癱緩故經所謂脾太過則令人四肢不舉又曰土太過則敦阜阜高也敦厚也既厚而又高則令除去此真所謂膏粱之疾其治則瀉令氣弱陽衰土平而愈或三化湯調胃承氣湯選而用之若脾虛則不用也經所謂土不及則脾陷卑下也陷坑也故脾病四肢不舉四肢皆稟氣於胃而不能至經必因於脾乃能受稟今脾病不能與胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉其治可十全散加減四物去邪留正豫考內經五臟使人痿而河間獨言治脾者內經又云論言治痿者獨取陽明故也陽明五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣亍而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也曰治之奈何曰各補其榮而通其輸調其虛實和其逆順筋脈骨肉各以其時受月則病已矣時受月謂受氣時月如肝王甲乙心王丙丁類也又云有人兩足心凸腫上生黑豆瘡硬如釘脛骨生碎孔內髓流出身發寒顫惟思飲酒此是肝腎冷熱相吞用炮川烏頭來敷之內服韭子湯效又云有人忽發寒熱數日不止四肢堅如石擊之有鐘磬聲日漸瘦惡用吳茱萸木香等分煎湯飲之自愈源按此症為寒邪客於少陽少陽與厥陰相為表裡在三陽盡處陽盡則陰生故有寒熱之往來厥陰在三陰盡處陰盡則陽接故有寒熱之勝復此症由陰勝而不能外復於陽至邪橫逆於脾厥失健運之職故四肢悉堅如石即經所謂寒以堅之是也夫擊之聲如鐘磬乃土音也蓋脾屬土其音宮宮音重而大故聲如是凡脾土之音非火不發非郁亦不發猶天地元陽之氣鬱結於下而後外達達則雷聲自內而出也蓋脾土為寒所郁擊之則筋脈自相應而作也至四體日漸瘦惡因脾病不為肌膚故耳然治病當求其本用吳茱萸直入肝臟逐去深寒而更以木香通其壅滯之氣使氣通寒散則木平土安而病自愈也或問邪入厥陰因陰勝而陽下不能復至邪橫逆脾土當必吐利而何故無乎豫曰脾土雖困而氣機尚能內動所以擊之即有聲相應而出即易所謂坤至柔而動也剛故無是患然此聲為寒鬱不能自達則必擊之有聲者亦猶土氣之有氣也有氣之器以鐵物擊之其火自內而出即是氣也蓋其氣閉郁寒體之中必擊之則氣機內動而聲發於外也若無火則無氣無氣則不鳴欲明此病當以氣之擊而有聲者察之又問土器之有聲者擊之即隨所擊之處而發若脾土深居於內雖有筋脈相應恐未必能隨所擊而發音豫曰脾土之音擊之聲發猶琴聲之相應也蓋琴無體則弦不鳴撥其弦則遂應明乎器之如是便知是病所擊之聲矣又問土器有氣則鳴則木中有火豈非氣乎何故但有聲而不鳴耶豫曰子不明器之為質分五音之聲非以氣恁也即如木為器其音角角音調而直故聲如是豫所言土器之有聲者叩之則鳴若以五音論之則收宮音之聲無氣便無此音豈可概以氣論之哉若以氣論之即鐘鼓等音亦宮音也豈有氣乎又問鐘鼓二器固無聲也何故無氣之器反鳴而且遠乎豫曰鍾雖無氣內有脈道音從脈道而行故得鳴而且遠所以五金切之則光折之則參差不齊此依脈路所分故不平而齊也乃五金中惟錫鉛無聲因柔而不剛故耳若以鼓論不過因急而有聲並非有氣而有脈道也鼓聲其音走內若下面覆皮擊之以應其下所以亦鳴而遠也否則聲淺而不遠矣奇病方云有人指縫流血不止有蟲如蜉蝣之小鑽出少頃即能飛去此症乃濕熱生蟲也然何故而能飛耶蓋濕熱而更感風邪凡蟲感風即有翼能飛蟲在人身得風之氣故亦能飛也方用黃耆熟地苡仁各五錢當歸白芍茯苓白朮各三錢人參柴胡荊芥川芎各一錢水煎服四劑而愈此方全不在殺蟲而但補氣血佐用去濕去風蓋人身氣血和則蟲自滅故也又云有人患手足脫下而人仍不死者此乃傷寒之時口渴過飲涼水以救一時之渴孰知水停腹內不能一時分消遂至四肢受病氣血不行久而手足先爛手指與腳指墮落或腳指墮落之後又爛腳板久之連腳亦墮落矣若有傷寒口渴過飲冷水者愈後倘手足指出水急用此方可救指節腳板之墮落也方用苡仁三兩茯苓二兩肉桂一錢白朮一兩車前子五錢水煎服一連十劑小便大利而手腳不出水矣又云有人患腳板中色紅如火不可落地又非痰毒終歲經年不愈此病因用熱藥立而行房火聚腳心而不散故經久不肯愈也法當用內藥消之若作外治必先爛去腳板煎服祛火丹十劑自消二十劑痊愈然須忌房事三月否則必發發則死矣慎之哉又云有人患指甲盡行脫下不痛不癢此乃腎經火虛又於行房之後以涼水洗手遂成此病方用六味湯加柴胡白芍骨碎補治之而愈又云有人患掌中忽高起一寸不痛不癢此乃陽明經之火不散而鬱於手也理痛癢而不痛癢不特火鬱於腠理而且水壅於皮毛也法當用外藥消之蓋陽明火盛必作渴引飲不休而又不渴是胃中之火盡散流毒於掌中必其人是陽明之火盛手按於床席之上作意行房過於用力使掌上之氣血不行久而突突而高也不痛不癢乃成死肉矣方用附子一個煎湯以手漬之至涼而止如是者十日必然作痛再漬必然作癢又漬而高者平矣蓋附子大熱之物無經不入雖用外漬無不內入者也倘以附子作湯飲之則周身俱熱又引動胃火掌肉不消而內症蜂起故用以外治而愈者也或附子湯中再加輕粉一分引入骨髓更為奇效耳又云有人腳肚之上忽長一大肉塊似瘤非瘤似肉非肉按之痛欲死此乃脾經濕氣結成此塊而中又帶火不消故手不可按按之痛欲死也法宜峻補宜峻補脾氣而分消其濕為是然而外長怪肉若在內一時消之恐不能愈當用內外夾攻之法內服消濕化怪湯二劑後將消塊神丹敷患處一日即消神效之極也又云有人足上無故忽毛孔標血如一線者流而不止即死急以米醋三升煮滾熱以兩足浸之即止血後用人參一兩當歸三兩煎穿山甲一片火炙為末調飲即不再發此症乃酒色不禁恣意縱欲所致當速治之又云有人腳板上忽生一指痛不可忍者乃濕熱之氣結成用消指散以刀輕刺出血刺在生出指上即時出水敷在血流之處隨出隨摻以血盡力度至三日可不流水矣而痛亦少止再以化水湯煎服四劑可全愈而指盡化為水矣外用生肌散敷之加膏藥掩之即愈程山孺文見一人忽手生丫枝痛不可忍一醫用通草為末以雞蛋清塗調即消奇效方云有人患手足髮指毒痛不可忍者用壁間蜂窠為末入乳香少許研勻以醋調塗干即以醋潤之華他別傳云有人手上皮上現蛇形一條痛不可忍此蛇乘人之睡而作交感於人身乃生此怪病服湯藥不效以刀刺之出血如墨汁外用白芷為末摻之稍愈明日又刺血如前又以白芷末摻之二三次化去其形先刺頭後刺尾不可亂也張杲醫説載托青雜記云有人患腳瘡冬月頓然無事夏月臭爛痛不可言遇一道人云爾因行草上惹蛇交遺瀝瘡中有蛇兒冬伏藏故瘡至冬無恙夏出行故至夏臭爛急以生蝦蟆搗敷之一日三換凡三日一小蛇自瘡中出以鐵鉗之其瘡遂愈又云凡人冬月向火火氣入內致兩股生瘡其汁淋漓不止世莫能識用黃柏末摻之立愈一婦病此人無識者亦用此而愈李樓怪症方云有一女年十四腕軟處生物如黃豆大半在肉中紅紫色痛不可忍諸藥不效一方士以水銀四兩白棉紙二張揉熟蘸水銀擦之三日自落而愈本事方云唐時有一商人左膊上有瘡生如人面亦無他苦商人戲以酒滴口中其面色赤以物食之亦能食多則膊肉脹起或不食則一臂痹焉有名醫教其歷試諸藥悉無所苦進至貝母其瘡乃聚眉閉目商人喜因以小葦筒毀其口灌之數日成痂遂愈然不知何疾也本經言是金瘡此豈金瘡之類歟肘後方云有人患手指赤色隨月生死以生薤一把苦酒煮熟搗爛塗之疾乃止源按此症由寒邪逆於肉理營氣不從血凝不行留於脈絡之間以隨人之氣血盛衰而隱現其血之色也內經有云天溫日明則人血淖溢而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉月始生則血始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也以此推之月始生則氣血初盛赤色亦隨氣外浮以漸而生也郭滿則血氣充實故色悉現於外郭空則氣血衰而經絡虛衛氣去而形獨居猶日魂去而月魄獨居也故又漸隱於內也於是則知所患赤色故有隨月生死耳薤白辛溫散血散氣更用苦酒以作嚮導使氣散血行則寒自滅故搗塗而愈太原故事云徐之才治一人患腳根腫痛諸醫莫能識徐曰此蛤精疾也由乘舟入海垂腳水中疾者曰實曾如此之才為剖得蛤二枚大如榆莢鄧氏筆峰方云有人患腳底木硬以牛皮生薑汁化開調南星末塗上烘物尉之源按此症為腎臟受寒營氣凝而不行以成此疾即內經所謂皮膚不營故為不仁又曰北方生寒在氣為堅是也道士王裕曰有忽患腳心如中箭痛苦無奈發歇不時此腎之風毒瀉腎愈南宮從岣嶁神書云南方地卑濕人多患足瘡歲久生蟲如蛭而出乃風毒攻注而然用牛肚或羊肚或豬去糞不洗研如泥看瘡大小入煅泥礬半兩塗帛上貼之須臾瘡癢入心徐徐連帛取下火上炙之中出如絲髮毛尾千萬或青白赤黑以湯洗之三日一作不過數次蟲盡瘡愈翰林叢記云李定言石藏用良醫也有人承簷溜浣手覺物入爪甲初若絲髮數日如線伸縮不能始悟其龍伏藏也乃叩藏用求治藏用曰方書無此以意求之耳螳螂為末塗指庶免震厄其人如其言後有雷火繞身急針挑之果見一物跳出亦不為災霏雪録云山東民間婦人一臂有物隱然屈曲如蛟龍狀婦喜以臂浸水中一日雷電自牖出臂果一龍擘云而去蔡元長知開封正據案治事忽如有蟲自足心行至腰間即墜筆暈絶久之方醒據吏云此病非俞山人不能療驅使召之俞曰此真腳氣也法當灸風市為灸一壯蔡晏然復常明日病如初再召俞曰除病根非千艾不可從其言灸五百壯自此遂愈名醫録云學究任道患腿間瘡腫黑狀狹而長北醫王通曰此魚臍瘡也一因風毒蘊結二因誤食人汗而然乃以一異散敷之數日而愈懇求其方曰但雪玄一味耳任遍訪無知之者有名醫郝允曰聖惠方治此用臘豬頭燒灰雞卵白調敷即此也張子和治新寨馬叟年五十九因秋欠稅官杖六十得驚氣成風搐已三年矣病大發則手足顫掉不能持物食則令人代哺口目張睒唇口嚼爛抖擻之狀如線引傀儡每發市人皆聚觀夜臥發熱衣被盡蹇遍身燥癢中熱而反外寒欲自盡手不能繩傾産求醫至破其家而病益堅叟之子邑中舊小吏也以父母訊戴人戴人曰此病甚易治若隆暑時不過一湧再湧奪則愈矣今已秋寒可三之如未更刺腧穴必愈先以通聖散汗之繼服湧劑則吐痰一二升至晚又五七行其疾小愈待五日再一湧出痰三四升如雞黃成塊狀如湯熱叟以手顫不能自探妻與代探咽嗌腫傷昏憒如醉約一二時許漸省又下數行立覺足輕顫減熱亦不作足亦能步手能櫛巾可持匙箸未至三湧病去如躍病後但覺極寒戴人曰當以食補之久則自退蓋大疾之去衛氣未復故宜以散氣導氣之藥切不以熱劑溫之恐反成他病也源按顫振一症古云木火上盛腎陰不充為下虛上實之症實為痰火虛則腎虧法宜清上補下如戴人所治叟病泥用古法則痰何由而去故醫宜變通若果標實本虛治之又宜從古矣又治西華李政之病寒厥其妻熱厥前後十餘年共服逍遙散十餘劑不效二人脈皆浮大而無力政之曰吾手足之寒時時漬以熱湯寒不能止吾婦手足之熱沃以冷水而不能已何也子和曰寒熱之厥也此皆得之貪飲食縱嗜欲遂出內經厥論證之政之喜曰內經真聖書也餘年之疑今而釋然總不服藥愈過半矣熱厥者寒在上也寒在上者以溫劑補其肺寒厥者熱在上也熱在上者以涼劑清其心分處二藥令服之不旬日而愈東垣云有人患兩手十指疼痛一指疼了一指疼疼後即腫骨中痛膝痛先左膝痛了然後右膝痛發時多則五日少則三日晝輕夜重痛時覺熱行則痛輕腫反重注云先血後氣乃先痛後腫形傷氣也和血散痛湯主之羅謙甫治徵南元帥忒木兒年近七十秋間徵南過陽州時仲冬病自利完穀不化臍腹冷痛足脛寒以手搔之不知痛癢常燒石以溫之亦不得暖診之脈沉細而微蓋高年氣弱深入敵境軍事煩冗朝暮形寒飲食失節多飲乳酪履旦濕陽不外固由是清濕襲虛病起於下故胻寒而逆冷內經曰感於寒則受病微則為咳盛則為泄為痛此寒濕相合而為病也法當即退寒濕之邪峻補其陽非灸不已先以大艾炷於氣海灸百壯補下焦陽虛次灸三里各三七壯治胻寒而逆且接引陽氣下行又灸三陰交散足受寒濕之邪遂處方云寒淫所勝治以辛熱濕邪於外平以苦熱以苦發之以附子大辛熱助陽退陰溫經散寒故以為君官桂大熱辛甘亦除寒濕白朮半夏苦辛溫燥脾濕故以為臣人參草豆蔻甘草大溫中益氣乾薑大辛溫能散清濕之邪蔥白性溫能通上焦陽氣故以為佐又云補下治之以急急則氣味厚故作大劑服之不數服瀉止痛減足胻漸溫調其飲食十日平復明年秋過襄陽值霖雨旬余前症復作再依前灸添陽輔各灸三七壯再以前藥投數服愈徐可豫治吳興沈仲剛內子膝腫痛右先劇以熱尉之則攻左尉左攻右左右俱尉則腹雷鳴上胸已而背如受萬捶獨元首弗及發則面黛色脈罔辨昏作旦輟日尪弱甚卻為弗救徐視脈曰是濕淫所中繼復驚傷膽疾雖劇可治即令以綿纏胸少頃探咽喉間湧青白涎幾鬥許湧定徐曰今茲疾發至腹則弗上面弗青矣至昏膝痛仍如尉鳴果弗及胸至三鼓已定皆如徐言越三昏不復作遂痊劉大用治韶州南七十里古田有富家婦陳氏抱異疾常日無他苦但遇微風吹拂則股間一點奇癢把搔不定手已而舉體皆然逮於發厥凡三日醒及坐有聲如咳其身乍前乍後若搖兀之狀率以百數甫少定又經日始困臥不知人纍夕漸至不敢出戶更數醫不效劉視之曰吾得其症矣先用藥一服取念珠一串病家莫省其用乃當婦搖兀時記其數數之覺減然後云是名鬼注因入神廟為鬼所憑致精氣蕩越法當用死人枕煎湯飲之既飲大瀉數行愈枕還原處韓飛霞治一都司頭重眼昏耳聾牙痛便言兩腳如不著地醫不識為何病一日梳洗畢腹痛少間手足不能舉韓曰此火症也蓋素勞心勞形所致因檢玉機微義示之用辛散之劑十帖恐有消渴痿痹瘡瘍之患乃屏喧譁靜臥果十劑耳知人叫體蟣風發癢成疙瘩然後頭腳始知著落亟入山靜之偶以事觸怒火一發遂渴如欲狂者一日瓜梨泉水所食無計韓曰此非草木之藥可扶矣遍求人乳日進十盞旬余渴減又偶以事怒手足不舉如一軟物臥四日乃服乳無算而瘥脈之心澀曰瘡作矣幸不生大毒患馬眼膿疥越八月乃止薛己治一女子腿前腫一小瘤作癢搔破出蟲如蚊而飛去寒熱如瘧乃肝經之症故有蝨瘤之患用加味逍遙散而愈又有一種發瘤破開有發屬腎經之症也一儒者雖盛暑喜燃火四肢常欲沸湯漬之面赤吐痰一似實火吐甚宿食亦出惟食椒薑等方快薛曰食入反出乃腎胃虛寒用八味丸十全大補加炮薑漸愈不月平復孫東宿治一文學兩足不酸不痛每行動絶不聽其所用或扭於左而又墜於右或扭於右而又墜於左不能一步步正走此亦目之稀覯竟不識為何病豫臆度之由筋軟不能束骨所致故行動則偏斜扭墜也夫筋者肝之所主肝屬木木縱不收宜益金以制之用人參黃耆白芍以補肺金苡仁虎骨龜板杜仲以壯筋骨以鐵華粉專制肝木煉蜜為丸早晚服之而愈一男子患腳後跟骨脫落動之則痛艱於行步就吳門葉天士治之葉曰此濕傷經絡當投聖靈丹服之果愈祛火丹熟地黃三兩北五味五錢麥冬一兩山茱萸五錢丹皮三錢甘菊五錢白茯苓二錢澤瀉三錢車前子二錢水煎服消濕化怪湯白朮芡實一兩澤瀉五錢苡仁一兩肉桂五分人參茯苓車前萆薢白芥子白礬三錢牛膝陳皮半夏二錢水煎服消塊神丹蚯蚓糞一兩水銀一錢硼砂一分黃柏五錢兒茶三錢冰片麝香五分各為細末研至不見水銀為度此藥用醋調成膏敷在患處一日即全消消指散硼砂一分瓦蔥一兩冰片三分人參一錢各為末敷之化水湯白朮五錢半夏一錢甘草二錢苡仁一兩萆薢白芥子牛膝人參三錢水煎服調胃承氣湯大黃芒硝甘草水煎服三化湯大黃厚朴枳實羌活水煎服和血散痛湯羌活升麻麻黃一錢五分桃仁十個柴胡防風黃柏知母一錢黃連防己六分豬苓獨活當歸一分甘草二分紅花一分分二服水煎食前熱服桂附八味丸熟地黃八兩山茱萸山藥四兩丹皮茯苓澤瀉肉桂附子一兩蜜丸空心鹽湯下冬酒下十全大補湯即十全散人參白朮茯苓當歸撫芎白芍生地甘草黃耆肉桂薑棗煎服聖靈丹苦葶藶炒四兩漢防己木香茯苓木通人參二錢半上為末棗肉為丸如梧子大每服三十丸桑皮湯下生肌散見頭門六味丸見耳門通聖散見頭門加味逍遙散見目門
