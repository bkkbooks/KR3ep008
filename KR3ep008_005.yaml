body:
  text: 卷之五胸夏子益奇疾方云有婦人産後瘀血上攻忽然兩乳伸出細小如腸垂過小肚痛不可忍危亡須臾名曰乳懸將川芎當歸各一斤以半斤銼碎於瓦罐內用水濃煎不拘多少頻服仍於一斤半銼塊於病人桌下燒煙令將口鼻吸烟用盡未愈再作一料仍以前法再用萆麻子一粒貼其頂心則乳頭自復奇病方云有男子乳頭忽然壅腫如婦人乳狀捫之痛絶經年藥醫不效此乃陽明之毒氣結於乳房之間非瘡毒乃痰毒也若瘡毒經久必然外潰經年壅腫如故非痰毒而何法當消其痰通其瘀用化聖通滯湯煎服自愈此方妙有銀花蒲公英直入陽明之經又得清痰通滯之味為佐附子引經單刀直入無堅不破又何患痰結之不消或疑附子大熱諸痛皆屬於火似不可用殊不知非附子不能入於至堅之內況又有梔子芍藥之酸寒雖大熱亦解其裂性矣又云有人心窩外忽然生瘡如碗大變成數口能作人聲叫喊此乃憂鬱不舒而祟憑之也用生甘草三兩人參五錢白礬茯神銀花各三錢水煎服即不鳴再用二劑即愈蓋甘草消毒人參茯神以安其心白礬以止其鳴銀花以解其火熱故易以奏效也怪症方云有人忽胸背皆駝頸項漸短問其故食旱鱉所致用紫蘇煎湯洗患處次用龜尿搽之愈源按此症即古云龜胸龜背是也古方皆作肺治謂受邪喘久所致又乳母多食辛熱貽毒於見感之於肺因肺脹大故胸膈高滿如龜狀也蓋胸膈之上乃肺之分野又肺主皮毛若背受風邪客於脊骨故背高而僂傴又或兒坐又早亦能致之然多成痼疾考之古法惟有百合丹枳殼防風丸乃灸肺腧膈腧二穴而已別無治法若前症因食旱鱉患此乃毒感於肺故肺脹大而胸背皆駝也紫蘇解一切魚毒而更能疏通肺氣龜尿軟骨然亦宜速治久則骨節堅硬則不可復矣宣室志云天寶中有隴西李生自白衣調選桂州參軍既至任以熱病旬余覺乳痛不可忍及視之高若癰腫之狀即召醫驗其脈醫者云臟腑無他苦臆中有物以喙攻其乳乳痛而癰不可為也又旬余病甚一日癰潰有雉自左乳中突而飛去不知所止是夕李生卒朱丹溪治東陽王仲延咽膈間常覺有物悶悶然每食必屈曲自膈而下且梗澀作微痛食亦減他無所苦朱視其脈右甚澀而關甚沉左卻和朱曰汙血在胃脘之口氣因鬱而為痰此必食所致明以告我彼不自覺朱又曰汝去冬好食何物為多曰我每日早必單飲點剁酒兩三杯逼寒氣為制一方用韭汁半盞令細呷之一日三服盡韭二斤而安一婦因哭子後胸患痞有塊如杯食減面淡黃黲黑憊甚脈弦細虛澀日晡寒熱知其勢危補瀉兼用以補中益氣湯隨時令加減與東垣痞氣丸相間服之食前用湯食後用丸一月寒熱退食稍進仍服前藥二月後忽夜發寒熱至天明始退其塊如失至晚手足下半節皆腫遂停數日忽夜手足腫如失天明塊復有而小一暈以二陳湯加白朮桔梗枳實服半月而安張子和治一婦為室女時心下有冷積如覆盆按之如水聲以熱手尉之如冰于歸十五年不孕其夫欲黜之張曰毋庸若用吾藥病可除孕可得從之診其脈沉而遲尺脈洪大有力非無子之候也乃先以三聖散吐痰一斗心下平軟次服白朮調中湯五苓散後以四物和之不再月氣血合度數月而孕程文彬治一孕婦懷七月胸膈飽悶氣喘忽吐一物如小腸寸許舉家驚疑其胎爛程至診得寸口脈洪滑知其氣血少胎氣逆上中焦素有濕熱濕生痰知所吐之物乃痰結聚病名子懸以紫蘇飲加芩連貝母十劑獲愈永徽中有僧惟則病噎不能食囑諸弟子曰吾死後便可開吾胸喉視有何物自經而卒弟子儂言開之中得一物形似魚有兩頭遍體皆肉鱗乃置碗中跳躍不止戲投諸味皆隨化盡時適有一僧以靛置碗中此蟲隨繞碗而去須臾化水此乃蟲瘕非噎比因此後人多以靛治噎誤矣昔有人患癥瘕死遺言令開腹視之得塊乾硬如石有五色紋理人謂異物竊去削刀柄後因以刀刈三稜柄化為水乃知此藥可療癥瘕也時康祖大夫患心漏十餘年當胸數竅血液長流醫莫能治或云竅多則愈損閉則慮穴他岐當存其一二猶為上策坐此形神困悴又苦腰痛行則傴僂不飲酒雖雞魚蟹蛤之屬皆不入口溫州郡守韓子溫見而憐之為檢聖惠方載腰痛一門冷熱二症示之使自擇康祖曰某年老久羸安敢以為熱始作寒症治療取一方用鹿茸者服之逾旬痛減更覺氣宇和暢月餘腰屈復伸無復叫痛心漏亦愈以告醫者皆莫能測其所以後九年康祖自鎮江通判滿秩造朝訪子溫則精力倍昔飲啖無忌漏愈之後日勝一日子溫書吏吳弼亦若是疾照方服之浹旬而愈其方鹿茸去毛酥炙微黃附子炮去皮臍皆二兩鹽花三分為末棗肉丸三十丸每日一丸空心酒下天聖中工部尚書忠肅公家有媼病漏十餘年一日有醫過視之曰此可治也即取活鱔魚一條削竹釘五七枚乃擲鱔於地屈曲圍盤以竹釘貫之覆瘡良久取視有白蟲數十如針將鱔即置杯中蠕動如線後覆之又得十餘枚如是五六次醫者曰蟲尚未盡然皆小蟲請以常用藥敷之時用檳榔黃連二味即為散敷之明日乃以干艾作湯投白礬二三錢先洗瘡口然後敷藥蓋人血氣冷必假艾力以佐陽而艾亦能殺蟲也如是者再即生肌不逾月愈醫曰瘡一月不消則有蟲蟲能蠕動氣血亦隨之故瘡不可遽合合則結毒實蟲所為一人別處無汗獨心孔一片有汗思慮多則汗亦多病在用心名曰心汗宜養心血以艾煎湯調茯神末治之化聖通治湯銀花蒲公英各一兩花粉白芥子各五錢附子木通各一錢柴胡二錢白芍梔子茯苓各三錢水煎百合丹大黃煨天冬杏仁百合桑皮甜葶藶軟石膏上為末煉蜜為丸梧子大每服五丸白湯下臨睡服枳殼防風丸枳殼防風獨活前胡麻黃當歸大黃煨各一錢麵糊丸黍米大米飲下東垣痞氣丸黃連八錢厚朴五錢吳茱萸三錢白朮土炒黃芩二錢茵陳酒炒乾薑炮砂仁人參茯苓澤瀉各一錢川烏炮川椒各五錢肉桂巴豆霜各四錢蜜丸燈草湯下三聖散甜瓜蒂防風藜蘆為末熟水調下白朮調中湯白朮橘皮茯苓澤瀉各一錢砂仁官桂藿香炮姜各五分甘草一兩白湯入蜜少許調服二錢五苓散豬苓茯苓桂澤瀉白朮為末每服三錢紫蘇散蘇葉一錢當歸七分川芎芍藥人參陳皮大腹皮各五分甘草二分薑棗煎補中益氣湯見項門二陳湯見目門四物湯見頭門腹夏子益奇疾方云有人患腹中如鐵石臍中水出漸變作蟲行之狀繞身咂啄癢痛難忍扒掃不盡用蒼朮濃煎湯浴之仍以蒼朮末入麝香少許水調服痊源按經云寒以堅之又云水濕生蟲此症臍中水出漸變作蟲行之狀繞身咂啄此即水濕生蟲也蓋水濕而腹如鐵石即所謂寒以堅之因內兼寒也故蟲不從內生反生於外耳蓋蟲生水濕必得陽氣吹之方生此水在腹本已得生生之氣而有生蟲之象因客寒內入氣不復化故但流水於外復得皮膚之血氣吹感而生故也蒼朮燥濕散寒乃煎湯外洗以除已出之水更為末加麝內治以絶其根麝香通諸竅暖水臟而更能殺蟲故用之宜耳又云有人尸厥奄然死去腹中氣走如雷用硫黃一兩焰硝五錢細研分三服好酒煎覺煙起則止候溫灌之片時再服而安源按靈樞經云邪客於手足太陰少陰足陽明之絡皆會於耳中上絡左角若臟氣相形或外邪相杵則氣遏不行五絡俱絶諸脈伏匿令人身脈皆動而形無所知其狀若尸故名尸厥此感冒不正之氣忽然手足逆冷肌膚粟起頭面青黑精神不守牙緊口噤昏不知人頭旋暈倒者是也凡吊死問喪入廟登冢飛尸鬼擊多有此病急用蘇合香丸灌之一法急用薑汁半盞酒半盞煎沸灌之灸百會四十九壯氣海丹田二三百壯覺體暖即止後以陰毒法治之此臟氣虛寒之症也世俗不識多作中風而治鮮不斃矣又有七情內傷卒然氣逆身冷僵撲牙關緊急痰涎潮壅昏不知人者此氣厥也凡忿怒太甚多有此病勿誤作中風而用疏風之藥急以蘇合香丸灌之候省以八味順氣散或木香調氣散調降其氣自然平復有痰者以四七湯加南星木香治之然暴厥不省人事有不治自愈者昔宋仁宗貴妃一日食次忽撲倒遍身卒冷急召孫尚杜任至奏曰不妨此氣厥耳少頃吐即復蘇坐良久而果蘇上問因何故而蘇又因何而得奏曰貴妃方食因憂怒氣上與食相併故如此吐即氣通故復蘇也素問云厥或令人腹滿或暴不知人或至半日遠至一日乃知人者陰氣盛於上則下虛下虛則腹脹滿陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也又云血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死是也又有醉飽之後或感風寒或著氣惱忽然厥逆昏迷口不能言肢不能舉者此食厥也蓋食滯胸中陰陽痞隔升降不通故生此症若誤作中風而用祛風散氣之劑則胃氣重傷死可立待宜煎姜鹽湯探吐其食後以平胃散加茯苓白朮麥芽半夏之類調理若有風寒尚在者以藿香正氣散解之氣滯不行者以八味順氣散調之奇病方云有人覺腸胃中癢而無處扒搔者只覺置身無地此乃火鬱結而不散之故法當用表散之藥服化癢湯數劑自愈又云有人臍中不痛不癢忽出血不止此亦奇疾也方用六味湯加骨碎補一錢飲之即愈蓋臍是腎經之位而出血即是腎火之外越也六味湯滋其水則火自息焰矣骨碎補專能止竅故加入相宜耳又云有人臍口中忽長二寸似蛇尾狀不痛不癢此因任帶之脈痰氣壅滯結成此症法當以硼砂一分白芷雄黃各一錢冰片一分兒茶二錢各為細末將其刺尾出血心昏暈欲死急以藥點之立化為黑水用白芷三錢煎湯服之自愈倘不愈不必再治此乃孽病非藥所能療也又云有人患蛇生腹中即以身上辨之身必乾涸如柴似有鱗甲者蛇毒也最易辨之方用白芷一味為末每日米飲湯送下即愈昔又有患者飲食如故發則如癲面色青黃小腹脹滿狀如妊孕醫診其脈與症皆異而難明主療忽有一山叟曰聞開皇六年灞橋有患此病蓋因三月八日水邊食芹菜得之有識者曰此蛟龍病也為龍游芹菜之上因食之為病遂以寒食糖每劑五合服之數劑吐一物形雖小而狀似蛟龍遂愈源按仲景云春秋二時龍帶精入芹菜中人誤食之為病面青色腹滿如妊痛不可忍此內生蛟龍也但服硬糖二三升日三度吐出蜥蜴便瘥華他云有人患胃脘不時作痛遇飢更甚尤畏大寒日日作楚余以大蒜三兩搗汁灌之忽吐蛇一條長三尺而愈蓋蛇最畏蒜氣此余親手治人者也又云余治一人腹中攻痛十餘日鬢髮墮落余曰是脾半腐可刳腹治之也使飲藥令臥破腹就視脾果半腐壞以刀斷之割去其惡肉以膏敷之即瘥源按此症除此公之外無人能治豫所録者恐後人有腹痛發落不知脾腐故耳陳正敏遁齊閒覽云楊勔中年得異病每腹中有小聲應之久漸聲大有道士見之曰此應聲蟲也但讀本草有不應者治之讀至雷丸不應遂頓服數粒而愈泊宅編云永州通判廳軍員毛景得疾每語喉中必有物作聲相應有道人教令學誦本草藥名至藍而默然遂取藍汁飲之少頃吐出肉塊長二寸人形悉具遂愈熊氏補遺云有人腹中有聲似鬼哭急用黃連煎濃汁每常呷之自愈源按凡病患奇聲者總屬蟲類此症有聲似鬼哭亦蟲也蟲乃溫熱所生故用黃連寒清其熱苦燥其濕且苦寒沉陰肅殺伐傷生和之氣猶冬令嚴寒則諸蟲盡滅耳良方云有孕婦腹內鐘鳴用蚡鼠窟土為末二錢入麝香少許溫水調服立愈或黃連煎濃汁令婦時時呷之或問所言病患奇聲者皆屬蟲類此症孕婦腹內鐘鳴可亦是蟲乎豫曰非也凡聲不出宮商角徵羽五音者悉屬臟病非蟲也蓋脾屬土其音宮宮音重而大孕婦腹鳴如鍾即土之宮音也然此音非郁不發郁非熱亦不發症由脾土素有鬱熱因胎日長而其氣更郁更鬱則胎氣不順不順則逆逆則所郁之氣因逆而發是音也猶雷因元陽之氣閉郁鬱而發之則雷聲內作土能清熱下氣而鼠窟土乃至陰之土可護麝直達脾陰之所而共散其氣兼清其熱更納其香土能納香使胎亦無損而愈或用黃連專清脾陰之火使火滅氣散而病亦可愈也主簿陳子直妻有異疾每腹脹則腹中有聲如擊鼓遠達於外聞者疑似作樂腹脹消則鼓聲亦止一月一作經數十醫皆莫能明其疾又問是案腹鳴如鼓乃一月一作此何故乎豫曰經云諸病有聲皆屬於熱此症腹脹有聲如鼓亦宮音也因脾土虛而有熱熱而兼郁所作然作必一月者蓋必由經而病醫案中雖知其病之奇而不明其病之源也夫月事以時而下而血必根乎氣氣凝則凝氣滯則滯然氣滯亦有虛實之辨氣實則痛氣虛則脹如應期之日若遇太過則必將行而痛痛可立運而下不及則經雖應期而動而無如氣不能運行則氣滿鬱於中故即腹脹脹則脾土所郁之氣從血中外泄故有是音也所泄之際血亦漸動動則漸行而下故腹脹消而鼓聲亦止所以作必一月若非因經而病何得有是症乎治若清補脾胃和血調經其症亦當自愈又問鐘鼓二聲之音其音俱宮故病皆屬土乃同匙土病而何故有鐘鼓二聲之患乎豫曰此氣分順逆耳鐘聲雖脾土所發之音乃因氣逆於肺肺納其氣則氣不散漫所以其鳴如鍾若肺不居上則氣散漫不收必當聲發如雷也蓋肺屬金其音商當肺納氣之時而肺之商音亦作故聲發如是耳鼓聲其音走下故下復覆皮以應其下症由土音下泄故作聲如鼓也肘後方云有人忽腹痛脹急不得氣息上衝心胸旁攻兩脅或塊壘湧起或牽引腰脊此乃身中尸鬼接引為害取屋上四角茅入銅器中以赤帛覆腹將銅器燒茅令熱隨痛追遂跖下癢即瘥也又云有人與女子交接忽腹痛欲死此陰毒也用猳豬血乘熱和酒飲之寇氏衍義云有小兒臍中血出多啼或出水汁用白石脂末溫撲之日三度勿揭動自愈孫思邈云有山野人好齧蝨在腹生長為蝨瘕用敗梳敗篦各一枚各破作兩分以一分用水五升煮取一升調服即下出客座新聞云青陽復氏素業醫任江陰訓利有儒生之父患腹脹求其診視乃脈洪而大有濕熱生蟲之象況飲食如常非水腫蠱脹之症以石榴椿樹各取東引根加檳榔各五錢用長流水煎空心服少頃腹作大痛瀉下長蟲一丈許遂愈李子豫治豫州刺史許永之弟患心腹痛十餘年殆死忽一日夜間聞屏風後有鬼謂腹中鬼曰明日李子豫從此過以赤毒殺汝汝其死矣腹中鬼答曰吾不畏之於是使人候子豫豫果至未入門患者聞腹中有呻吟聲及子豫入視曰鬼病也遂以八毒赤丸與服須臾腹中雷鳴彭轉大利數行遂愈嗣伯治張景聲十五歲患腹脹面黃衆藥不能治伯曰此石蛔爾極難療當取死人枕煮服之得大蛔蟲頭堅如石者五六升病即瘥王晏問其故曰石蛔者醫療既僻蛔蟲搏堅世問藥不能遣須以鬼物驅之然後乃散故用死人枕煮服之丹溪視一婦腹漸大如懷子至十月求易産藥察其神色甚困難與之藥不數日生白蟲半桶蓋由婦之元氣大虛精血雖凝不能成胎而為穢腐蘊積之久濕化為熱濕熱生蟲理之所有亦須周十月之氣發動而産終非佳兆其婦不及月死濕熱生蟲譬之溝渠汙濁久不流則諸蟲生於其間矣一婦以毒藥去胎後當臍右結塊塊痛甚則寒熱塊與臍高一寸痛不可按脈洪數朱謂曰此瘀血流溢於腸外盲膜之間聚結為癰也遂用補氣血行結滯排膿之劑三日決一鋒釘膿血大出內如糞狀者臭甚病婦恐因謂氣血生肌則內外之竅自合不旬日而愈汪石山治一人年五十形色蒼白性急語不合則叫號氣減嘔吐左奶下忽有一點痛後又過勞惱怒腹中覺有穢氣衝上即嗽及吐亦或乾咳無痰甚則嘔血時發如瘧或以瘧治或從痰治或從氣治皆不效診之脈皆浮細略弦而駛曰此土虛木旺也性急多怒肝火時動故在奶下痛者肝氣鬱也穢氣衝者肝火凌脾而逆上也嘔血者肝被火擾不能藏其血也咳嗽者金失所養又受火克而然也嘔吐者脾虛不能運食鬱而為痰也寒熱者水火交戰也茲宜瀉肝木之實補脾土之虛清肺金之燥庶幾可安以青皮山梔各七分白芍黃耆各一錢歸身阿膠各八分甘草五味各五分白朮麥冬各錢半人參三錢煎服月餘諸症悉平一人長瘦體弱病左腹痞滿穀氣偏行於右不能左達飲食減大便滯汪診其脈浮緩而弱不任尋按曰此土虛木實也用人參補脾枳實瀉肝佐以芍藥引金泄木輔以當歸和血潤燥加厚朴陳皮以寬脹兼川芎山梔以開鬱服十餘帖稍寬因糞結思飲人乳汪曰只恐大滑耳果然遂停乳仍服前藥每帖加人參四五錢後思香燥物曰脾病氣結香燥無忌也每日食燥棐一二十枚炙蒸餅十數斤以助藥力年餘而安一婦年近五十病腹痛初從右指冷起漸上至頭如冷水澆灌而腹大痛則遍身大熱熱退則痛止或遇食或不食皆痛每常或一年一發近來二三日一發遠不過六七日醫用四物湯和柴胡香附不應更醫用四君木香檳榔亦不應又用二陳加紫蘇豆蔻又用七氣等劑皆不應汪診脈皆微弱似有似無或一二至一止或三五至一止乃陽氣大虛獨參湯五錢陳皮七分煎服十數帖而愈夫四肢者諸陽之末頭者諸陽之會經曰陽虛則惡寒又曰一勝則一負陽虛陰旺乘之則發寒陰虛陽旺盛之則發熱今指梢逆冷上至於頭則陽負陰勝可知矣陽負則不能健行而痛大作痛作而復熱者物極則反也及其陰陽氣衰而不相爭則熱歇痛亦息矣況脾胃多氣少血之經氣能生血氣不足則血亦不足仲景曰血虛氣弱以人參補之故用獨參湯與服而數年之痛遂愈矣錢仲陽治一童子痘色全好但腹中一瘡痛色即變紫痛止色復舊脈洪大時已十餘日灌漿將滿但不靨乃以藥下其血積瘡遂轉好愈喻嘉言治葉茂卿乃郎出痘未大成漿其殼甚薄兩月後尚有著肉不脫者一夕腹痛大叫而絶即梨汁入溫湯灌之少蘇頃復痛絶又蘇遂以黃芩二兩煎湯加梨汁與服痛止令制膏子頻服不聽其後忽肚大無倫一夕痛叫小腸突出臍外五寸交各二寸半如竹節壺頂狀莖物交折長八九寸明亮如燈籠外症歷來不經聞見喻用黃芩阿膠二味日進十餘劑三日始得小水五日後水道清利臍收腫消而愈後門人問而明云夫一身之氣全闋於肺肺清則氣行肺濁則氣壅肺主皮毛痘不成漿肺熱而津不行也殼著於肉名曰甲錯甲錯者多主肺癰癰者壅也豈非肺氣壅而然與腹痛叫絶者壅之甚也壅甚則水道亦閉是以其氣橫行其中而小腸且為突出至於外腎弛長其剩事矣緣病已極中之極惟單味多用可以下行取效故立方甚平而奏功甚捷耳試以格物之學為子廣之凡禽畜之類有肺者有尿無肺者無尿故小道不利而成腫滿清肺為急此義前人闡發不到後之以五苓八正等方味治水者總之未晤此旨至於車水放塘種種劫奪膀胱之劑可不辨之於早歟嘉靖中長州鄒表之妻患小腹下生一塊形如梅李久則腐潰始吐出若米粞之狀後又若蜆肉之狀以指捻開則有長髮數條在內名醫竟不能治遂致不起蛇發瘕往往載於方書或因食物相感假血而成理或有之不可指為妄誕也一人年二十三歲膈有一點相引而痛吸氣覺皮急此有汙血也滑石一兩桃仁黃連各五錢枳殼一兩炙甘草二錢為末每服一錢五分以蘿蔔自然汁煎飲之一日五六服豫里一婦適咬針線其針失口未幾入喉而下茫無措置一鄰人云速當取蟾兩目用溫水吞下可相針頭尾而出服之果驗又武林一童子戲作吞針法針亦入腹治之亦如前而出使蟾未有時當往向南桑樹底下開落丈許自有化癢湯柴胡梔子天花粉各三錢白芍一兩甘草二錢水煎服調氣和胃散白豆蔻木香丁香藿香檀香砂仁甘草蒼朮厚朴陳皮水煎服木香調氣散木香丁香藿香檀香砂仁白豆蔻甘草為末沸湯入鹽少許調服二錢四七湯人參官桂半夏各一錢甘草五分加姜煎藿香正氣散茯苓白芷蘇葉陳皮桔梗大腹皮甘草白朮厚朴半夏各兩半藿香三兩前胡一兩半上每五錢姜三片棗一枚水煎乘熱服八味順氣散白朮茯苓青皮陳皮人參白芷烏藥甘草水煎服八毒赤丸雄黃硃砂礬石附子炮藜蘆巴豆去油及筋膜丹皮各一兩蜈蚣一條炙為末蜜丸小豆大水下七丸六味湯即六味丸見耳門平胃散見心神門
