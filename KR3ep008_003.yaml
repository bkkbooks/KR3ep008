body:
  text: 卷之三口夏子益奇疾方云有人病臥床四肢不能動只進得食好大言說吃物謂之失說物望病治法如說食豬肉時便云你吃豬肉一頓病者聞之即喜遂置肉令病人見臨要卻不與食此乃失說物望也當自睡中涎出便愈源按此症為陽盛於內故好大言而善說吃物且陽盛則氣壅氣壅則脈絡不利故四肢不能舉動治法說所食之物而即許食之使病人心喜即經所謂喜則氣散然置物令見而卻不與食者所謂食入於陰長氣於陽故但使其望見彼見所喜之物而不得食故便能使口中涎出蓋涎即痰也痰即火火即氣同物而異名涎出則氣自衰而病自愈也又云有人患口鼻出腥臭之水以碗盛之狀如鐵色蝦魚如粒米大走躍不住以手捉之即化為水此肉壞也任意饌食雞肉自愈源按此症因口鼻所出腥臭之水而名肉壞良由患毒於內膜之處因化肉如膿若水故所出之水腥而臭也以碗盛之狀如鐵色蝦魚亦由患腎臟所屬之分使然蓋腎屬水其色黑得腎臟之氣所化故色如鐵而狀如水族之物也然此水何故不從內下此乃感人氣血之靈故能走躍水中所以得隨上升之氣從口鼻而出若捉之又即化為水此氣散故也凡毒從肺氣所化其膿色多白蓋肺屬金其色白得從化而為白也此毒生於內膜在腎臟所屬之分非肺之當令故即隨是臟之氣所化以得是臟所屬之色也雞肉補虛溫中而又能攻毒蓋至陰之毒非攻不可攻之則毒散即內經所謂其治宜毒藥是也俗蒸雞汗發痘瘡其效立見此攻毒之驗也又云有人患口中生肉球有根如線五寸余如叉股吐出乃能食物捻之則痛徹心者麝香研末一錢水服之日三自消源按此症口生肉球而但云口內此必生於舌經云心脈系舌本脾脈絡舌旁系舌下凡舌病皆心脾二經之所致也故捻之痛應於心此由脾土不利經脈不順而有是患所謂子病母亦病而又實者當瀉其子故但用麝香入脾治肉之味通其土氣開其經絡則怪肉消而病自愈也又云有人忽氣上喘不能言語口中流汁吐逆齒皆搖動如欲脫狀氣喘轉大悶絶復蘇名曰傷寒並熱霍亂用大黃人參各半兩水三盞煎至一盞去滓熱服自安又云有人飲油至五斤方快意不爾則病此是發入於胃氣血裹之化為蟲也雄黃半兩為末水調服之蟲自出奇病方云有人患唇上生瘡久則瘡口出齒牙於上唇者乃七情憂鬱火動生齒故也方用柴胡白芍當歸生地各三錢黃芩一錢天花粉二錢白果十枚水煎服外用冰片一分殭蠶一錢黃柏炒三錢共為末摻之齒自消也張雞峰備急良方云有人患牙齒日長出口難食名髓溢病用白朮煎湯漱服即愈搜神記云桓宣武有一督將因時病後虛熱便能飲馥茗一斛二斗乃飽若減升合便以為不足後有客造之更進五升乃大吐一物如升大有口形質縮皺狀似牛肚客乃令置之盆中以斛二斗馥茗澆之此物吸之都盡而止覺小脹又增五升便悉混然從口中湧出既吐此物遂瘥或問此何病答曰此病名斛茗瘕東坡物類相應志云齊諧記載江夏安陸縣隆安中有人姓郭名垣得天行病後遂能大餐每日食至一斛五年家貧行乞於市一日大飢至一園食薤一畦大蒜一畦便悶板臥地須臾大吐吐一物如籠漸漸縮小有人撮飯於上即消成水而病遂瘳也酉陽雜俎云和州劉録事者大曆中罷官居和州傍縣食兼數人尤能食鱠嘗鱠味未嘗果腹邑客乃網魚百餘斤會於野處觀其下箸劉初食鱠數碟忽似小哽因咯出一骨珠子大如豆乃置於茶甌中以碟覆之食未半怪覆甌碟傾側舉視之骨珠子已長數寸如人狀座客共觀之隨視而長頃刻長及人遂摔劉因相毆流血良久各散走一循廳之右一轉廳之左俱及後門相觸翕成一人乃劉也神已癡矣半日方能語訪其所以皆不省之劉自是惡鱠廣異記云句容縣佐吏能啖鱠至數十斤恆食不飽縣令聞其善啖乃出百斤吏快食至盡因覺氣悶久之吐一物狀如麻鞋令命洗出安鱠所鱠悉成水醫莫能名令命小吏持揚州賣之冀有識者試之若有買者當高舉其價看還幾錢有胡求買增價至三百貫文胡輒還之初無酬酢人謂胡曰是縣令句容家物問此是何物胡云是銷魚之精亦能消腹中塊病患者以一片如指端繩系之置病所其塊即消我本國太子少患此病父求愈病者賞之千金君若見賣當獲大利令竟賣半與之宣室志云永徽中徐爽有每食生魚三斗乃足一日飢作鱠未成忍飢不禁遂吐一物如蝦蟆自此不復能食鱠矣名醫録云虞侍郎蘇州人平生喜食生魚鱠中年病腹堅倒身不得每發病疼痛幾死纍治不效一善醫切脈曰侍郎右關脈伏伏為積聚有生冷之積成瘕在腹則疼不可忍可以藥取之令用橄欖汁吞丸子藥數粒晚下利一盆許是魚鱠婁前一截皆成魚矣從此遂安說淵云陸顒吳郡人自幼嗜麵食食愈多而質愈弱胡人以藥吐一蟲長二寸許色青狀如蛙此名消面蟲實天下之奇寶也其說甚異不具述玉田隱者云一女子忽嗜河中汙泥每日食數碗方快有一醫用壁間敗土調水飲之遂愈丹溪云吃泥胃氣熱也用黃芩白朮茯苓軟石膏煎服楊氏經驗方云益昌伶人劉清嘯一娼名曰花翠年及逾笄好食生米惠民局監趙尹用蒼朮米泔水浸一宿銼焙為末蒸餅和丸梧子大每服五十丸食前米飲湯下日二服兩旬而愈此症因食生熟物留滯腸胃遂至生蟲久則好食生米否則終日不樂至憔悴萎黃不思飲食以害其生醫說云昔慎恭道肌瘦如勞唯好食米缺之則口出清水食之頓便如常衆醫莫辨有蜀僧道廣以雞矢同白米合炒為末以水一鐘調服良久吐出如米形即瘥又云汪丞相徽之祁門人平日好食動風物性尤嗜蟹或作蟹炮蟹簽恣啖之一日得風熱之疾齒間壅出一肉漸大脹塞口不能閉水漿不入痛楚待盡已而有一道人言能治此疾丞相命醫之不日而愈其法用生地黃汁一碗豬牙皂角數挺火上炙令熱蘸生地汁令盡末之敷壅肉上隨即消縮聖濟録云有人患時復嘔吐腹中有水聲者此酒癖也川芎三稜炮各一兩為細末每服二錢蔥白湯下鎮陽有士人嗜酒日當數斗至午夜飲興一發則不可遏一夕大醉嘔出一物如舌視無痕竅至欲飲時眼偏其上矗然而起家人沃之以酒立盡至常日所飲之數而止士人由是惡酒一人自幼好酒片時無酒叫呼不絶全不飲食日漸羸瘦或執其手縛柱上將酒與看而不與飲即吐一物如豬肝入酒內其人自此遂惡酒異苑云宋元嘉中有人食鴨成癥瘕以秫米研粉調水服之須臾煩躁吐出一鴨雛而愈孫真人云如食鴨肉成病必胸滿面赤不食以秫米泔水一盞飲之瘡瘍經驗云有人病冷痰醫用大蒜一枚煮服吐一物如升大外痰包裹開視之乃雞雛也再服吐十三雛而愈病名雞瘕此因食白淪雞過多故也泊宅編云洛陽李敏求赴言東吳其妻牙疼每發呻吟不堪忍用叉股按置牙間少頃銀色輒變黑此毒氣所致沿路屢醫殊無一效嘉禾僧會海為制一物服之半年所苦良已後因食熱面又作坐間作湯以進一服而愈其神速若此視藥之標題初不著明但云活血涼血而已敏徐扣之知是四物湯蓋血活則涼何由致壅滯以生疾儒門事親云一男子病口瘡數年上至口中至咽下至胃脘皆痛不敢食熱物一湧一泄一汗十去其九次服黃連解毒湯不十餘日皆釋綱目云有人患口唇緊小不能開合飲食不治殺人以白布作大炷安刀斧上燒令汗出拭塗之日三五度再以青布燒灰酒調服源按經云肝督衝任四脈皆絡唇者也一有受邪則唇亦為之病風則動寒則緊燥則乾裂氣鬱則生瘡血少則澀而無血色治法內理脾胃外敷以藥無不愈乃前案所治外用鐵物取汗制肝經之毒內服青布燒灰解毒而兼去風此不獨為寒所害而更有風毒為患治宜審症不可執治名醫録云隋有患者嘗肌而吞食則下至胸便即吐出醫作噎疾膈氣翻胃三候治之無驗有老醫任度視之曰非三疾蓋因食蛇肉不消所致但揣心腹上有蛇形也疾者曰素有大風嘗求蛇肉食風稍愈復患此疾矣遂以芒硝大黃合而服之微泄利而愈丹溪治一婦孕三月吐痰水並飲食每日寅卯時作作時覺小腹有氣衝上然後膈痛而吐面赤微燥頭眩臥不能起肢疼微渴蓋肝火挾衝脈之火衝上也一日甚二日輕脈和右手寸高藥不效者將二月餘用沉香磨水化抱龍丸一服膈寬氣不上衝二三服吐止眩減而安一人患氣上衝口出如煙霧耳內常鳴此衝脈逆上與八物湯加炒黃連二分黃柏三分數劑而愈張子和治一人年二十餘歲病患口中氣出如登廁雖親戚莫肯對語戴人曰肺金本主腥金為火所乘火主臭應便如是久則成腐腐者腎也此亢極反兼水化病在上宜湧之以茶調散湧去其七夜以舟車丸浚川丸五七行比旦而臭斷羅謙甫治韓子王父年愈六旬病消渴至冬反添燥熱須裸袒以冰水噴胸腋乃快日食肉面數回頃時即飢如此月餘羅診得脈沉細而疾以死決之子玉泣曰病固危篤君盡心救之則死而無恨羅曰夫消之為病其名不一曰食㑊曰消中曰宣疾此高粱之所致也陽明化燥火津液不能停自汗小便數故飲一溲二胃熱則消穀善飢能食而瘦王叔和云多食亦飢虛是也此病仲景所謂春夏劇秋冬瘥時制故也令尊今當瘥之時反劇乃腎水乾涸不能制其心而獨旺於不勝之時名曰真強乃孤陽絶陰者也且人之身為主天令為客此天令大寒尚不能制其熱何藥能及內經云主勝逆客勝從正以此也設從君治療徒勞而已固辭而歸後易醫與灸數日而卒薛己治四明屠壽卿孟夏當門齒如有所擊痛不可忍脈洪大而弦薛曰洪弦相搏欲發瘡毒也先用清胃散加白芷銀花連翹痛即止至晚鼻上發一瘡面腫黯痛更用前藥加犀角十劑腫至兩額口出穢氣脈益大惡寒內熱此毒熾血瘀藥力不能驟敵乃數砭患處與唇上並刺口內赤肉各出毒血再服前藥至數劑而愈若泥尻神不行砭刺或全仗藥力鮮不誤矣吳江史生之內每産後齒根皆動必逾日乃止復懷妊臨月時薛偶至言及此症留十全大補湯二劑令産後煎服齒不復動矣一婦年三十餘忽不進食日飲清茶水果三年餘矣薛為脾氣鬱結用歸脾湯加吳茱萸四劑遂飲食如常若人脾胃虛而不飲食當以四神丸治之孫東宿治葉潤齊年四十心膈嘈雜好啖肉一日不能缺缺即身浮力倦神魂無措必急得肉乃已見則大嚼及入腹腹又大痛痛極則吐酸水稠涎然後定稍定又思肉啖也其痛苦之態叫喊之厲難狀見之酸鼻或有諭之曰與其好肉而受痛孰若絶肉以無楚也久病脾虛肉入難化故使作痛此婦人女子且知之汝丈夫獨不慎何哉潤曰何吾豈不知絶肉之為愈也蓋痛雖苦尚能熬若嘈雜則遍身淫淫蘇蘇左右無可奈何手足無所把捉頃刻不能自存有近於死不能熬急需食肉少蘇吾豈縱口求痛哉不得已也孫診其脈大小不等觀其色唇紅臉黃孫曰據色脈乃蟲症非祟也豫能殛之先與雄黃丸一服不瘳改用膩粉五分使君子一錢為末用雞子打餅五更空心飼之辰刻下長蟲十條內有二大者長尺有咫自首貫尾皆紅下午又下小蟲百餘自此再不喜肉而嘈雜良愈崇禎時武林姚應鳳有一人患左唇生一紅痣別無他苦姚視之曰此齒藎也三年必死其人怒不應三年齒潰詣求救謝曰君天譴也不能過期矣當湖江希生內政中年時每食豬肉即身體戰栗屢易不效後因他病服逍遙散數劑舊患亦愈汪時在燕京蔣相國家豫過之言及此症並問其故豫曰素問云諸禁鼓栗皆屬於火症由食豬肉戰栗此肝膽素有鬱熱故也因食發風動氣之味徒引動其病而不能力開其鬱故每食即發逍遙散乃開鬱散火之劑所以偶服得愈或問前症每因食物動其內火而何以內火動即戰栗乎豫曰素注云火性就燥內熱即甚衛外之陽皆湊入內故外反鼓栗此症因食物引動其火至內火益熾乃衛外之陽以就火性之燥皆湊入內其重虛其外故即戰栗移時火伏氣靜而衛陽復回病愈如故一婦不月發熱嗽痰如墨疏表轉甚脈之而尺倍數症由經水逆上痰血相混因火極似水故色黑而治表反劇經云人有兩死而無兩生蓋汗即血之液病失血後發其汗血汗兩傷此即兩死無兩生也茲當四物湯加知柏牛膝服四劑經至而愈乙酉春有紹興楊石林雲漕白一人忽患腹大痛約二日許糖粕悉從口出醫無措劑適有醫云此陰陽錯亂腎氣逆上用茯苓五錢數服而愈後又有患者服之亦隨愈黃連解毒湯黃連黃芩黃柏梔子等分水煎服抱龍丸膽星一兩天竺黃雄黃辰砂二錢麝香少許上為末煮甘草汁丸彈子大陰乾每服一丸氣喘有痰加枯礬八物湯生地當歸各三錢芍藥二錢川芎一錢五分木香五分檳榔枯楝延胡索各一錢水煎茶調散瓜蒂茶葉為末每服二錢齏汁調服取吐舟車丸黑牽牛四兩炒大黃一兩酒浸甘遂麵裹煨大戟麵裹煨芫花醋炒青皮炒橘紅各一兩木香五分輕粉一錢水丸浚川丸黑牽牛二兩芒硝一兩郁李仁一兩五錢大黃一兩甘遂五錢輕粉五分水丸薑湯下清胃散升麻五分生地黃丹皮黃連當歸各三分水煎服逍遙散此方加熟地名黑逍遙散柴胡薄荷當歸白芍陳皮甘草茯苓白朮加姜煎歸脾湯人參白朮土炒茯神棗仁炒龍眼肉各二錢黃耆炙一錢五分當歸遠志各一錢木香甘草炙五分薑棗煎四神丸破故紙四兩酒浸炒五味子一兩炒肉豆蔻二兩麵裹炒吳茱萸一兩鹽湯泡用大棗百枚生薑八兩切片同煮棗爛去姜取棗肉搗丸每服二錢鹽湯下四物湯見頭門十全大補湯見手足門六君子湯見目門面夏子益奇疾方云有人患頭面生光他人手若近之如火熾者此中蠱也用蒜汁半兩和酒服之當吐出如蛇狀乃止又云有人患眉毛動搖目不能交睫喚之不應但能飲食此亦中蠱而心迷也方用同上亦當吐出蛇狀而愈源按梅師方云凡中蠱毒或下血如鵝肝或吐血或心腹切痛如有物咬不即治之食人五臟即死若欲知是蠱但令病人吐水沉者是浮者非也用敗鼓皮燒灰方寸匕須臾自呼蠱主姓名搜神記云外姊夫蔣士先得疾下血言中蠱其家密以蘘荷葉置於席下忽大笑曰蠱我者張小小也乃收小小小小亡走自此解蠱毒用蘘荷往往有驗豫考本草蘘荷即今甘露是也又名芭蕉又云有人患面上生瘡瘡上現五色者即用鹽湯浸綿榻瘡上五六度即愈源按經云其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也此症瘡見五色乃熱中有寒也鹽能清火解毒凡煎鹽用皂角收之所以鹽味微辛辛能散寒搜風故愈丁志云臨川有瘤生頰間癢不可忍每以火炙則差止已而復然苦甚一醫告之曰此真蝨瘤也當剖而出之取油紙圍頂上然後施砭瘤方破小蝨湧出無數最後一白一黑兩大蝨皆如豆殼中空空無血與頰肉了不相干略無瘢痕但瘤所障處正白耳張德俊云頃年和倅餘杭人將赴官因蒸降真木犀香自開甑面撲甑上為熱氣所熏面部浮腫口眼皆為之閉更數醫莫能治最後一醫云古無此症請以意療之於是取寺僧久用炊布燒灰成性隨敷隨消不半日而愈蓋以炊布受湯上氣多反用以出毒亦猶以鹽水取鹹味爾醫者之智亦可喜全浙夫人忽一日面上生黑斑數點數日後滿面俱黑遍醫治不效忽過一草澤醫云夫人中食毒治之一月平復後校其方止用生薑汁服之問其故云夫人日食斑鳩蓋此物常食半夏苗耳是以中毒故用生薑以解之羅謙甫治一婦年幾三十憂思不已飲食失節脾胃有傷面色黧黑不澤環唇尤甚心懸如飢狀又不欲食氣短而促大抵心肺在上行榮衛而光澤於外宜顯而不藏肝腎在下養筋骨而強於內當隱而不見脾胃在中主傳化精微以灌四旁沖和而不息其氣一傷則四臟失所憂思不已氣結而不行飲食失節氣耗而不足使陰氣上溢於陽中故黑色見於面又經云脾氣通於口其華在唇今水來侮土故黑色見於唇此陰陽相反病之逆也上古天真論云陽明脈衰於上面始黑故知陽明之氣不足非助陽明生髮之劑無以復其色故以沖和順氣湯主之內經云上氣不足推而揚之以升麻苦平葛根甘溫自地升天通行陽明之氣為君人之氣以天地之風名之氣留而不行者以辛散之防風辛溫白芷辛甘以散滯氣為臣蒼朮苦辛蠲除陽明經之寒白芍酸寒安太陰經之怯弱十劑云補可祛弱人參羊肉之屬人參黃耆甘草甘溫補益正氣為佐至真大要論云辛甘發散為陽生薑辛熱大棗甘溫和榮衛開腠理致津液以復其陽故以為使每服早飯後午飯前取升陽之時使人之陽氣易達故也數服而愈孫招治一男子因登廁被臭氣熏觸隱忍良久明日滿面皆黑色月餘不散相士斷云於出月外必死至期無羌孫招治以沉香各一兩銼碎安爐中燒熏帳內以被蓋定令病者瞑目端坐候香盡方可出帳明日引鑑照之面上黑色漸散矣平江陳氏因驚駭後常用兩手指甲掐住兩頰至兩頰破損心中懊憹不安脈數而實諸藥不愈用牛黃涼膈丸數服如故一有人患面上麻木不知痛癢名曰木痹此陽明經絡受寒故也以牛皮膠化和桂末厚塗一二分愈表兄屠學山治吳江王殿爵患面腫兼起壘塊如木偶夜叉狀一無痛癢醫治數年不效請學視之學曰面乃陽明部分此因濕邪入陽明絡脈而生痰也經云百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於府廩於腸胃又云邪之始入於皮也溯然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下此症因經未虛其濕邪正留絡脈而未陷下也故但患面部耳然非藥所能治當用砭刺即用小刀刺破唇內齒上斷縫處名斷交穴痰即流外所出稠痰數碗即面目如故繼服補脾調養之劑而安牛黃涼膈丸牙硝石膏甘草各五分膽星二錢五分牛黃紫石英各一錢麝香冰片各五分寒水石煅五錢上為末甘草膏丸緑豆大每一丸陳皮湯下項奇疾方云有人患頭項腫大又非癭瘤忽痛忽不痛外現五色之紋按之半空半實此乃痰病結成似瘤非瘤似癭非癭也方用海藻半夏白芥子南星人參桔梗貝母各三錢茯苓五錢昆布一錢附子一分甘草一錢水煎服此方乃消上焦之痰聖藥也又有海藻昆布以去其癭瘤之外象消其五色之奇紋妙在消痰而仍不損氣則胃氣健而痰易化也一劑知二劑消大半三劑則全消四劑永不再發也續玄怪録云安康伶人刁俊朝其妻巴嫗項生一癭初若雞卵漸大如升積五年大如數斛之鼎重不能行有聲如音樂積數年癭外生小穴如針芒者不知幾千億每天陰欲雨則穴中吹白煙霏霏如線縷漸高布散結為屯云雨則立降其家少長懼之咸請遠送巖穴妻懼送請決折之後朝即淬利刃將及之中軒然有聲逐四分破裂有一大猱跳躍而去即以白絮裹之癭疾頓愈時大定中也後猶有說不具論一婦項下忽生一腫塊漸緣至奶上腫起莫知何病偶用刀刺破出清水一碗日久不合有道人見之曰此蟻漏耳因用飯誤食蟻故耳詢之果然道人云此易治但用穿山甲數片燒存性為末敷遂愈蓋穿山甲蟻之所畏也薛己治一男子素善怒左項忽腫漸大如升用清痰理氣而大熱作渴小便頻濁薛謂腎水虧損用六味地黃補中益氣而愈亦有胸脅等處大如升斗或破而如菌如榴不問大小俱治以前法舉人江節夫項臂脅肋各結一核服祛痰降火軟堅之劑益甚薛為肝膽經血少而火燥也江執前藥至明年六月各核皆潰脈浮大而澀薛斷秋金將旺肝木被克必不起後果然豫郡大人項邊忽癢漸起白痕一條相延漸欲至喉癢不可忍群醫莫識一方士用刀輕開其痕內出白蝨不計其數而愈士云此即蝨瘤之類凡內皮作癢或起痕或高起即是症也補中益氣湯黃耆一錢五分蜜炙人參甘草白朮陳皮當歸各五分升麻柴胡各三分姜三片棗二枚煎六味地黃丸見頭門喉夏子益奇疾方云有人患咽喉生肉一塊層層疊疊漸漸腫起不痛日久有竅出臭氣廢飲食用臭橘葉煎湯連服而愈源按病患腫而不痛或痛而不潰者皆痰也此症生肉喉間層層相疊漸腫不痛亦痰之所為久則但有竅出臭氣乃痰之毒泄於外也若非痰則必痛而潰矣臭橘葉散氣消痰氣散則痰化故服之得愈華他云有人喉中似有物行動吐痰則痛難忍身上皮膚開裂有水流出目紅腫而又不痛足如斗腫而又可行真絶世不見之症此乃人食生菜有蜈蚣子在葉不知而食之乃生蜈蚣於胃口之上入胃則胃痛上喉則喉痛飢則痛更甚也方用雞一隻煮熟五香調治芬馥之氣逼人乘人睡熟將雞列在病人口邊則蜈蚣自然外走若蜈蚣走出之時當即拿住或一條或數條候出盡自愈大約喉中無物走動則無蜈蚣矣當即服全膚湯十劑則皮膚之裂自愈而雙足如斗亦消矣蓋蜈蚣在上焦非藥入能救因藥下後即至胃中而蜈蚣卻在胃口之上故不能殺之也所以引其外出然後以藥調治其氣血自愈皮膚開裂者乃蜈蚣毒氣盤居肺邊肺生毛皮故皮膚開裂兩足如斗足乃腎之部位肺居上為腎之母母病則子亦病然腎水不乏而毒留於腎部故足之皮大而浮非骨之病也所以能走耳眼屬肝肝受肺氣之毒熏蒸故紅腫耳丹溪云有咽痛諸藥不效者此非咽痛乃鼻中生一條紅線如發懸一黑泡大如櫻珠垂掛到咽門而止口中飲食不入惟用深取土牛膝根獨條肥大者搗碎入好醋三五滴同研細滴入鼻中二三點即系斷珠破吐出瘀血立安綱目云有人患飲食食下若別有咽喉斜過膈下經達在脅而作痞悶以手按之則瀝瀝有聲以控涎丹十粒服之少時悶處熱作一聲轉瀉下痰飲數升垂飲食正下而達胃矣竇氏云有一婦年二十三歲懷妊九月矣一日魚骨梗喉間至半日嘔吐繼至以血碗許魚骨尚在喉中忽吐一條約三尺余形如小腸潤五分內有所食魚菜粉皮飯未化家人為推入口中尚餘五寸其夫復納之遂昏倦自此嘔吐不止湯亦不能進延余治之遂將生炭火一盆放病榻前以好醋一碗沃之使醋氣盈滿其室清其神也進以牛黃清心丸腹覺有微痛再用人參一分紅花丹皮當歸川芎生地阿膠煎服五六帖病愈孫東宿治臧少庚年五十每飲食胸膈不順利覺喉管中梗梗宛轉難下大便燥結內熱肌肉漸瘦醫與五香連翹湯五膈丁香散諸治膈之劑嘗試不效孫至觀其色蒼黑目中炯炯不耗惟氣促骨立孫知其有機心人也其脈左弦大右滑大孫謂之曰據脈乃謀而不決氣鬱成火脾志不舒致成痰涎因而血少便燥內熱肌消張雞峰有言膈乃神思間病即是推之子當減思慮斷色欲薄滋味絶妄想俾神思清淨然後服藥有效不然世無大丹而草木石何足恃哉子既遠來豫敢不以肝膈相照茲酌一方頗妥歸即制服其方用桂府滑石六兩炙甘草白芥子各一兩蘿蔔子射干連翹各一兩半辰砂五錢以竹茹四兩煎湯打饅頭為丸緑豆大每食後及夜用燈心湯送下一錢五分一日三服終劑而病如失全膚湯甘草苡仁當歸各一兩白芍五錢黃耆防風各五分荊芥陳皮各一錢水煎服控涎丹甘遂去心大戟去皮白芥子等分為末糊丸臨臥薑湯送下牛黃清心丸見目門
