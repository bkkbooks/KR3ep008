body:
  text: 卷之二耳李樓怪症方云有人耳內生物如棗核大痛不可動者以火酒滴入仰之片時以鉗取出絶根此名耳痔奇病方云有人耳中作癢以木剌之尚不足以安其癢必以鐵刀刺其底始覺快然否則癢極欲死此腎肝之火結成鐵底於耳非湯藥可救方用龍骨一錢皂角刺一條燒存性冰片三分雄鼠膽一枚先將前藥為末後以鼠膽水調勻而後以人乳再調如厚糊一般將此藥盡抹入耳孔內必然癢不可當須人執兩手癢定而自愈矣愈後當常服六味丸庶不再發類編云族人友夔壯歲時苦兩耳作癢每日一作遇其甚時殆不可耐擊刮挑剔無所不至而所患自若常以堅竹三寸許截作五六片細削如洗帚狀極力撞入耳中皮破血出或多至一蜆殼而後止明日復然失血既多為之困悴適有河北醫士周敏道到鄉里因往謁之周曰此腎臟風虛致浮毒上攻未易以常法治也當服透冰丹更戒酒面雞子之類能一月為佳夔用其戒數日癢止而食忌不能久既而復作乃著意痛戒逮於纍旬耳不復癢華他云余治一人耳內忽長肉一條手不可近色紅帶紫余曰此腎火騰燒於耳也用硼砂一分冰片一分點之立化為水後用六味丸大料飲之二料痊愈青箱集云孫兆殿丞治平中有顯官權府尹一日坐堂決事人吏環立尹耳忽聞風雨鼓角聲顧左右曰此何州郡也吏對以天府尹曰若然吾乃病耳遽召孫公往焉公診之乃留藥治之翌日尹如故尹召孫問曰吾所服藥切類四物飲孫曰是也尹曰如慮為大患服此藥立愈其故何也孫曰心脈大盛腎脈不能歸耳以藥涼心經則腎脈復歸故耳楊洪醫方摘要云有人患耳中忽大痛如有蟲在內奔走或血水流出或干痛不可忍者蛇蛻燒存性研末鵝翎吹之立愈經驗祕方也源按此症為肝臟風虛浮火上攻遊移不定因而病患不一蓋蛇屬巽性能平肝祛風故吹之立愈楊起簡便方云一小兒七歲聞雷即昏倒不知人事此氣怯也以人參當歸麥冬各二兩五味五錢水一斗煎汁五升再水一斗煎滓取汁二升燒成膏每服三大匙白湯化下服盡一斤自後聞雷自若矣太平廣記云參政孟庚夫人有奇疾每有見聞即舉身戰栗欲絶其母與弟亦不可見又惡聞打銀鐵聲嘗有一婢周旋已久一日偶聞其家所為業婢曰打銀聞其言疾遂作因逐其婢醫者竟莫能施其術源按前症良由肝氣閉郁郁久則五臟之氣皆鬱而不達不達則清陽不升心氣不舒故惡見聞惡見聞而偶有所觸則怒怒則氣上氣上即鬱火內升故發戰栗即素問所謂諸禁鼓栗皆屬於火是也夫戰栗而氣終不克外泄則火徒亂於中故至幾絶移時火仍內伏故又如故其惡金聲者因肝火虛也及見母與弟亦惡必意有不合復觸其怒耳乃婢初極相合因說打銀而惡亦惡金聲故也蓋肝木鬱久則燥燥則血虛故更惡金克治當用黑逍遙散左金丸滋水舒木使鬱氣暢達則病當愈也楓漾別記云毀仲堪父患耳聰病聞床下有牛鬥聲仲堪視之有兩蟻相鬥耳源按修道之士一旦得道不特聞蟻鬥有聲即纖塵飄落亦能聞之並能聞極遠之聲謂之耳通即內經所謂遊行天地之間視聽八達之外此為神全因心氣下降百脈開通故也若病聞蟻鬥如牛而名耳聰者良由內火衰微正氣下陷因竅虛反聰其耳猶心氣下降以通其脈也治宜補中益氣湯八味丸或問神全之理如何豫曰此道家修煉內丹之事修煉內丹以心為主心乃神之舍神不外遊心常守一又謂之知一即聖門所謂知止而後有定佛氏所謂無住道家守一者為意著元關守而不移一任呼吸往來如河東之船運久則結就聖胎以成真人蓋人身臍下一寸三分為丹田又為氣海丹田之中一陰一陽為太極為元關為黃庭為歸根竅覆命關其名不一凡人之生得父精母血而成胎結胎之始先成兩腎然後布生五臟及筋骨皮肉所以人之元氣發於腎兩腎中間一陰一陽即謂之太極是名歸根竅覆命關也命之根蒂在於此矣若人呼吸息息歸根為之歸根覆命大凡呼吸其氣止在胸中而不歸根不復命也覆命是接續其命使之不絶蓋氣歸根則氣壯氣壯則精盛久則體變純陽而為至真何得有六淫七情相感而至殞命乎經云凝神入於氣穴一任真息往來升降於黃庭之中旋曲委宛由心而運至丹田將太陽之精從元關渡尾上夾脊雙關風府泥丸下明堂過鵲橋鼻為上鵲橋舌為下鵲橋降玉池化為甘津咽下重樓復入丹田上下往來周而復始如門之有樞車之有轄而轉運不息也凡修煉工夫有一分一分證驗有十分十分證驗難以強得心惟專一而不縱橫寢寐之際與神相抱切不可昏迷而沉於夢境覺悟之後常候丹之或存或亡以為證驗由是至寶蘊於中精華髮於外容顏浸潤骨節堅強得此丹頭晝夜運火煉去陰氣然後十月胎圓體變純陽從此工夫不輟俾和氣周匝於一身溶溶如雲霏霏如雨淫淫然若春澤之滿池液液然象河水之冰釋當此之時仙道已成看山河如在掌中視無不見聽無不聞此即謂之神全也又問呼吸升降如河車之船運一任真息往來然其氣下降丹田則易而欲任其上升泥丸則難豫曰若能息念行火以神為用其氣自升所運之時舌宜抵齶口目當閉不閉則氣不歸神神雖至泥丸而氣不能隨神而至也若工夫日久則陽勝陰消自然而仙又問意著元關當守而不移而無如心猿意馬難以拘定奈何豫曰經云起念即覺覺後即無久久純熟自不走也又云此心由來依境未慣獨立難以自安縱得暫安還復散亂隨時隨制務令不動久久調和馴熟此心自能安閒無問晝夜行住坐臥及應事之時當須作意安之若心得定即須安養莫有觸惱少得安閒即堪自樂且牛馬家畜也放縱不收猶自生梗不受駕御鷹鸇野鳥也為人羈維終日在手自然調熟心亦自是若放逸縱任不收一任粗疏何能觀妙又問何為又有嬰兒奼女黃婆為媒之說豫曰心即奼女腎即嬰兒脾即黃婆蓋心屬陽為離離卦中虛為陽極生陰故反為奼女離因一陰居內為宅中之女故名曰奼腎屬陰為坎坎卦中滿為陰極生陽故反為嬰兒脾屬坤土坤為老陰其色黃故為之黃婆居坎離之間主運行其氣若無此土運行則奼女焉得歸入洞房與嬰兒交媾成胎乎故曰黃婆為媒猶外丹坎離為藥物坎即鉛水離即水中金此金即在鉛中求出為之兌金是也猶人真一水中內有真一之氣焉有此真一之氣則能成內丹有此水中之金則能成外丹也乾坤為土釜乾為上釜坤為下釜釜乃運火之具若無土釜則坎離藥物焉得轉而成胎乎內外二丹總歸一理也或又問佛氏無往之語如何豫曰無往謂外無往外相內無住內相然內無住則外亦無住無住而住則心自降伏真性亦自然而見真性即名真如天然正覺謂之真無一不知謂之如故謂之真如即聖經所謂明德也明德真如皆明性之本體本體無形無形亦無所去來惟天生自如而未嘗少動也蓋人生而始有天然自覺之性只緣情欲障礙則智慧全失故心嘗昏昧若欲超生死而入涅槃者當返觀其內所觀之法即所謂內無住外亦無住無住而住則心自寂而相自滅也金剛經云凡所有相皆是虛妄若見諸相非相即見如來佛所演是偈因試問空生可以身相見如來否答曰不可以身相得見如來如來所說身相即非身相言所說之如來非身相如來故云即非身相佛因即告凡內觀見相皆是虛妄生相若能滅除虛妄諸相而但見空空之性即如來矣蓋如來即是性自性如來誠空而無相故經末復演說不取於相如如不動言如來不可取相所演說者但如如不動而已如如即真性空也故不動也人當返觀真空如如則相自滅而心自住也此即謂之即性而修蓋性即佛修佛即所以修性佛即法故又不可以佛法名之即經云所謂佛法者即非佛法猶恐人泥佛法耳又云是法平等無有高下法即謂真性平等言上自諸佛下至蠢動含靈其真性皆同故云平等而無有高下即所謂無梵語阿上褥多羅正三等藐正三覺菩提也蓋真性即佛以真性無得而上之故云無上然此性正相平等故云正等其覺無偏無虧故云正覺然所演說真性不曰如而曰如如凡一切為聖為賢為仙為佛總是一如故名如如所謂如來者即諸法如義耳如所修之人已登彼岸而謂之如來若如未來之時當十二時中無一息不內照真空則真性自現現即所以入涅槃而成正覺也正覺即知其如來如來者從真如來故能成正覺以化衆生而為之如來佛也凡菩薩謂之覺有情同佛所證之謂覺無明未盡之謂情因無明未盡不能滿覺故尚有情耳又問不取於相如如不動又即續何以故一切有為法如夢幻泡影如露亦如電應作如是觀言人能發菩提心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼以滿無量阿僧祗即無數之謂世界七寶持用布施觀此若修佛者應作六如觀之蓋六如有形而無體性若作是觀使心易於降伏故復演說此偈以作降伏之法而謂之有為法乎豫曰佛言不取於相如如不動又恐不悟無相之理故即云一切有為法應作六如觀之蓋六如乃速於變滅之物凡世間一切有為之法猶六如之變滅無常應作是觀始之有為法非修持之法蓋佛法無為無為應無所往而生其心也若將六如以作內觀之法豈非有住於心乎況佛有云如來於燃燈佛所於法本體失而性反昧矣性有元性有氣質性元性即先天之氣氣質性乃後天之氣也先天之氣即天所賦之靈光名曰祖氣又名真種子後天之氣乃父母以情而育體故媾形之時情動於內所動之情即交感之氣乃即為之後天氣也因有是氣故每遇物而生情即名氣質性耳有此性則本性漸失而此性日長也若能徐徐劃除則本元自見而心之所知無不盡矣又問人有先後二天之氣後天之氣得之父母媾形之時先天之氣從何入乎豫曰人因先有先天之靈氣然後有後天之氣質性當未媾形時其情未動故乾坤之間但有先天之氣已媾之後坎離兩破情已內感故又有後天之氣也若不先有是氣而何得有先天之名乎又問人之幼時性本不昧因腎陽未足故爾不靈若人或病或老年腎陽不足宜亦茫然無知何故仍知覺乎豫曰幼時腎陽未足猶冬至一陽初生時陽氣漸長其氣漸升以壯太陽之光萬物皆生也人得腎陽漸長以益其性則知覺自靈若或病或老年腎陽不足猶夏至一陰生也一陰漸生則太陽燥烈萬物皆萎此腎陽衰而陽反上浮故仍知覺若不知覺則腎陽絶而死矣又問小兒為純陽之體若人之幼時腎尚未足而何得有純陽之名乎豫曰凡父母媾精成胎不論男女總以父之陽精為主母之陰血不過隨精施化以成胎出胎之後陰少於陽即食乳亦但長陽而不陰也所以孩提時體皆白而有神此時名純陽者實因陰少於陽並非因腎陽足而名之也一食五殼其色漸蒼乃五殼長陰故也所以仙人十月胎圓之後斷除殼食恐陰血日長不能速成純陽之體也又問人因氣質用事故所欲多而其性自昧然同有是欲而又有智愚之別何也豫曰此氣之清濁所分也得氣清者欲雖多而清靈得氣濁者欲雖少而心昏又問何故人有氣清氣濁之分豫曰氣之清濁定於結胎時若時在半夜天氣清和陰陽遞嬗之時再得父母不食濁味及心氣和平之候交而成胎其氣自清若胎結日中其子必忤逆或值風雨交作之時或父母食濁味及酒後其氣必濁若遇疾風暴雨及父母大醉後並心懷不正生子不但氣濁必至頑劣古人所以重胎教也又問人之智愚在結胎時得氣之清濁所定乃有雙胎而所生各異何故豫曰雙胎因母之陰精衝開父之陽精而成如結胎之始居母腹之左則腎之原根足居右則不足左者氣血發原之所故足於左而不足於右猶天地生物同一土也而有壯弱之莖焉夫智愚總隨氣之清濁施化然智有過不及愚有甚不甚又隨腎原足不足所分如雙胎得氣皆清居左則腎原足則智常過中居右則不足則智常不及得氣皆濁而左居之則濁愈盛愚亦愈甚也王肯堂治百戶張錦耳內不時作痛痛而欲死痛止如故診其脈皆安靜非病也話間痛忽作王度其有蟲令即取貓尿滴耳果出一臭蟲遂不復作或用麻油滴之則蟲死難出或用炒芝麻枕之則蟲亦出但不及貓尿之速也源按蟲入耳中不獨壁蝨臭蟲如蚰蜒狀類蜈蚣而細甚者亦能為害昔有人晝臥忽蚰蜒入耳漸覺腦痛知其入腦莫能為計一日將午飯就案而睡睡中忽噴嚏覺有物出鼻視之有雞饌置案蚰蜒已居其上所痛隨愈又一人患蟲入腦而痛或教以桃葉函枕一夕蟲自鼻出狀如鷹嘴人莫識其名透冰丹川大黃山梔仁蔓荊子白茯苓益智仁葳靈仙白芷各五錢香墨燒醋淬干細研麝香各一錢茯神六錢川烏二兩水浸半月切片焙乾用鹽水炒天麻仙靈脾葉洗焙上為細末煉蜜和如麥飯相似以真酥塗杵臼搗萬杵如干旋入蜜令得和丸如梧子大用薄荷自然汁同溫酒化兩丸如卒中風涎潮昏塞煎皂莢白礬湯溫化兩丸升陽散化湯柴胡八錢防風二錢五分葛根升麻羌活獨活人參白芍五錢炙甘草三錢生甘草二錢每服五錢加薑棗煎左金丸黃連六兩薑汁炒吳茱萸一兩鹽水泡水丸六味地黃丸見頭門補中益氣湯見項門八味丸見手足門黑逍遙散見口門鼻夏子益奇疾方云有人忽鼻中出毛晝夜可長二三寸漸漸粗圓如繩痛不可忍摘去復生此因食豬羊血過多所致用生乳香硇砂各一兩為末飯丸梧子大每服空心臨臥各服十丸開水送下服儘自落奇病方云人有鼻中生紅線一條長三尺許少動則痛此飲酒過多而然方用硼砂一分冰片一分研為末以人乳調之點紅線中間自愈又云有人患鼻大如拳疼痛欲死此乃肺經之火熱壅於鼻而不得泄法當清其肺邪去其鼻間之火服解壅湯數劑自消此方全在群入肺經以去其邪故治隨愈此奇病而以常法治之者也酉陽雜俎云永貞年有東市富翁王布知之女年十四五患鼻孔各隨息肉如皂莢子其根細如麻絲長寸許觸之痛入心髓其父破錢數百萬治之不瘥忽一日有梵僧乞食因問布知君女有異疾吾能治之布喜即就治僧隨取白色藥吹鼻孔少頃摘去之出黃水都無所苦賞之百金不受而去源按息肉由胃中食積熱痰流注古方俱用硼砂白礬消此二味色俱白前案所吹之藥白色者或即此也集異記云狄梁公性好醫藥尤妙針術顯慶中應制入關路旁大榜云能療此兒酬絹千匹有富室兒鼻端贅如拳石綴鼻根蒂如筋痛楚危急公即腦後下針疣贅應手而落其父母備干絹奉焉公不顧而去聖惠方云有小兒患腦疳鼻癢不止毛髮作穗身體黃瘦用鯽魚膽滴鼻中數日取效醫學正傳云有人患腦崩流汁鼻中時流臭黃水兼痛名控腦砂有蟲食腦中故也用絲瓜藤近根三五尺燒存性每服一錢溫酒下以愈為度許學士治檢正患鼻額間痛或麻痹不仁如是數年忽一日連唇口頰車髮際皆痛不能言語飲食皆妨許作足陽明經受風毒傳入經絡血凝滯而不行故有此症或以排風小續命透髓丹之類與之皆不效制犀角升麻湯贈之數日愈夫足陽明胃也經云腸胃為市又云陽明多血多氣胃之中腥膻五味無所不納如市廛無所不有也以其熟腐飲食之毒聚於胃此方以犀角為主解飲食之毒也陽明經脈環唇挾舌起於鼻合額中循頰車上耳前過客主人循髮際至頭顱今所患皆一經絡也故以升麻佐之余藥滌除風熱升麻黃芩專入胃經稍通者自能曉史載之治朱思古眉州人年三十歲得疾不能食聞葷腥即嘔惟用大鐺旋煮湯沃淡飯食之醫莫能治史曰俗皆不讀醫經而妄欲療人之疾可嘆也君之疾正在素問經中名曰食掛凡人之肺六葉舒張而蓋下覆於脾子母氣和則進飲食一或有疾則肺不能舒脾之氣敝故不嗜食遂授一方清氣順肺為治服之三日病者鼻聞肉味覺香取啖之甚美此事宋人載於傳記江篁南云余考之岐黃書皆無食掛之說或記者假託耳或史公大言以欺世歟皆未可知也孫東宿治太學孫中叔以暑月赴南雍一日轉班出索茶飲飲輒逆流左鼻茶入腹者十之三幾一月不惟茶水為然粥飯亦多從鼻出漸加噁心頭暈肌肉削四肢無力心益惴惴亟歸就孫治孫云諸醫認何症投何藥中曰醫皆謂諸逆上衝皆屬於火故投劑非黃連解毒即三黃石膏梔子黃柏知母天花粉葛根之屬孫曰治病貴辨明經絡與經絡之出納虛實明藏象察經度究竟夫病機病能此扁鵲所以隨俗為變也何嘗拘拘守方書哉內經有云咽喉者水穀之道路也喉嚨者氣之所以上下者也頑顙者分氣之所泄也人之鼻淵涕出不收者頑顙不開也子之症亦頑顙不開之類爾頑顙不開故氣上而不下會厭弱而不能掩其氣喉夫鼻與氣喉相通惟不掩故飲食逆從鼻竅而出不見常人偶氣逆而飲食自噴嚏出乎即其例也且右脈緩弱無力氣虛明矣內經云形寒飲冷則傷肺又曰脾胃喜溫而惡寒又云視聽明而清涼香臭辨而溫暖子多服寒涼此所以噁心頭暈肌削也症當溫補蓋肺屬金而主氣金氣旺則收斂不降氣下降則飲食從氣下矣以六君子湯加辛夷桑白皮苡仁沉香一進而緩三進止大半七劑全安明宗室富順王一孫嗜燈花但聞其氣即哭索不已時珍診之曰此癖也以殺蟲治癖之藥丸服一料而愈解壅湯黃芩甘草麥冬花粉各三錢桔梗天冬各五錢紫菀二錢蘇葉百部各一錢水煎服犀角升麻湯犀角十兩升麻防風羌活各三兩川芎白附子白芷黃芩各五錢甘草一錢上用四錢水煎食後臨臥各一服一日共服四次六君子湯見目門舌奇病方云人有患舌縮入喉嚨乃寒氣結於胸腹之故急用附子肉桂乾薑各一錢白朮五錢人參三錢服之則舌自舒矣又云有人患舌吐出不肯收進乃陽火盛強之故以冰片少許點之即收繼服全舌散二劑自安丁志云臨安民有因患傷寒舌出過寸無能療治但以筆管通粥飲入口每日坐於門一道人見之咨嗟曰吾能療此頃刻聞耳奈藥不可得當竭力訪之不肯告而去明日又言之至於旬時會中貴人罷歸下馬觀病者道人適至其言如初中貴問所須乃梅花冰片也笑曰此不難耳即遣僕馳取以付之道人即研為末糝舌上隨手而縮凡用五錢病立愈王明清余話云王貺字子亨本士人為南京宋毅叔壻毅叔醫名擅南北貺初傳其學未精薄遊京師甚悽然會鹽法有變有大賈觀偈示失驚𠰢舌遂不能復入經旬遂不食下咽尪羸日甚國醫不能療其家憂懼榜於市曰有治之者當以千萬為謝貺利其所售之厚始往應其求既見賈之狀忽發笑不能止心以未易措手也其家人怪而詰之貺診為大言笑之曰所笑輦轂之大如此乃無人治此小疾耳語主人家曰試取針經來貺漫檢之偶有與其疾似是者貺曰爾家當勒狀與我萬一不能治則勿擾我我當為針之可立效主病者不得已亦從之即針舌之底抽針之際其人若委頓狀頃刻舌遂伸縮如平時矣其家大喜謝之如約又為之延譽是時翕然名動京師家既小康始得盡心肘後之書卒有聞於世事之偶然有如此者貺後以醫得幸宣和中為朝請大夫著全生指迷論醫者多用之聖惠方云有人忽舌硬如鐵血出不止用木賊煎水漱之即愈源按經云心脈系舌本脾脈絡舌旁系舌下故舌病多二經之所致也又云心熱則生瘡脾熱則強硬舌尖腫脹疊厚為重舌舌腫硬而不柔和挺然脹滿或出口者為木舌乃心脾二經之火上壅急以針砭刺出毒血以殺其標然後以瀉心脾之藥治其本可也觀此則舌硬如鐵而血出不止則火已開泄可不用針砭獨用木賊一味升散火邪乘其勢而提之故但漱而愈良方云一人無故舌上出血仍有小竅醫者不曉何疾偶曰此名舌衄炒槐花為末摻之而愈又云人有患舌痹或麻此痰氣滯於心胞絡也服順氣豁痰湯自愈源按舌痹亦有患心血不足不可作風熱及痰治須用理中湯合四物湯治之立密雲先兄口舌糜爛痰涎上湧飲食如常遇大風欲撲地用補中益氣湯及八味丸即愈間樂數日仍作每勞苦則痰盛目赤漱冷水舌稍愈頃間舌益甚用附子片含之即愈服煎藥諸症方痊醫說云一人中仙茅毒舌脹出口漸大與肩齊即以小刀剺之隨破隨合剺之百數始有血一點曰可救矣煮大黃朴硝與服以藥摻之應時消縮此皆火盛性淫之人過服之害也戴人治南鄰朱老翁年六十餘歲身熱數日不已舌根腫起和舌尖亦腫腫至滿口比原舌大三倍一外科以燔針刺其舌兩旁下廉泉穴病勢轉凶戴人曰血實者宜決之以排針磨令鋒極尖輕砭之日砭八九次出血約二三盞如是者三次漸覺血少病減腫消夫舌者心之外候也心主血故血出則愈又諸痛癢瘡瘍皆屬心火燔針艾火皆失此義也薛新甫云凡舌腫脹甚宜先刺舌尖或舌上或邊旁出血泄毒以救其急惟舌下廉泉穴此屬腎經雖當出血亦當禁針慎之甄立言治一婦正産之時收生婦以溫水進之誤用鹿角脂女子塗鬢髮也因哇而舌出産後數日不能收醫藥屢不應甄以硃砂塗其舌仍命作産子狀以兩婦人掖之乃使人潛於壁外多奉缶器向危處擲地作聲聲聞而舌收矣薛己治一小兒舌斷半寸許敷洪寶丹服四物湯加柴胡痛定血止次服四君子湯加柴胡山梔月餘而舌自完源按小兒跌撲斷舌須乘熱接上古法急用雞子輕擊周圍去硬殼取膜套舌以洪寶丹敷膜上自然接續若良久舌已冷不必用接但以洪寶丹敷之其舌亦生豫同郡有一富家婦年五十餘忽一日舌出不收別無他恙醫作風痰治不效一醫於風痰藥中加蘄蛇舌一枚煎服而愈全舌散黃連人參白芍各三錢柴胡菖蒲各一錢水煎服順氣豁痰湯半夏一錢半茯苓橘紅栝蔞貝母黃連桔梗枳殼各一錢香附七分甘草四分姜三片水煎服理中湯白朮土炒二錢人參乾薑炮甘草各一錢水煎服洪寶丹天花粉三兩薑黃白芷赤石脂各一兩上為末茶湯調敷患處補中益氣湯見項門八味丸見手足門四物湯見頭門
