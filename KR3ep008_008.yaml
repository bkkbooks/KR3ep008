body:
  text: 卷之八溺孔張仲景云有婦人陰吹陰戶中喧搏聞聲為胃氣下泄穀氣實使然用豬膏發煎導之豬膏半斤亂髮雞子大者三枚和煎發消藥成矣分再服病從小便出也魏夫人怪病方云有一婦産後用力垂出肉線一條長三四尺觸之痛引心腹欲絶一道人令買老薑皮三斤搗爛入麻油二斤拌勻灼干先以熟絹五尺折作方結令人輕輕盛起肉線使之屈折三圍納入産戶乃以絹袋盛薑就近熏之冷則更換熏一日夜縮入大半二日盡收也但不可使線斷斷則不可治矣經驗方云一婦人陰戶出一線有兩年餘用倍子末敷陰中而愈夏子益奇疾方云有婦人因生産陰陽易位前陰出糞名曰交腸取舊幞頭燒灰酒服再間服五苓散分利之如無幞頭凡舊漆紗帽皆可代之此皆取漆能行敗血之故耳丹溪云有馬希聖年五十餘性嗜酒常痛飲不醉糟粕出前竅便溺出後竅六脈皆沉澀與四物湯加海金沙木香檳榔木通桃仁服之而愈此人酒多氣肆酒升而不降陽極虛酒濕積久生熱煎熬血乾陰亦大虛陰陽偏虛時暫可活者以其形實酒中谷氣尚在三月後其人必死後果然又云一婦年五十嗜酒痛飲不醉忽糟粕出前竅尿溺出後竅脈沉澀與四物湯加海金沙木香檳榔木通桃仁八帖而安又云一婦年三十餘産二日産戶下一物如手帕有二尖約重一斤余此胎前因勞役傷氣成肝痿所致卻喜不甚虛其時天寒急以炙耆白朮升麻各五分參歸身各一錢連與三劑即收上得汗通身乃安其黏席凍乾者落一片約五六兩蓋脂膜也脈澀左略弦形實與白朮芍藥當歸各一錢半陳皮一錢薑一片二三帖養之又云一婦産後陰戶下一物如合鉢狀有二歧此子宮也氣血弱故隨胎下之用升麻當歸黃耆大劑服二次更用皮工之法以五倍作湯洗濯皴其皮後覺一響而收入但經宿著席破落一片如掌大心甚恐慰之曰此非腸胃比肌肉破尚可復完以四物湯加人參數十帖三年後復生一子又云鮑兄年三十玉莖挺長腫而痿皮塌長潤磨股不能行兩脅氣上手足倦弱先以小柴胡加黃連大劑行其濕熱略加黃柏降其逆上之氣其挺腫漸收漸減其半但莖中有堅塊未消遂以青皮一味為末為君佐以散風之劑末服外以絲瓜汁調五倍子末敷而愈又云鄭子敬酒後飲水及水果腎偏大時作蛙聲或作痛炒枳實一兩鹽炒茴香炒梔子各三錢煎湯送下保和丸而愈又云一人膀胱氣下墜如蛙聲臭橘核炒十枚桃仁二十枚蘿蔔汁下保和丸七十丸奇症方云有人患玉莖不痿精滑無歇時時如針刺捏之則痛其病名強中乃腎滯漏疾也用破故紙韭子各一兩為末每服三錢水二盞煎六分服日三次愈則止又云一婦人生蟲一對於地能行長寸余自後月生一對醫以苦杖加打蟲藥為丸服之又生蟲一對埋於土中過數日發而視之暴大如拳名子母蟲從此絶根危氏方云有女人月事退出皆作禽獸之形欲來傷人先將綿塞陰戶乃頓服沒藥一兩白湯調下即愈源按此症必不正之氣感於子戶其月事因隨所感而化生怪物也沒藥散結氣通滯血使氣散血通則怪物消而邪自滅也孟詵食療本草云有婦人産門患蟲疽痛癢不可忍用杏仁去皮燒存性杵爛綿裹納入陰中取效集簡方云有婦人産後因陰戶燥熱遂成翻花急用澤蘭四兩煎湯熏洗二三次再以枯礬煎洗之即安千金方云有人陰冷漸漸冷氣入陰囊腫滿欲死日夜痛悶不得眠生椒擇之洗淨以布帛著丸囊令厚半寸許須臾熱氣大通再與之取出瘥又本事方許學士云曾有人陰冷冷氣入陰囊腫滿而痛晝夜不得眠煮大薊汁服之而痊瑣碎録云思村王氏子生七日兩腎縮腹一醫用硫黃吳茱萸研大蒜塗其腹又以蛇床子熏之愈蓋初受寒邪故也雞峰備急方云有老人腎硬此腎臟虛寒內腎結硬雖服補藥不入用羊腎子一對杜仲長二寸闊一寸一片同煮熟空心食之令內腎柔軟然後服補藥三十六黃方云有人走精面目俱黃多睡舌紫甚面裂名走精黃病若爪甲黑者死用豉半兩牛脂一兩煎過綿裹烙舌去黑皮一重濃煎豉湯飲之又云房勞黃病體重不眠眼赤如朱心下塊起若瘕十死一生宜烙舌下灸心腧關元二七壯以婦人內衣燒灰酒服二錢臨汀集要方云葉朝議親人患血淋流下便在盆內凝如蔎蒻久而有變如鼠形但無足爾百治不效一村醫用杜牛膝根煎濃汁日飲五服名地髓湯雖未即愈而血色漸淡久乃復舊後十年病又作服之又瘥江篁南云休寧金舉人常語人曰豫常小腹甚痛百藥不應一醫為灸關元十餘壯次日莖中淫淫而癢視之如蟲出四五分急用鐵鉗扯出長五六寸連日蟲出如是痛不復作初甚驚恐後則視以為常皆用手扯此亦偶中也仲景云火力雖微內攻有力蟲為火力所逼勢不能容故從溺孔出也其人善飲胃內膀胱不無濕熱遇有留血瘀濁則附行蒸郁為蟲矣經云濕熱生蟲有是理也王逋肱蚓庵瑣語云新安程孝廉名光禮字奕先奉呂祖甚虔忽有黑氣入褌中似覺婦女之陰相接其精大泄符藥不愈一日遇一道人教其佩麝香可愈初佩不多未驗後佩兩餘其祟遂絶豫友盛鶴江親聞奕先自述如此東軒主人述異記云紹興周山吳公弼妻章氏病痿十餘年忽變淋漓小便不通臥床不起醫藥罔效有老姨婆年八十餘曰此症我曾見過非藥可治必産一石卵方愈衆皆不信又年餘至康熙三十七年五月産一石卵大如鵝蛋光滑有細紋以斧擊之毫無所傷其卵至今尚在章氏前症霍然俱愈青林治一婦産後因子死經斷不行者半年一日小腹忽痛陰戶內有物如石硬塞之而痛不禁衆醫莫識青林曰此石瘕病也用四物加桃仁大黃三稜檳榔元胡附子澤瀉血竭三劑而愈李東垣治一富者前陰間嘗聞臊臭又因連日飲酒腹中不和求東垣治之曰夫前陰者足厥陰之脈絡陰氣出其挺末臭者心之所主散入於五方為臭入肝為臊臭此其一也當於肝中瀉行間是治其本後於心經瀉少衝以治其標如惡針當用藥治之治法當求其本連日飲酒夫酒者氣味俱能生濕熱合於下焦為邪故經云下焦如瀆又云在下因而竭之酒者是濕熱之水亦宜決前陰以去之是合下焦二法治之龍膽瀉肝湯是也呂滄洲治一人年五十餘色蒼黑素善飲忽玉莖堅挺莫能沾裳不能屈腰作揖常以竹篦為彎弓狀攔於玉莖之前但小溲後即欲飲酒否則氣不相接蓋濕熱流入厥陰經而然也專治厥陰濕熱而愈一寵妾年三十餘凡交合則覺陰中隱痛甚則出血按其脈兩尺沉滯而澀用補血散寒之劑不愈因思藥與病對服而不效恐未適至其數也偶檢千金方用蛇床子散綿裹納其中二次遂愈薛己治一産婦子宮歷大二日方收損落一片殊類豬肝面黃體倦飲食無味內熱晡熱自汗盜汗用十全大補湯二十餘劑諸症悉除仍復生育唐與正治吳巡檢病不得溲臥則少通立則不能點滴遍用通藥不效唐問其平日自制黑錫丹常服因悟曰此必結砂時硫飛去鉛不死鉛入膀胱臥則偏重尤可溲立則止塞水道故不通取金液丹三百粒分十服瞿麥湯下鉛得硫則化水道自通孫東宿治都察院衷洪溪發熱口渴因解燥渴而過食冰浸瓜梨遂成泄瀉小水短少醫以胃苓湯加滑石木通車前利之而瀉止大便又因之結燥艱澀不堪乃用潤腸丸復瀉不止又進以前通利之劑瀉雖止而小便不得流通直遂臍下脹急立起解之則點滴不出臥則流之不竭以頻取夜壺至通宵不得寐也治半年餘而精神削寢食廢孫至告其受病之源探其脈兩寸短弱關緩大兩尺洪大曰此余暑未解因素善飲濕熱流於下部也先以益元散三錢煎香茹湯進之略無進步次早復診六脈如昨孫思之而恍然悟曰此症尿竅不對也內經云膀胱者脬之室也脬中濕熱下墜故立解而竅不對小水雖滑滑而流亦不能通達直遂故了而不了也治惟提補上中二焦元氣兼清下焦濕熱斯得矣又有一法今氣虛下陷已久一二劑未能取效安得復枕而睡且此不寐非心血不足之故因著心防間小便之了而不了而不敢寐也暫將布襯於席上不必防而其流出又免取夜器而勞動其神自然睡熟矣以補中益氣湯加黃柏知母祛下焦之濕熱夫清熱升則濁陰自降脬無濕熱則不下墜竅可對而病可瘳矣服之嗒然一睡神氣頓回如未病者調理四日而病即安李寅齊患血淋二年不愈每發十餘日小水艱澀難出竅痛不可言將發必先面熱牙疼後則血淋前數日飲湯喜溫再二日喜熱又二日非冷如冰者不可燥渴之甚令速汲井水連飲二三碗猶以為未足未發時大便燥結四五日一行已發則瀉而不實脈左寸短弱關弦大右寸下半指與關皆滑大兩尺俱洪大據此中焦有痰肝經有瘀血也法當去瘀生新提清降濁用四物湯加杜牛膝補新血滑石桃仁消瘀枳實貝母以化痰山梔降火柴胡提清氣二十帖而諸症漸減再以滑石黃柏知母各一兩琥珀小茴香桂心各一錢半元明粉三錢海金沙沒藥各五錢茅根汁熬膏為丸每服一錢空心及晚茅根湯送下而愈一婦腹中微疼經行不流利喉痛四肢麻木作戰不知飢餓左脈洪大如豌豆大以川烏香附麥芽山楂烏梅粉草桔梗酒芩防風荊芥白朮茯苓四劑而安次月經水大行十日不止以黃耆阿膠蒲黃各一錢白芍二錢甘草三分一帖而止此後但覺濁氣下墜屁從子戶出以補中益氣湯加黃連調養而平一婦每月汛行子戶旁輟生一毒脹而不痛過三五日以銀簪燒紅刺破出白膿盞余而消不必貼膏藥而生肉無疤痕初間用針刺近只以指掐之膿即出但汛行即發或上下左右而無定所第不離子戶也於今八年內外科歷治不效且致不孕孫思兩日而悟也此中焦濕痰隨經水下流壅於子戶也經流而痰凝故化為膿以原非毒故不痛用白螺螄殼火煅存性為君南星半夏為臣柴胡甘草為佐麵糊為丸令早晚服之未終劑而汛行不腫次年生子一僕婦因産難而子宮墜出戶外半月不收艱於坐臥家貧不能求醫憂恐成痼有專科云只須用補中益氣湯一百帖每帖用人參三錢計二斤可收也其夫謝云農家朝傭暮食無隔宿之儲安有人參二斤可服也唯命是俟耳有人對孫言之孫曰此必産時受寒血凝滯不能斂而收入症雖名陰脫未必盡由氣虛下脫也觀其善餐而大小便如常可知矣豫有一法價廉而功省三五日可瘳也用未經水石灰一塊重二三斤者又以韭菜二三斤煎湯置盆中將灰投入灰開湯沸看沸聲盡乃濾去灰帶熱坐於盆上先熏後洗即以熟韭菜於患處探挪蓋石灰能散寒消血韭菜亦行氣消血一日洗一次如法洗之初極爽快洗三日果消軟收入一人莖頭腫大如升明亮如水泡一醫作濕痰流下以二陳加升麻青黛牡蠣二劑而愈金液丹石硫黃十兩研碎用瓷盒盛以水和赤石脂封口鹽泥固濟曬乾地內先埋一罐盛水令滿安盒在上用泥固濟慢火養七日七夜候足加頂火一斤煅候冷取出研末每一兩用蒸餅一兩水浸為丸如梧子大每服三十丸清晨米飲下小柴胡湯柴胡人參半夏黃芩甘草薑棗煎服龍膽瀉肝湯龍膽草酒炒黃芩梔子澤瀉木通車前當歸酒炒生地酒炒柴胡甘草水煎服六黃湯黃耆黃柏黃芩黃連生地黃熟地黃水煎服五苓散見胸門四物湯見頭門十全大補湯見手足門補中益氣湯見項門保和丸見目門肛門黃帝氣厥論篇曰肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也注云腎氣凝寒不能化液大腸積水而不流通故其疾行則腸鳴而濯濯有聲如囊裹漿而為水病也所治葶藶丸夏子益奇疾方云有人患大腸頭出寸余痛苦干則自落落又出名為截腸病腸盡則死但初覺截時用器盛脂麻油坐浸之飲大麻子汁數升即愈源按此症為風邪客於大腸蓋風性善行因逼迫而下故腸頭外出然風又生燥燥則營血不能貫潤故干而自落落後復迫大腸又下故又幹而落也麻油潤燥祛風以治其外大麻子汁驅一切惡風而更能潤內內外兼治病故即安奇病方云有人患糞門內拖出一條似蛇非蛇或進或出又安然無礙此怪物長於直腸之間非蛇也乃肉也但伸縮如意又似乎蛇法當內用湯藥外用點藥自然消化矣內用逐去殺蛇丹飯前服二劑後外用冰片點之先用木耳一兩煎湯洗之洗後將冰片一分研末而掃掃盡即縮進而愈怪疾奇方云人有患濕熱大腸內蟲出不斷斷之復生行坐不得治以鶴蝨為末水調兩半服自愈肘後方云有人患蟲蝕肛爛見五臟則死以豬脂和馬蹄灰再雞子白調塗其毒氣即能撥出也庚志云趙千山寓居天王寺苦寸白蟲為撓醫者戒云是痰當止酒而以素所耽嗜欲罷不能一夕醉與外舍歸以夜半口乾咽燥倉卒無湯飲適廊廡間有甕水月色下照瑩然可掬即酌而飲之其甘如飴連盡數盞乃就寢逮曉蟲出盈席覺心腹頓寬宿疾遂愈一家驚異驗其所由蓋寺僕日織篦履浸紅藤根水也又云蔡康積苦寸白為病醫者使之碾檳榔為末取石榴東引根煎調服之先炙豬肉一大臠置口中咽咀其津膏而弗食言此蟲惟月三日以前其頭向上可用藥餘日即頭向下雖藥無益蟲聞肉香咂啖之意故空則群爭赴之覺胸中萬箭攻攢是其候也然後用前藥蔡悉如之不兩刻腹中雷鳴急登廁蟲下如傾命僕人以杖桃撥皆連綿成串幾長數丈尚蠕蠕能動宿疾遂愈幼科方云有小兒初生穀道不通多致不救非藥可醫曾有人用銀箸頭燒紅穿通其竅大便始出亦有用玉簪通者陳尚古簪云樓雜説烏程姚莊顧又虎纍葉簪紱習享半郁忽一日促家人持竹批解褲受杖二十後習為常間用稍輕輒加呵責或反於杖杖之必重下乃呼快心如是數年漸覺疼痛而止醫者聞之曰過嗜辛辣發物則熱毒內訌因成奇癢適打散不致上攻否則患疽發背而死矣此富貴人炯鑑也廣陵有一田婦瀉下惡物如油有一鄰童用紙捻蘸之與油無二衆醫莫效孫茲九治之用補中益氣湯十劑及天王補心丹服之而愈旁問其故曰驚氣入大腸也詢之果因驚得此東垣治一人腸澼下血另作一派其血唧出有力而遠射四散如篩春中血下行腹中大作痛乃陽明氣衝熱毒所作也當升陽去濕和血脈以陳皮二分熟地歸身蒼朮秦艽桂各三分生地丹皮生甘草各五分升麻七分炙甘草黃耆各一錢白芍一錢五分名曰升陽去熱和血湯作一服水四盞煎一盞空心稍熱服準繩載無擇翁治脈痔外無形而所下一線如箭或點滴不已此由脈竅中來也用蝟皮丸程仁甫治一兒一歲之內大便三四十日只通一次每通時腹脹盛此乃胎毒熱結所致用玄明粉米飲調下一錢三五次之後不復閉葶藶丸葶藶炒澤瀉椒目桑白皮木豬苓杏仁各五錢為末煉蜜丸梧子大每服三五十丸蔥白湯下不拘時服以利為度逐邪殺蛇丹當歸白芍各一兩蘿蔔子三錢地榆五錢大黃一錢水煎服天王補心丹生地四兩人參元參炒丹參茯神桔梗遠志炒五錢棗仁炒柏子仁炒研去油天冬炒麥冬炒當歸五味子一兩蜜丸彈子大硃砂為衣臨臥燈心湯下一丸蝟皮丸蝟皮炙焦一兩槐花炒艾葉炒黃豬後懸蹄垂甲炙黃十枚盈尺皂角一挺去弦核醋炙黃為細末蜜丸梧子大每服五十丸食前米飲送下補中益氣湯見項門二陳湯見目門
