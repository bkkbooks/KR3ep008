body:
  text: 卷之一頭黃帝奇病論篇曰人有頭痛以數歲不已此安得之名為何病頭痛不當數歲故怪而為問岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛病名曰厥逆帝曰善夏子益奇疾方云有人患頂上生瘡五色如櫻桃狀破則自頂分裂連皮剝脫至足名曰肉人常飲牛乳自愈源按病患頂上生瘡病發於足太陽足太陽之脈從巔頂至足素問云風氣與太陽俱入行諸脈腧散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍肌肉乃陽明所屬太陽受病必入陽明故也此症瘡頂破裂連皮剝脫至足乃二經之風毒盛而行諸脈俞散於分肉之間與衛氣相干所謂其道不利營血不能貫潤因肌肉燥而分裂故皮脫可剝至足不特憤䐜而發瘍也牛乳潤胃解毒使毒散胃潤則氣血復貫而愈奇病方云有人患鳥鵲生於頭上或臂上外有皮一層包之或如瘤狀或不似瘤而皮膚高起一塊內作鳥鵲之聲逢天明則啼逢陰雨則叫臨飢寒則痛百藥不效必須用刀割破其皮則鳥鵲難以藏形乃破孔而出宛似鳥鵲但無羽毛耳鳥鵲出孔之後以生肌散敷之外加神膏三日依然生合源按人身患成形成物或羽或介或裸或鱗皆應五臟所屬而生素問云東方生風風生木在天為風在地為木在臟為肝其色蒼其化榮其蟲毛蟲毛者森森之象也南方生熱熱生火在天為熱在地為火在臟為心其色赤其化茂其蟲羽蟲羽者飛動之象也中央生濕濕生土在天為濕在地為土在臟為脾其色黃其化盈其蟲裸蟲裸者肉體之象也西方生燥燥生金在天為燥在地為金在臟為肺其色白化斂其蟲介蟲介者金甲之象也北方生寒寒生水在天為寒在地為水在臟為腎其色黑其化肅其蟲鱗蟲鱗者水中之象也蓋人身一小天地天應五方所屬而化人應五臟所屬而生前患似鳥鵲而無羽毛此蟲裸肉體之象應中央濕土為病病生於脾也華倫云有一人患頭面腫大如斗看人小如三寸飲食不思呻吟如睡此痰也用瓜蒂散吐之而頭面之腫消又吐之而見人如故矣後用人參白朮散三劑而愈小山怪症方云有人頭皮作癢時有蛆出用絲瓜葉以刀切破搽之候蛆出盡絶根楊氏醫方云有人患頭內有聲如蟲蛀響名天白蟻此肝火為患用茶子為細末吹鼻中愈稽神録云處士蒯亮言其所知額角患瘤醫為剖之得一黑石棋子巨斧擊之不傷缺復有足脛生瘤者因至親家為狾犬所齧正齧其瘤其中得針百餘枚皆可用疾亦愈源按瘤生棋子及針者此具患病於肺肺為西方金金乃堅剛之象即經所謂其性剛其化堅斂是也注云性剛故催鐵於物堅斂收斂堅強金之化也一人發生水珠如汗滴不止用甘草一斤煎湯三四碗作三四服其水即止此症自幼年間服藥過多故也源按此症因服藥過多良由少年性淫過服藥石藥毒聚於腎間積久始發也蓋發屬腎藥石之毒逼迫腎中之水氣升外故發生水如汗滴甘草善解金石藥毒故獨用此然此症腎未全虧故尚有腎氣升外否則必發奇毒矣王節齋治一婦始言頭痛頭痛已又心痛作心痛已又目睛痛相去無瞬息每頭痛甚欲去大石壓之心痛作則以十指抓壁血流滿掌痛定目復痛又以兩手自剜取之如是十日衆醫莫措進黑龍丹半粒疾少減中夜再服之服即閉目寢如平昔至平旦下一行約三升許如蝗蟲子三疾皆減半巳刻又行則頓愈矣張子和治一僧頭熱而痛更畏明以布圍其巔上置冰於其中日數易之此陽蓄熱也乃灼灰火於暖室出汗湧吐三法並行七日而瘥唐與正治一女年數歲得風疸疾先發於臆迤邐延上赤腫痛癢醫以上膈風熱治之不效唐診之曰是肝肺風熱盛極耳以羌活荊芥鼠黏子赤芍藥淡竹葉桔梗葛根八物治之自下漸退而腫聚於頂其高數寸雖飲食寢處無妨而疾未去也唐母吳夫人曰此女乳母好飲熱酒至並啜其糟疾殆因是歟唐方悟所以至頂不消之由思之惟葛消酒且能療火毒乃以前方加葛三倍服之二日腫盡去又治一少年患頭暈臥床醫作虛治反致頭不能動動即暈絶如是數年惟飲食如故唐曰此肝膽有火因火生痰動即痰火內動故遂暈絶服六黃湯四劑而愈祝仲寧治一婦年二十餘腦生一竅口中咳膿血每咳與腦竅相應而出此肺痿也用參耆當歸退熱排膿之劑而愈又有患胸膺間潰一竅膿血亦口中相應而出亦作肺痿治用前藥而愈翟文炳治陸母年七十頭響耳鳴項疼目眩面麻腮腫齒蘇唇燥口苦舌強咽腫氣促心驚膽怯胸滿痰滯脅痛腰痛足軟膝疼已二年矣復又不得臥惟人扶而坐稍欹臥即垂絶翟診視知氣挾肝火而然先與抑青丸一服即時睡熟醒後諸症如失接服補中益氣湯調理而安朱丹溪治一人左絲竹空穴壅出一角如雞距此少陽經多血少氣朱戒其斷酒肉須針灸以開發壅滯他工以大黃硝腦等冷藥貼之一夜裂開如蚶肉血濺出長尺余而死此冷藥外逼熱不得發故也一胡氏子年十七八發脫不留一莖飲食起居如常脈微弦而澀輕重皆同此厚味成熱濕痰在膈間復因多食梅酸味以致濕熱之痰隨上升之氣至於頭熏蒸髮根之血漸成枯稿遂一時盡脫以補血升散之藥用防風通聖散去芒硝唯大黃三度酒炒兼四物湯酒製合煎服兩月餘診其脈濕熱漸解乃停藥淡味調養二年髮長如初薛己治一男子年二十巔毛脫盡脈數先以通聖散宣其風熱次用六味地黃丸不數日髮長寸許兩月復舊一儒者因飲食勞役乃惱怒眉發脫落薛以為勞傷精血陰火上炎所致用補中益氣加麥冬五味及六味地黃丸加五味子眉發頓生如故一男子染時瘡服換肌散之類眉毛頓脫遍身作癢或時赤暈乃燥藥損其陰血陽氣偏旺而然耳朝用四物湯倍熟地加茯苓白朮丹皮山梔生甘草夕用六味丸料加當歸黃耆治之瘡症即愈眉毫亦生一小兒年十四歲而近女色發熱吐痰至有室兩目羞明頭覺脹大仍不斷欲頭漸大囟門忽開用地黃丸益氣湯之類斷色欲年餘而愈一小兒十四歲解顱自覺頭大視物皆大畏日羞明先兄以為腎稟祛弱用六味丸加五味鹿茸及補中益氣加山藥山茱萸半載痊愈二載而囟合後畢姻覺囟門開解足心如炙喜其斷色欲戒厚味日服前藥二劑三載而愈豫治山左葉氏子年二十三歲患眉發脫落視其脈兩尺沉遲症由腎臟受寒彼云匝月前泄後口渴曾飲冷一盞自後覺眉發漸脫豫曰素問云發之華在腎又草木子云氣之榮以眉血之榮以發發者血之餘血者水之類也水之中有相火寄焉若一接內則此火翕然而下又即以冷飲加之則火微水凝十二經脈滯而不行於是腎不華而氣不榮也月令云仲秋陰氣侵盛陽氣日衰水始涸是水之涸地之死也死則草木漸衰於仲冬水泉動而一陽生是水之動地之生也生則草木漸長眉發而欲其復萌必得陽生而陰可長用桂附純陽之火加於六味純陽水中使腎中溫暖如冬月一陽來復於水土之中萬物皆生如豫言服之而愈或問氣之榮以眉血之榮以發何故氣榮眉則短血榮發則長豫曰此五臟所屬也眉榮氣分屬肺肺屬金為乾發榮血分屬肝肝屬木為巽以易理推之乾金短而巽木長故眉短而髮長也又問眉發何故去之則日長蓄之則不見其長乎豫曰去之則氣血榮其根故日長蓄之則養其已蓄故長而有定耳又問仲冬一陽生而草木萌仲秋陰氣侵盛陽氣日衰草木漸萎至冬草皆死而木葉皆落何故松柏獨不凋乎豫曰不獨松柏不凋凡草木之葉無汁者皆能存之又問何故葉無汁乎豫曰無汁者非全無也蓋無汁之葉借滋化生以氣用事有汁之葉借氣化生以滋用事故有有汁無汁之別然不特草木之葉無汁而能隆冬不凋即草木之根或干若滋少而以氣用事者並寒冬可能發花即梅蘭之類是也蓋氣能敵寒故如是耳若人至暮年而亦能耐寒者腎氣旺也旺者壽鄰人顧姓者因少年勤內事頭皮血出如汗此肝腎之火逆上因血熱甚所以從發竅直出蓋汗乃血之液從氣化白內經有肌衄一條因氣散不能從化故肌膚汗血此病並非氣不能化化亦不及故也治用甘露飲等劑得愈孝廉章睛皋尊人御臣中年時忽屢夢白人持刀自割其頭至流血即驚醒自後閉目亦然衆醫莫措就松江沈魯珍治之沈曰寐而見白人者肺虛也古人多用獨參湯每服人參一兩一劑可愈服之果驗生肌散寒水石煅滑石二兩龍骨海螵蛸一兩蜜陀僧枯礬鉛粉干胭脂五錢共為細末摻瘡口上瓜蒂散甜瓜蒂赤小豆二味為末熟水或酸齏水調下量人虛實服之吐時須令閉目緊束肚皮吐不止者蔥白湯解之良久不出者含砂糖一塊即吐諸亡血虛家老人産婦血虛脈微者俱不可服人參白朮散人參白朮茯苓半夏各三錢甘草一錢陳皮五分清水煎服十全黑龍丹當歸五靈脂川芎良薑熟地各三兩上研末入罐鹽泥固濟炭十斤煅令通紅冷定取開看成黑糟粕色細研入後藥百草霜五錢硫黃乳香各一兩花蕊石琥珀各三錢上五味為末並前和勻丸如芡實大每服一丸抑青丸羌活防風龍膽草川芎當歸等分為末蜜丸芡實大每服二三丸砂糖湯化下防風通聖散防風薄荷連翹荊芥穗麻黃川芎當歸芍藥炒山梔白朮大黃酒蒸芒硝各五錢黃芩石膏桔梗各一兩甘草二兩滑石三兩加生薑蔥白煎六味地黃丸熟地黃八兩砂仁酒拌九蒸九曬山茱萸山藥各四兩茯苓乳拌丹皮澤瀉各三兩蜜丸空心鹽湯下四物湯當歸酒洗生地黃各三錢芍藥二錢川芎一錢五分清水煎服瀉青丸龍膽草大黃山梔當歸川芎羌活防風上各等分為末蜜丸梧子大每服四五十丸竹葉湯下補中益氣湯見項門十全大補湯桂附八味丸二方見手足門加減八味丸見目門六黃湯見溺孔門目夏子益奇疾方云有人患眼前常見諸般禽蟲飛走以手捉之則無乃肝膽經有痰用酸棗仁羌活玄明粉青葙子花各一兩為末每服二錢水一大盞煎至七分和滓飲一日三服又云一婦人見滿壁皆蓮花此痰症也服礞石滾痰丸而愈又云有人患目晴忽垂出至鼻如黑角色痛不可忍或時時大便血出作痛名曰肝脹用羌活煎汁服數服自愈源按此症為風熱客於厥陰肝木蓋肝藏血其主目因風熱內攻故目睛垂出至鼻而使血時下也若無熱則目系不縱無風則便血不下此乃風熱相搏故病如是羌活乃足太陽少陰厥陰三經之藥其性祛風散熱用之走入肝經提邪外出而愈奇病方云人有無故見鬼如三頭六臂者或如金甲神或如斷手無頭死鬼之類皆奇病也方用白朮蒼朮各三兩附子一錢南星三錢半夏大戟山慈菰各一兩俱為末研麝香一錢加入前藥如玉樞丹一樣凡遇前病用一餅薑湯化開飲之必吐頑痰碗許而愈又云有人眼內長肉二條長一寸如線香之粗觸出眼外此乃祟也雖是肝膽之火無祟則不能長此異肉法當用藥點之冰片黃連甘草各一分硼砂五釐各為細末用人乳調少許點肉尖上覺眼珠火泡出即時收入而愈更服舒鬱金睛丹舒其肝膽之氣而又瀉其火與痰則本源已探其驪珠又何愁怪肉之重長耶眼症論云有人患目之白睛忽變青蘭色此被郁邪蒸逼走入珠中膏汁遊出入於氣輪故色變青色方用還陰救苦湯頻服自愈又云有人黑暗之夜兩目倏忽見物如日中一般此水火不交精華關格乖亂不和之甚而陽光飛越之害不能攝養陰精陽光無制使然服加減八味丸乃可又云有人患腦筋如拽神珠不待人轉而自驀然擦上驀然擦下下之不能上上之不能下或左或右倏易無時蓋轉動搏擊不定筋脈振惕緩急無常被其牽拽而為害名曰轆轤轉睛輕則氣定脈偏而珠歪重則反轉而為瞳神反背矣服鉤藤飲子自愈藏器曰宋嗣伯治沈僧翼患眼痛多見鬼物嗣伯曰邪氣入肝可覓死人枕煮服之當埋枕於故外如其言而愈伊川云有一人患心疾見物如獅子川教以手直前捕之見其無物久久自愈此乃痰也繼服牛黃清心丸以除病根本事方云荀牧仲頃年嘗謂豫曰有人視一物為兩醫者作肝氣有餘故見一為二教服瀉肝藥皆不應此何疾也豫曰靈樞經云目之為系上屬於腦後出於頂中故邪中於內因逢其身之虛其入深則隨眼系以入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪中其精其精所中不相比也則精散精散則視歧故見兩物也令服驅風入腦藥得愈云麓漫抄云淮南楊吉老儒醫也有富翁子忽病視正物皆以為斜几案書席之類排設整齊必更移令斜自以為正以致書寫尺牘莫不皆然父母甚憂之更歷數醫皆不諳其疾或以吉老告遂以其子往求之既診其脈後令其父先歸留其子設樂開宴酬勸無算至醉乃罷扶病者坐轎中使人升之高下其手常令傾倒輾轉久之方令登榻而臥達旦酒醒遣至歸家前日斜視之物皆理正之父母躍然而喜且詢治之方吉老云令嗣無他疾醉中常閃倒肝之一葉搭於肺上不能下故視正物反斜令復飲之醉則肺脹輾轉之間肝亦下垂矣藥安能治之哉富翁厚為之酬九靈山房云呂滄州治臨川道士蕭云泉眼中視物倒植請治於呂呂問其故蕭曰某因大醉盡吐所飲之酒熟睡至天明遂得此病呂切其脈左關浮促即告之曰爾傷酒大吐時上焦反覆致倒其膽腑故視物皆倒植此不內外因而致內傷者也法當復吐以正其膽以藜蘆瓜蒂為粗末用水煎之使平旦頓服以吐為度吐畢視物如常道山清話云張子顏少師晚年嘗患目光閃閃然中有白衣人如佛相者子顏信之彌謹乃不食肉不飲酒然體瘦而多病矣一日從汪壽卿求脈壽卿一見大驚不復言但投以大丸數十粒小丸千餘粒祝曰十日中服之當盡卻以示報既如期視所見白衣人衣變黃而先無所見矣乃欲得肉食又思飲酒又明日俱無所見覺氣體異他日矣乃詣壽卿以告壽卿曰吾固知矣公脾初受病為肺所乘心者脾之母也公既多疑致心氣不固自然有所睹吾以大丸實其脾小丸補其心肺為脾之子既不能勝其母其病自愈也寶鑑云一小兒四歲因長老摩頂受記生人念咒恐懼發搐痰涎有聲目多白睛項背俱強一時許方醒自後每見皂衣人即發服硃砂腦麝鎮墜之藥已四年餘無功又添行步動作神思如癡脈沉弦而急針經云心脈滿大癇瘈筋攣病久氣弱多服鎮墜寒涼之劑復損正氣故添動作如癡先灸兩蹺各二七壯次服沉香天麻丸而愈內經云恐則氣下精氣怯而上焦閉方有羌活獨活苦溫引氣上行又入太陽引用以為君天麻防風辛溫以散之當歸甘草辛甘以補氣血之不足養胃氣以為臣附子川烏大辛溫行陽退陰又治客寒傷胃腎主五液入脾為涎以生薑半夏燥濕化痰沉香辛溫體重氣清去祛安神以為使耳聞奇録云全州防禦使崔堯封有甥李言吉左目上瞼忽生一小瘡漸大如雞卵其根如弦恆偃其目不能開堯封使飲令大醉遂與割去其瘡即破中有黃雀飛鳴而去趙卿治一少年目中常見一小鏡子俾醫工趙卿診之與少年期來晨以魚鱠奉候少年及期赴之延於內且令從容俟客退俄而設桌子施一甌芥醋更無他味卿亦未出逮禺中久候不至少年飢甚且聞醋香不免輕啜之逡巡又啜之覺胸中豁然眼花不見因竭甌啜之趙卿知之乃出少年以啜醋慚謝卿曰郎君因吃鱠太多有魚鱗在胸中故兩眼常見小鏡子所備芥醋只欲郎君因飢以啜之其疾自治亨鮮之會乃權詐也徐之才治武城酒色過度恍惚不恆每病發自云初見空中有五色物稍近變成一美女去地數丈亭亭而立之才云此色欲過多太虛所致即處湯方一劑便覺稍遠又服還變五色物數劑而愈汪石山治一人年三十餘久病癇症多發於晨盥時或見如黃狗走前則瞀撲地手足瘛瘲不省人事良久乃醒或作痰火治而用芩連二陳湯或作風痰治而用全蠍殭蠶壽星丸或作痰迷心竅而用金箔鎮心丸皆不中病汪診之脈皆緩弱頗弦曰此木火乘土之病也夫早晨陽分而黃狗物黃土色胃屬陽土虛為木火所乘矣經曰諸脈皆屬於目故目擊物而病作矣理宜實胃瀉脾而火自息損其肝者緩其中遂以參耆歸朮陳皮神麯茯苓黃芩麥冬荊芥穗煎服十餘帖病減六七再服月餘而愈錢乙治一婦因恐而病既愈目張不瞑乙曰煮郁李仁酒飲之使醉即愈所以然者目系內連肝膽恐則氣結膽橫不下用郁李潤能散結隨酒入膽結去膽下則目瞑矣張子和治一富家婦因思慮過甚二年不得寐無藥可療其夫求治脈之兩手俱緩此脾受邪也脾主思故也乃與其夫議以怒激之多取其財飲酒數日不處一法而去其婦大怒汗出是夜困眠如此者八九日不寤如是其脈得平此怒勝思法也丹溪治一婦年近二十發熱閉目則熱甚渴思水解脈澀而濁混此食痰也以乾葛白朮陳皮片芩木通桔梗黃連甘草下保和丸二十粒漸愈江汝潔治葉廷傑之內十月病眼若合即麻痹甚至不敢睡屢易醫漸成崩疾江診左手三部舉之略弦按入略大而無力右手三部舉按俱大而無力經曰血虛脈大如蔥管又曰大而無力為血虛又曰諸弦為飲又曰弦為勞據脈觀症蓋由氣血俱虛以致氣不周運而成麻痹時醫不悟而作火治藥用寒涼過多損傷脾胃陽氣失陷而成崩矣以歲運言之今歲天衛主氣風木在泉兩木符合木盛而脾土受虧是以上陷而行秋冬之令以時候言之小雪至大雪之末六十日有奇太陽寒水主厥陰風木客氣加歸於上木火勝矣經曰甚則勝而不復也其脾大虛安得血不大下乎且脾裹血脾虛則血不歸經而妄下矣法當大補脾經為先次宜補氣祛濕可得漸愈矣以人參三錢黃耆二錢甘草四分防風荊芥白朮各一錢陳皮八分水煎食遠服一劑分作三服不數劑而愈李時珍按謝士泰刪繁方治尸疰或見尸或聞哭聲者取死人席斬棺內余棄路上者一虎口長三寸水三升煮一升服立效此即嗣伯用死人枕之意也葛洪云鬼疰者是五尸之一疰又挾諸鬼邪為害其病變者三十六種至九十九種大約使人寒熱淋漓沉沉默默不的知苦處在於何所纍年積月漸就沉滯以致又傳旁人不一而止覺如是候者急取獺肝一具陰乾杵末服方寸匕日三未愈再服本事方云肘後言此方甚良宣和間天慶觀一法師極精嚴時一婦人投肰述患人有祟所附須臾召至附語云非我為禍別是一鬼亦因病人命衰為祟耳渠今已成形在患人肺臟為蟲食其肺系故令吐血聲嘶師掠之此蟲還有畏忌否久而無語再掠之良久云容其説惟畏獺瓜屑為末以酒服之則去患家如其言而得愈此豫所目見也究其患亦相似獺瓜者即獺肝之類也孫東宿治孫如亭令政年過四十眼偶赤腫兩太陽疼痛大便不行者三日平時汛期一月僅二日今行四日猶且未止里有餘雲谷者自謂眼科捷手醫治逾候腫赤不消而右眼內眥突生一白泡垂與鼻齊大二寸余見而駭走以為奇疾莫能措劑又見其嘔吐眩運伏於枕上略不敢動動則眩愈極吐愈急疑其遍南不治孫診之兩寸關俱滑大有力兩尺沉微曰此中焦有痰肝膽有火必為怒氣所觸而然內經云諸風掉眩皆屬肝火諸逆衝上皆屬火蓋無痰不作運也眼珠白泡乃火性急速怒氣加之氣乘於絡上而不下故直脹出眼外也古壯士一怒而目珠裂與白泡脹出珠外理同肝為血海故血亦來不止治當抑其目清鎮痰火則諸症自瘳先用薑汁益元丸壓其痰火以止其吐再以二陳湯加酒連酒芩天麻滑石吳茱萸竹茹枳實煎飲一帖吐止運定頭稍能動改用二陳湯加芩連穀精草夏枯草香附茱萸薏苡仁兩劑赤腫消白泡斂四劑全愈血海亦淨從是後不發又亮卿之女左目紅腫如腹中飽眼乃開飢則眼不能開此疳積虛寒症也以夏枯草二錢穀精草甘草各一錢香附一錢五分煎服四帖而安李士材治朱文哉遍體如蟲蜇口舌糜爛朝起必見二鬼執盤食以獻李診其寸脈乍大乍小意其為鬼祟細察兩關弦滑且大遂決為痰飲之疴投滾痰丸雖微有所下而病患如舊更以小胃丹二錢與之復下痰積及水十餘碗遍體之痛減半至明早鬼亦不見矣更以人參三錢白朮二錢煎湯服小胃丹三錢大瀉十餘行約有二十碗病若失矣乃以六君子為丸服四斤而愈豫治孫旗丁之內産後十數日覺氣不舒自後兩目視物漸至以直為曲如彎弓狀醫無所措已及兩月適豫出京至天津有運糧官馬石泉者患目疾延豫治之孫亦請求治切其脈沉澀症由淤滯目視直而為曲者必瘀血阻折肝膽之葉昔呂復治道士傷酒大吐時上焦反覆致倒其膽腑視物倒直今折其肝葉曲其膽腑故視物亦曲即用當歸桃仁各三錢五靈脂一錢五分酒炒大黃肉桂各一錢以行其瘀柴胡八分以舒其肝一劑下黑血成塊者數次視物漸直再劑又下數次即看物如故餘姚陳載侯寓居武林初春患目痛醫與涼劑目即突出眶外痛不可忍豫視其脈兩手沉微此肝腎受寒治宜麻黃附子細辛湯時有汪姓醫同座曰兩目突出此肝火逼迫使然先生以為寒何也豫曰脈沉微云耳又曰脈不弱豫曰子既不辨其脈試即以症明之初本疼痛服寒涼而目反突出非火症可知又曰火太盛而用藥輕故也豫曰目痛人皆謂火不特目突而為火也殊不知此症陰盛於下格陽於上陽不得降故目疼痛用寒涼而復逼其陽陽無所歸悉湧於目致目突出仲景謂少陰經傷寒發熱咽痛脈沉細因寒傷於腎逼腎中之火飛越於上而為咽痛今脈微而目突即是理也若此症此脈使再投寒涼必再出而裂古所謂眼不醫不瞎者正謂此也茲擬仲景少陰傷寒治法用麻黃附子細辛湯溫經散寒使寒散火降其目自平載侯以為然服二劑而愈己丑冬有德青農人沈姓者患目不見已十年餘矣渠云初患時耳鳴如雷每聞人語如在頭頂之上又兩目閃閃然見兩火如豆大閉目則目熱而耳鳴更甚投清利之劑所患雖平而且全不見矣凡遇醫者俱曰青盲內障非針不明今特訪至此叩請求治豫曰內障一症六因七情皆能為害今切汝脈脈尚沉弦汝症初起良由肝膽濕火盛而上攻故目生火而耳如雷鳴凡耳中火攻甚則響如雷如雷之響中聞人語每自覺在頭頂之上時當用龍膽瀉肝湯瀉火開鬱郁開則濕除濕除則火全滅自無內障之患也乃但投涼劑而不求其病之原故脈尚如是當先投加味逍遙散去白朮十劑以除積久之鬱熱使不致針後復蒙服後用金針撥去其障即睹物如故而愈又德青沈鳳岐年五十餘患左目不見已十餘年矣忽一日跌撲後右目亦全不見物如是半載方來就治豫觀其左目瞳神散大神水已定無庸施治右起內障可用針撥撥即如故此無他障本患生瞳神之上因撲擊而下故耳或問目患瞳神散大及黃膜上衝俱明見於黑珠之內何故用金針入時但見瞳神之處而黑珠內不能明見其針若因黑珠不明則瞳神散大黃膜上衝何故又見乎豫曰目中之水狀如魚腦其色不一在白珠則緑黑珠灰黑瞳神若漆層層相裹神水於中外所包之殼如指甲之厚殼中生孔以貫瞳神外見所以用針入瞳撥時若針頭稍有向外針即孔上留住故知其天然生孔以貫瞳神見外耳殼孔之外復生一翳如晶之明滿包其珠乃瞳神賴此以關其水也若患瞳神散大因神水逼迫孔外散於明翳之間黃膜上衝每取於黑珠下輪此亦在明翳內而珠殼外也然是患雖但見於黑珠而其原誠從白珠而來因白珠與黃膜之色相若故不明見於外如值此症速當疏散其肺更瀉其火雖不能退此已見之膜然不致上瞞瞳神以成痼疾豫治里人孫氏婦初患左目瞳神細小右患內障因障初成不可用針遂撥但治其左目治三月而痊約半載許忽左目之珠微疼視不見物睡片時則稍見未幾復不見又睡片時復又見之如是六七日復請求治豫視其瞳神但有混濁之氣而非復細小也又視黑珠下輪起黃膜半米許豫曰瞳神無病瞳神之外所帶渾濁之氣因明翳內有黃膜欲上衝故耳此患屬內火旺而外邪閉郁鬱則氣不外舒火邪內逼而上故有是症蓋寐則氣歸於下其火邪亦隨氣而下則渾濁之氣稍退故得見之悟則其氣復升因內之火邪復隨而上故復不見今速宜散其外邪清其內火用蘇葉防風甘菊各一錢白蒺藜石決明各三錢黃芩二錢鬱金一錢五分黃連羚羊角赤芍藥各五分服二劑其目漸清又二劑黃膜忽無瞳神渾濁之氣亦除盡而愈豫告之曰黃膜上衝治但收住其膜今忽散去因此膜白中帶黃所起黑珠甚微其邪尚淺故得消除然黑珠雖無恐白珠內尚未全去當再劑以絶病根還陰救苦湯升麻蒼朮草梢桔梗柴胡防風羌活各五分細辛二分藁本四分歸尾七分黃連黃芩黃柏生地知母連翹各六分紅花一分膽草三分清水煎服鉤藤飲子鉤藤炙五分麻黃甘草炙各三分川芎防風人參各七分全蠍炒去刺一錢天麻八分殭蠶炒一錢二分薑三片水煎不拘時服牛黃清心丸牛黃一兩二錢麝香龍腦三味另研羚羊角鎊各一兩當歸酒洗防風黃芩白朮麥冬去心白芍各一兩五錢柴胡桔梗茯苓杏仁去皮尖川芎肉桂大豆黃卷阿膠各一兩七錢蒲黃人參神麯各二兩五錢雄黃另研甘草五兩白蘞七錢半乾薑七錢半犀角鎊二兩乾山藥七錢金箔一千三百片內四百片為衣上為末大棗一百枚蒸熟去皮核研成膏煉蜜與棗膏丸每兩作十丸用金箔為衣每服一丸溫水化下舒郁全睛丹白芥子三錢梔子白朮茯苓三錢柴胡陳皮一錢白芍五錢甘草清水煎服加減八味丸熟地黃八兩忌鐵酒煮爛搗膏山藥山茱萸酒洗焙各四兩白茯苓澤瀉酒洗焙乾牡丹皮酒洗烘各三兩五味子火干兩半肉桂去皮忌火一兩上除地黃膏另入余共為細末煉蜜為丸如桐子大每服三錢空心鹽湯送下忌蘿蔔礞石滾痰丸青礞石一兩沉香五錢黃芩大黃酒蒸八兩上將礞石打碎用焰硝一兩同入瓦罐鹽泥固濟曬乾火煅石色如金為度研末和諸藥水丸量人虛實服之薑湯送下服後仰臥令藥在胸膈之間除逐上焦痰滯不宜飲水行動寶鑑沉香天麻丸沉香益智川烏各二錢天麻防風半夏附子炮各三錢羌活五錢甘草當歸殭蠶獨活各一錢每服五錢生薑三片水煎去渣溫服食前三劑保和丸山楂三兩去核神麯炒半夏茯苓各一兩陳皮萊蔔子微炒連翹各五錢曲糊丸麥芽湯下小胃丹芫花醋拌一兩瓦器內炒黑不可焦甘遂長流水浸半日煮曬乾大戟長流水煮再用水洗曬乾各五分大黃濕紙裹煨切酒炒一兩五錢黃柏炒三兩上為細末以白朮膏丸如蘿蔔子大臨臥白湯送下一錢欲利空心服六君子湯人參白朮茯苓甘草陳皮半夏各等分薑三片棗二枚水煎服益元散滑石六兩甘草一兩辰砂一錢上為末每服二錢或三錢冷水調下燈心湯亦可二陳湯半夏薑製陳皮去白茯苓一錢甘草五分加薑煎麻黃附子細辛湯麻黃細辛附子先煮麻黃去沫納諸藥煎加味逍遙散柴胡薄荷當歸白芍陳皮甘草茯苓白朮丹皮山梔加薑煎六味地黃丸四物湯一方見頭門
