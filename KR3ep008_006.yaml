body:
  text: 卷之六身夏子益奇疾方云有人患淵疽發於肋下久則一竅有聲如嬰兒啼灸陽泉二七壯聲止而愈源按古去瘡久不愈則內生蟲此患淵疽有聲如嬰兒啼者因內生蟲也然不用別治而獨用艾灸蓋人血氣冷則瘡不消不潰故假艾力以溫其內使氣血得行其疽自滅況艾更能殺蟲故但灸而愈又云有人因艾火灸瘡痂退落瘡內鮮肉片子如蝶狀騰空飛雲痛不可言血肉俱壞此火毒生怪病也用朴硝大黃為末水調下微利即愈又云有人病眼赤鼻張大喘渾身如斑毛髮如銅鐵乃胃中熱毒氣結於下焦用白礬滑石各一兩為末作一服水三碗煎減半不住服服盡即安又云有人患生蟲如蟹走於皮下作聲如小兒啼為筋肉所化雄黃雷丸各一兩為末糝豬肉上炙熟吃盡自安又云有人患身及頭面生毒浮腫如蛇狀用雨濕磚上青苔一錢水調塗之立應又云有一婦産後食茶粥二十餘碗一月後身之上下發水冷數塊人以手指按其冷處即冷從指下上應至心如是者諸治不效以八物湯去地黃加橘紅入薑汁竹瀝一酒鍾十服乃痊又云有人遍身忽然肉出如錐癢而且痛不能飲食名曰血壅不速治必潰膿血以赤皮蔥燒灰淋洗飲淡豆豉湯數盞自安源按經云營氣不從逆於肉裡此症為熱毒內攻營氣逆於肉裡而生奇毒也癢乃津液枯澀痛因氣血不行故癢痛並作蔥有疏表通氣之功以洗於外豉能清熱解毒以飲於內內外兼治其病故痊又云有人毛竅節次出血不止忽皮脹如鼓須臾耳目口鼻被氣脹合欲絶此名脈溢急用生薑自然汁和水合半盞服即安源按在毛竅節次血出而忽皮脹如鼓及口鼻等處被氣脹合欲絶者此必疫邪內攻迫血於脈絡節次而出名曰脈溢蓋邪壅於中衛氣散解因衛不營行而不能衛護其血故血外流血流於外邪當自解而不解者蓋衛失其度因失血而更虛其衛其邪益甚故忽皮脹如鼓而頃刻氣滿欲絶也經云失之則內閉九竅外壅肌肉衛氣散解此時若不急治其標勢將立斃故用生薑辛散逆氣之味以搗自然汁與水和飲取其性須疾速通格下關使邪退而病可即安又云有人忽遍身皮底混混如波浪聲癢不可忍抓之血出不能解謂之氣奔以苦仗人參青鹽細辛共一兩作一服水煎飲盡便愈源按此症由肺氣熱而賊風襲之故客於皮底之間與氣相搏因發聲若波浪之聲而謂之氣奔也蓋肺屬金其音商商音清而徑故聲作如是若無熱則聲不鳴無風則氣不奔即內經所謂諸病有聲皆屬於熱又云風善行而數變故所患若是耳蓋風盛則燥燥則血澀津液不行故遍身搔癢致血出不能解苦杖青鹽細辛清熱散風而兼平氣逆人參以補正氣所謂邪之所湊其氣必虛是也又云有人患身面生瘡如貓兒眼樣有光采膿血但痛癢不常飲食減少名曰寒瘡多吃蔥韭雞魚自愈源按一凡瘍瘡若內毒盛者則必現奇形奇色此症生瘡如貓兒眼樣有光采乃毒盛故也猶蟲物等有毒其色必鮮豔有光毒盛而兼寒內閉至氣血欲行不行似攻非攻故不得作膿而但痛癢不常也此毒深寒閉非攻不可故多食蔥韭雞魚之物自愈奇病方云有人皮膚手足之間如蚯蚓唱歌者此乃水濕生蟲也方用蚯蚓糞以水調塗敷患處約寸厚鳴即止再用白朮五錢苡仁芡實各一兩甘草附子黃芩各三錢防風五分水煎服即愈蓋治濕則蟲無以養而更有甘草解毒殺蟲防風去風逐瘀附子斬關而搗邪所以奏功如神也源按此症生蟲如蚯蚓歌然然亦有被蚯蚓咬毒形如大風眉發皆落患處常聞蚯蚓唱歌者用濃煎鹽湯浸身數遍自愈昔浙西將軍張韶患此每夕蚯蚓鳴體一僧用此方而安蚓畏鹽故也又云有人腰間忽長肉痕一條如帶圍至臍間不痛不癢久之飲食少進氣血枯稿此乃腎經與帶脈不和又過於縱欲乃得此疾久則帶脈氣衰血亦漸耗顏色黑黯雖無大痛而病實篤也法當峻補腎水而兼補帶自然身壯而痕消滅痕丹每日早晚各服一兩十日後覺腰輕再服十日其肉糝淡更服全消然必須絶欲三月否則無效又云有人遍身發癢以錐刺之少已復癢以刀割之快甚少頃又癢甚以刀割之覺疼必流血不已以石灰止之則血止而癢作又以刀割之又流血又以石灰止之止之又癢勢必割至體無完膚而後止方用人參一兩倘值病者無力買參則用黃耆二兩代之服三劑必癢止痛平此本孽病若愈後須痛改前惡庶幾不再發否則發不能再救矣類編云景陳弟子拱年七歲時脅間忽生腫毒隱隱見皮里一物頗肖鱉形微覺動轉其掣痛不堪德興古城村外有老醫見之使買鮮蝦為羹以食疑以為瘡毒所忌之味醫竟令食之下腹未久痛即止喜曰此真鱉瘕也吾求其所好以嘗試之耳乃制一藥如療脾胃者而碾附子末二錢投之數服而消明年病復作但如前補治遂絶根名醫録云汾州王氏得病在脅有聲如蝦蟆常欲手按之不則有聲聲相接群醫莫能辨聞留陽山人趙巒善診趙曰此因驚氣入於臟腑不治而成疾故常作聲王氏曰因水邊行次有大蝦蟆躍高數尺驀作一聲忽驚叫便覺右脅牽痛自後作聲尚似蝦蟆也趙診其脈右關脈伏結此積病也當作積病治用六神丸泄下青涎類蝦蟆之衣遂瘥楊氏直指方云有人患癌瘡上高下深顆顆纍垂裂如瞽眼其中帶青頭上各露一舌因毒深穿孔男則多發於腹女則多發於乳或項或背令人昏迷急宜用地膽為君佐以白牽牛滑石木通利小便以宣其毒更服童便灌滌餘邪乃可得安也五湖漫聞云無錫一人遍身膚肉有紅蟲如線長二三寸時或遊動了了可見癢不可當醫莫能治一日偶思食水蛙蛙至蟲遂不見乃市蛙為脯旦晚食之月餘其蟲漸消又云吳城一人腰間生一癤膿中流出蛔蟲四條醫亦甚駭耳目所未經者癤後自愈不致傷生楓橋瘍醫龔生目睹人小腹生癤流出蛔蟲兩條俱長六七寸後亦自愈端效方云有人患白口惡瘡其瘡如木耳因肝木濕熱所生不拘大人小兒俱用五倍子青黛等分為末以筒吹之自愈危氏方云有人患身體生泡如甘棠梨狀每個出水內有石一片如指甲大其泡復生抽盡肌肉即不可治用荊三稜蓬莪朮各五兩為末分三服酒調連進愈源按此症因邪客於皮膚之內分肉之間而衛氣逆逆則利用之肺金變而為頑金矣不但不能主氣反將頑劣之性以干脾土土即隨金施化而金質堅剛因此肌肉化為石片即內經所謂其性剛其化堅斂是也至石片從水而出蓋因人身全賴金氣榮養氣能管束津液化精微而榮養於內乃肺為邪毒所幹致頑劣其性不但不能束津液而化精微反化肉為石致津液並隨所化之處發為水泡故石片從水中出耳治用三稜莪朮破其血氣兼散其毒毒散氣和則金氣復利肉裡得順其病自瘳本草云二物能治瘡硬性能治塊消癖故也是症非此不能治堅剛石片故用之相宜或問人有足底發泡如泡平之後以指破之間有硬片如皮生內亦是肌肉所化否豫曰非也此泡初即刺破則但有水而無硬片也此水感金氣所生故泡平之後而有此片並非如肌肉化石由水中出也李樓怪症方云一人灸火至五壯血出如尿不止手冷欲絶以酒炒黃芩二錢為末酒服即止外臺祕要云有人患身疽如石狀如痤癤而皮厚名曰石疽以穀子搗敷即愈源按本草云穀子即楮實山野中處處有之其樹汁黏如膠漆即俗呼谷樹脂是也衍義云有人遍身患熱毒痛而不癢手足尤甚至項而止黏著衣被曉夕不得寐痛不可忍有人教以石菖蒲三斗銼日乾之春籮為末布席上使患者恣臥其間仍以衣被覆之既不黏著又復得睡五日七日間其瘡如失後有患此者治之應手取效其石菖蒲根絡石生者節密入藥須此等聖濟録云人有患脅漏出水不止用烏牛耳垢敷之即瘥劉禹錫傳信方云貞元十年崔員外言有人為蜘蛛咬腹大如妊遍身生絲其家棄之乞食有僧教啖羊乳未幾即平也又張薦員外住劍南張延賞判官忽被蜘蛛咬頭上一宿咬處有二道赤色細如箸繞頂上從胸前下至心經兩宿頭面腫疼大如數升腹漸腫幾至不救張公出錢五百千並薦家財又數百千募能療者忽一人應召云可治張公不信欲驗其方答云不諳方但療人性命耳遂取藍汁一碗以蜘蛛投之至汁而死又取藍汁加麝香雄黃更以一蛛投入隨化為水張公因甚異之遂令點以咬處兩日悉平作小瘡而愈千金方云有人患肉中忽生點大者如豆細者如黍粟甚者如梅李有根痛傷應心久則四面腫泡逐脈入臟者死名曰瘭疽乃熱毒也以溫醋米泔洗淨用胡燕巢土和百日男兒尿敷之又一種善著十指狀如代指根深至肌能壞筋骨毒氣入臟殺人宜燒鐵烙之或灸百壯日飲犀角汁即瘥救急方云一兒初生如魚泡又如水晶碎則流水用蜜他僧籮極細摻之而愈又云一兒初生無皮俱是赤肉乃因母自懷胎十月樓居不得地氣故也取兒安泥地臥一宿皮即長又方用米粉干撲之候生皮乃止小兒祕訣云有小兒驚風遍身烏都者名烏紗驚風急推向下將黃土一碗搗末入陳醋一鍾炒熟絹包定尉之引下至手足刺破為妙南史云將軍房伯玉服五石散十許劑更患冷痰夏日常復衣徐嗣伯診之曰乃伏熱也須以水發之非冬不可十一月冰雪大盛時令伯玉解衣坐石上取新汲冷水從頭澆之盡二十斛口噤氣絶家人啼哭請止嗣伯執檛諫者又盡水百斛伯玉始能動背上彭彭有氣俄而起坐云熱不可忍乞冷飲嗣伯以水一升飲之疾遂愈自後常熱冬月猶單衫體更肥壯源按經云火鬱則發之嗣伯所治前症以十一月至後陽氣在內之時用平旦以水激之蓋平旦陽氣初升時也將郁久之熱激發而汗解即素問所謂正者正治反者反治逆而從之從而逆之是也春月則陽氣已泄夏秋則陰氣在內故必於冬月至後行之乃可或問經雲陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉是則人之氣隨天地之氣為生閉也平旦人氣生因天地之陽氣生外何故天地反寒於平旦乎日西陽氣已虛何故反不寒乎豫曰日西陽氣雖虛尚餘太陽之暖氣故不寒至深夜暖氣漸消故漸寒而至平旦清晨太陽雖升天地未暖故尚寒耳日中而陽氣隆故日中則暖也又問何故至平旦而每有露乎豫曰陽氣升而地氣上也地氣即地中之水氣乃升而為露耳然其氣升上本晝夜不息日中有太陽故不見夜則見之然所見亦微非比平旦陽氣所升之時也又問平旦無露此何以故豫曰因地氣不和不和則氣升為云故無露若久旱地燥其氣雖升因上土燥而斂其氣亦無露耳又問霧因何至豫曰地中之氣隨陽升為露若氣稍不和則不能為露亦不能為雨故但下瞞如雲若露而名霧也又問雨從云降何故常有云不雨乎豫曰云亦地之水氣因天地之氣不和而和之則水氣升上為云而為雨也即所謂陰陽和而雨澤降耳然不和有甚不甚之別不和不甚則水氣騰空而散雖有云不雨猶煮水水氣升外每騰空而散也甚則水氣盛不能騰空而散故即降而為雨也蓋云每出於山即卦傳所謂山澤通氣是也又問風從何來豫曰風乃大塊噫氣噫氣猶噯氣其氣從下散上也因天地之氣不和而發然天地有自然之風有噫氣之風蓋天地之氣升而降降而升猶人之呼吸然若氣和則升降順而有自然之風焉不和則不順不順則逆逆則發噫氣而為風耳如氣或不和於東則噫氣發東風即從東而至不和於西則噫氣發西風即從西而來南北皆然四隅亦如是若有風而有雨者因不和之水氣從風而上故也又問氣或不和於東而西或又有不和若噫氣併發當必有東西齊來之風而何故無乎豫曰天地一氣也使氣東不和而又有西不和者則噫氣或發於東而西不順之氣亦從東而泄故但有風於東耳發於西故但有風於西耳然大莫大於天地若彼不和與此不和固極遠而不能相應則噫氣彼此齊發則彼此之風遠而各殊人所不得而知也即諺云千里不同風耳又問雷電何也豫曰一歲之中熱而寒寒而熱皆天地元陽之氣升上則熱降下則寒若節至驚蜇其氣漸升而達於外因天地之氣不和不和則氣不升不升而欲升之則破塊而出故雷電並作蓋電即元陽之氣氣即火也雷因元陽之火升外故每先電而後雷也猶人放炮火先見而後聲發也若電閃甚則雷猛發於外故雷聲震上而形霹靂也如雷止而但有電者乃破中之餘氣耳所以電即閃而不遠其氣乃破而易泄故彼閃未已而又有此也初秋陽氣將收或值天地之氣不和則氣欲降不能而反逆於上故每發迅雷耳若秋漸深陽氣漸下至冬伏藏故雷亦收聲也人與天地同參至秋其氣漸收收則毛竅閉而春夏所受之病皆郁鬱而發之則病作矣故病每多發於秋也許叔微本事方云微患飲闢三十年始因少年夜坐寫文左向伏几是以飲食多墜左中夜必飲酒數杯又向左臥壯時不覺三五年來覺酒止從左下有聲脅痛食減嘈雜飲酒半杯即止十數日必嘔酸水數升暑月止右邊有汗左邊絶無遍訪名醫治無一效自揣必有澼囊如水之有科臼不盈科不行但清者可行而濁者停滯無路以決之故積至五七日必嘔而去脾土惡濕而水則流濕莫若燥脾以去濕崇土以填科臼乃悉屏諸藥只以蒼朮一斤去皮切片為末脂麻半兩水二錢研濾汁大棗五十枚煮去皮核搗和丸梧子大每日空腹溫服五十丸增至一二百丸忌桃李雀肉服三月而疾除自此常不嘔不吐不痛胸膈寬利飲啖如故暑月汗亦周身燈下能書細字皆術之力也初服時必覺微燥以山梔末沸湯點服加之久服亦自不燥矣又云有人平居無疾忽如死人身不動搖目閉口噤或微知之眩冒移時方寤此名血厥亦名鬱冒因出汗過多血少陽氣直上氣塞不行故身如死氣過血還陰陽復通故移時方寤婦人尤多此症宜服白薇湯用白薇當歸各一兩人參半兩甘草錢半每服五錢水二盞煎一盞溫服夢溪筆談云夏文莊公性豪侈稟賦異人才睡則體冷似僵一如逝者既覺須令人溫之良久方能動有人見其陸行兩車相併載一物巍然問之乃綿帳也以數十斤綿為之常服仙茅鍾乳硫黃不可勝記晨朝每服鍾乳粥有小吏竊食之疽發不可救吹劍續録云葛可久治同郡富家女年可十七八病四肢痿痹不能自食目瞪衆醫莫治葛視之曰當去房中香奩流蘇之物發地板掘土為坎畀女子其中扃其屏戒家人俟其手足動而作聲當報我久之手足果動而呼投藥一丸明日坎中出矣蓋此女平日嗜香而脾為香所蝕故也濮陽傳云萬曆丁亥金臺有婦人以羊毛遍鬻於市忽不見繼而都人身生泡瘤漸大痛死者甚衆瘤內惟有羊毛有道人傳一方云以黑豆喬麥為粉塗擦毛落自愈名羊毛疔源按此症近江南山東患者頗衆然所患與前症不同初起發熱或似瘧或似傷寒體重遍身皮肉脹痛不可忍滿身發紅點如疹用針挑破內有羊毛或一鬃或數莖其色或白或赤或粗或細形色不一俗稱羊毛疹子死者頗多或有不用針挑內服葛根升麻柴胡防風荊芥鼠黏子蟬蛻銀花連翹黃芩羚羊角西河柳等味外用前案藥味塗擦其毛多黏藥內擦後其痛漸平但或一日或二日或半日許仍然復作作時仍用藥擦其毛復有漸擦漸平如是者或患一二月或三四五月至身上起白泡遍身癢作方得痊愈若不用前法治之得生者少又有一種只發熱體重而脹痛並無紅點如疹亦用前治法其用針挑去其毛並出其血病可立愈此是疫毒因泄其毒故耳東垣治李正夫人病診得六脈中俱弦洪緩相合按之無力弦在其上是風熱下陷入陰中陽道不行其症閉目即渾身麻木晝減夜甚覺而目開則麻木漸退久則絶止常開其目則病不作懼其麻木不敢閣眼故不得眠身體皆重時有痰嗽覺胸中常有痰而不利時煩躁短促而喘肌膚充盛飲食大小便如常惟畏麻木不敢閣眼為最苦觀其色脈形病相應不逆內經云陽盛瞑目而動輕陰病閉目而靜重又云諸脈皆屬於目靈樞曰目開則陽道行陽氣通布周身合目則陽道閉而不行如晝夜之分知其陽衰而陰旺也且麻木為風雖三尺童子皆以為然細校之則非如久坐而起亦有麻木假如繩縛系之覺麻木而不能動釋之則漸自已以此驗之非有風邪乃氣不行也不須治風當補中之氣則麻木自去矣知其經絡陰火乘其陽分火動於中為麻木也當兼去陰火則愈矣時痰嗽者秋涼在外濕在上作也當實皮毛以溫劑身重脈緩者濕氣伏匿而作也當升陽助氣益血微瀉陰火去濕通行經脈調其陰陽則非五臟之本有邪也補氣升陽和中湯主之八劑而愈又治一人中年以來得一子一歲之後身生紅絲瘤後四子皆病瘤而死問何緣致此翌月思之謂曰汝腎中伏火精氣必有紅絲以氣相傳故生子有此疾俗名胎瘤是也汝試觀之果如其言遂以滋腎丸數服以瀉腎中火邪補真陰之不足忌酒辛熱之物其妻以六味地黃丸以養血受胎五月之後以黃芩白朮作散與五七服後生子前症不作汪石山治一人形長而瘦色白而脆年三十餘得奇疾遍身淫淫循行如蟲或從左腳腿起漸次而上至頭復下於右腳自覺蟲行有聲之狀召醫診視多不識其為何病汪診其脈浮小而濡按之不足兼察形視色知其虛證矣傷寒論云如身蟲行汗多亡陽也遂仿此例而用補中益氣湯倍加參耆以酒炒黃柏五分佐之服至三十帖遂愈又治一婦或時遍身麻木則懵不省人事良久乃醒醫作風治用烏藥順氣散又用小續命湯病益甚汪診之脈皆浮濡緩弱曰此氣虛也麻者氣餒不行遲不能接續如人久坐膝屈氣道不利故伸足起立而麻者是也心之所養者血所藏者神氣運不利血亦罕來由心失所養而昏懵也用參耆各二錢歸身茯苓門冬各一錢黃芩陳皮甘草各五分煎服而愈祝仲寧治一貴婦病惡寒日夜以重裘覆其首起躍入沸湯中不覺醫以為寒甚祝曰此痰火上騰所謂陽極似陰者也非下之火不殺下經宿而徹裘呼水飲之旬日氣平乃愈丹溪治一婦年近六十暑月常惡寒戰栗喜烈火服綿汗時如雨形肥肌厚已服附子十餘帖渾身癢甚兩手脈沉澀重取稍大如其熱甚而血虛也以四物湯去川芎倍地黃加白朮黃耆炒黃柏生甘草每服一兩始煎一帖飲之腹大泄目無視口無言知其病始深而藥無反佐之過也仍以前藥熟炒與之蓋借火力為嚮導一帖利止四帖精神回十帖病全安又治蔣氏婦年三十餘形瘦面黑六月喜熱惡寒兩手脈沉而澀重取則數以三黃丸下之用薑湯送下每服三十丸投至二十服微汗而愈又治一女子年逾笄性躁體厚因暑月大怒而咳逆每作一聲則舉身跳動神昏凡三五息一作脈不可診視其形氣實以人參蘆二兩煎飲大吐膠痰數碗大汗昏睡一日而安又治一人遍身俱是塊塊即痰也二陳加白芥薑炒黃連煎服吳邑一人患肩背起塊如向左臥其塊走入於左右臥至右豫作痰飲流注治之用前藥去黃連加桔梗愈江汝潔治一老婦病虛弱氣喘左身半自頭面以下至足發熱自汗單衣被不能耐右身半自頭面以下至足厚衣被不能溫如此三年矣醫藥不效汪診其六脈舉之俱微而略弦按之略洪而無力二關脈略勝於二寸經曰微則為虛又曰諸弦為飲又曰洪為陽為熱又曰無力為虛據此則知風邪入脾表裡陰陽氣血俱虛之候作也經曰治病必求其本令受風邪乃木來侵土又風自太陽而入脾先當以太陽疏泄以固表次當養脾而袪木俾脾無賊邪之患則血氣漸平而左熱右寒之疾可除也以石膏款冬花各三錢官桂甘草半之研為細末以管吹入喉中濃茶送下三四錢嗽喘即止次日用滋補之劑白朮二錢半白芍香附各一錢半黃耆陳皮各一錢甘草三分水煎服後除芍藥加人參三錢數服而愈時珍治一人病發則右腰一點脹痛牽引右脅上至胸口則必欲臥大便裡急後重頻欲登圊小便長而數或吞酸或吐水或作瀉或陽痿或得酒稍止或得食稍減但受寒食寒或勞役或入房或怒或飢即時舉發一止則諸症泯然如無病人甚則日發數次服溫補勝濕滋補消導諸藥皆微止隨發珍思此乃飢飽勞役內傷元氣清陽陷遏不能上升所致也遂用升麻葛根湯合四君子湯加柴胡蒼朮黃耆煎服服後飲酒一二杯助之其藥入腹則覺清氣上行胸膈爽快手足和暖頭目清順神采迅發諸症如掃每發一服即止神驗無比若減升麻葛根或不飲酒則效便遲大抵人年五十以後其氣消者多長者少降者多升者少秋冬之令多而春夏之令少若稟氣弱而有前諸症者並宜此藥活法治之素問云陰精所奉其人壽陽精所降其人夭是也孫東宿治歙州一貴婦遍身走注疼痛至夜則發如蟲齧其肌多作鬼治孫曰此正歷節風病也以麝香丸三服愈江應宿見一木商自云曾經五月放樹久立風雨濕地衣服盡濡患寒熱交作遍身脹痛欲人擊打莫知為何病服藥罔效忽思燒酒熱飲數杯覺腹中寬快數飲至醉遂愈此中寒濕醫莫能察識耳姚應鳳視一人年六十許遍體發小疥如粟應鳳曰是名淨海瘡甲子將周海上神仙考核實生此瘡不治則生治之則死其人未之信也治瘡瘡愈而死一有人患異疽如癰而小有異膿如小豆汁今日去明日滿用蕓薹菜散血消毒須搗熟將布袋盛於熱灰中煨熟更互尉之不過二三度愈吳篁池治一婦年三十餘産後患虛症惡寒口不能言手足不能動飲食頗進大小便如常多汗治用參耆大劑加桂枝每劑或一錢或二三錢量病勢輕重出入服至年半時值暑月惡風寒愈甚惟口已能言手足能動但惡寒不去乃令人強扶出風涼處坐用涼水強浸手足口含冷水初甚袪良久能耐覺安漸至暖至熱熱漸甚欲冷飲乃以涼水頓飲之復衣頓除如常而愈壬申狀元秦澗泉三年盜汗每寤衣被俱濕飲食起居如常經數十醫不效時豫在都因來就視豫診之六脈如絲卻悠揚無病惟肝脈中取弦實豫曰公之脈六陰脈也脈無他異惟左關弦耳此肝膽有火仲景云盜汗在半表半裡膽有熱也用小柴胡湯加當歸生地丹皮經霜桑葉不數劑而痊武林周南溪年三十餘體壯畏熱因避暑西湖日坐陰濕之處又常食瓜果等物至仲秋忽兩腿筋脈釣痛數日後牽釣至兩臂又數日手指一動即周身經脈釣痛而絶治用去風利痰之劑一無取效病在至危豫視其脈皆弦急蓋諸弦為飲急為寒又痰入筋骨則牽引釣痛此症由寒濕生痰而流入筋脈故也以半復茯苓各三錢白芥子二錢陳皮木瓜各一錢五分乾薑甘草各一錢生薑三片送妙應丸梧子大者七丸服後約半日許手指可動又服之手足即不復牽釣改用六君子湯調理半月而精神乃復一仕人王姓者仲春肌體大熱如有物在身行走之狀口乾唇燥小便黃赤豫曰此即所謂熱痹也統旨云熱痹臟腑移熱復遇外邪客搏經絡留而不行陽遭其陰故𤸷痹熻然而悶肌肉熱極體上如鼠走之狀唇口反裂皮膚色變治宜升麻湯豫與此湯而愈滅痕丹熟地黃白朮山茱萸各一斤杜仲山藥八兩白芍六兩白果肉當歸車前各三兩蜜丸梧子大每日早晚各一兩服儘自消六神丸神麯麥芽茯苓枳殼木香黃連上為末神麯和丸桐子大每服五十丸白湯送下滋腎丸知母酒炒黃柏酒炒各二兩肉桂二錢上各另為末水丸桐子大每服二百丸空心百沸湯下三黃丸黃芩黃連大黃各等分上各另為末水糊丸桐子大每服七八十丸白湯下升麻葛根湯升麻三錢葛根芍藥二錢甘草一錢薑三片棗二枚煎服補氣升陽和中湯黃耆人參白芍三錢甘草佛耳草四錢陳皮白朮歸身二錢黃柏甘草茯苓澤瀉升麻柴胡草蔻一錢每服三五錢水煎稍熱服麝香丸川烏大者三個生用黑豆二十一粒生用全蠍二十一個生用地龍五錢上末入麝香半字同研勻糯米糊為丸緑豆大每服七丸甚者十丸夜臥令膈空溫酒下微出冷汗一身便瘥此方凡是歷節及不出痰痛一二服便瘥升麻湯升麻三兩茯神人參防風犀角羚角羌活一兩官桂五錢每服六錢生薑一塊搗碎竹瀝少許同煎至一盞溫服八珍湯人參白朮茯苓甘草生地白芍川芎當歸薑棗煎八物湯見口門六味丸見耳門四物湯見頭門二陳湯見目門補中益氣湯見項門妙應丸即控涎丹見喉門
