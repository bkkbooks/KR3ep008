body:
  text: 卷之四心神平人氣象論云尺脈緩澀謂之解㑊五注云尺者陰部也腹腎主之緩為熱中澀為無血故解㑊也解㑊之證懈倦困弱寒不甚寒熱不甚熱惡見人見人心惕惕然或熱多而汗出肢體百骸散解痿弱而不能任持少氣而不欲言左右佇佇音能困弱也不可以名其狀故謂之解㑊注夏之證殆相似亦虛類也其治大生麥湯足以注之加木瓜苡仁史記云趙簡子疾五日不知人大夫皆懼於是召扁鵲扁鵲入視病出董安於問扁鵲扁鵲曰血脈治也而何怪昔秦穆公嘗如此七日而寤寤之日告公孫支於子輿曰我之帝所甚樂吾所以久者適有所學也帝告我晉國且大亂五世不安其後將霸未老而死霸者之子且令而國男女無別公孫支書而藏之秦策於是出夫獻公之亂文公之霸而襄公敗秦師於淆而歸縱淫此豫之所聞今主君之病與之同不出三日必間間必有言也居二日半簡子寤語諸大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂其聲動心有一熊可援我帝命我射之中熊熊死有羆來我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側帝屬我一翟犬曰及而子壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人於範魁之西而亦不能有也董安於受言書而藏之以扁鵲言告簡子簡子賜扁鵲田四萬畝夏子益奇疾方云凡人自覺本形作兩人並形並臥一樣無別但不語蓋人臥則魂歸於肝此由肝虛邪襲魂不歸舍病名離魂用人參龍齒赤茯苓各一錢水一盞煎半盞調水飛辰砂末一錢睡時溫服一夜一服三服後真者氣爽而假者即化矣金少遊治徐太乙之女年十六許字巨族而太乙日窘女憂慮不食不寢長臥目不瞑太乙往郡城售絲未歸女臥床上自言曰若許絲止價四錢八分不滿五數侍者詢其何以知之答曰豫方隨父入市也太乙歸少遊先問其絲價太乙言其數果符少遊云此離魂病也用人參黃連龍齒安魂等藥平復王日新小兒方云有小兒患驚風大叫一聲就死者名老鴉驚以散麻纏脅下及手足心以燈火爆之用老鴉蒜苗干車前子等分為末水調貼手心仍以燈心淬手足心及肩膊眉心鼻心即醒也源按老鴉蒜一名石蒜又名一枝箭是也外臺祕要云劉太丞毗陵人也有鄰家朱玉者只有一子年三十餘忽然卒死脈全無請太丞治之取徐州半夏細末一大豆許納鼻中良久身微暖而蘇迤邐無事人問太丞單方半夏如何活得死人答曰此南嶽魏夫人方也源按此方救五絶一曰自縊死氣絶二曰牆壁崩壓死氣絶三曰溺水氣絶四曰鬼魘死氣絶五曰産婦死氣絶並能救之昔葛生嘗用此方救人人問葛生何授得此神術能活人命生曰吾因入山採藥遇白衣人問曰汝非葛醫生乎吾乃半夏之精汝遇人有五絶之病用吾救治即活但用吾作細末令乾入鼻中即復生矣堅夷志云成州團練使張子剛名鋭以醫知名居於鄭州刑部尚書慕容彥逢為起居舍人母夫人病召鋭於鄭至則死矣時方六月將就木張欲入視彥逢不忍意其欲求錢乃曰道路之費當悉奉償實不煩入張曰傷寒法有死一晝夜復生者何惜一視之彥逢不得已自延入悲哭不止張揭面帛注視呼仵匠語之曰可嘗見夏月死者面色赤乎曰無然則汗不出而厥爾不死也幸無亟斂趨出取藥令以水三升煮其半灌病者戒曰善守之至夜半大瀉則活矣鋭舍於外館至夜半時守病者覺有聲勃勃然遺尿已滿席出穢惡鬥余一家大喜遽敲門呼張張曰吾今體倦莫能起然亦不必起明日方可進藥也天且明出門若將便旋然徑命駕歸鄭彥逢詣其室但留平胃散一帖而已其母服之數日良愈蓋張為彥逢有求錢之疑故不告而去紹興中流落入蜀王匱叔問之曰公之術古所謂十全者幾是歟曰未也僅能七八爾長子病診脈察色皆為熱極命煮承氣湯欲飲之將飲復疑至於再三如有掣吾肘者姑持杯以待兒忽發顫悸覆綿衾至四五始稍定汗出如洗明日脫然使吾藥入口則死矣安得為造妙世之庸醫學方書未知萬一自以為是籲可悲哉瘡瘍經驗云一老婦喉間及心中咬痛得食則止心思香燥之物偶夏天貓繞足而叫此婦素性愛貓取鹿脯嚼之喉中忽有物出即取之墮地頭足皆有五寸長許乃飢蟲也許智藏梁人也秦王俊有病上馳召之俊夜夢其亡妃崔氏泣曰本來相迎聞智藏將至當必相苦為之奈何明夜俊又夢崔氏曰妾得許矣當入靈府避之及智藏至為俊診脈曰疾已入心即當發癇不可救也果如言俊數日而死齊州有人病狂毒而歌曰五靈華蓋曉玲瓏天府由城汝府中惆悵此情言不盡一丸採蔔火吾宮又歌曰腳陽春人間二月雨和塵陽春踏盡秋風起腸斷人間白髮人後遇一道士作法治之乃曰夢中見一紅裳女子引入宮殿皆紅紫飾小姑令歌道士曰此症犯大麥毒女則心神小姑脾神也按醫經蘿蔔治麥毒故曰火吾官即以藥並蘿蔔食之愈陳鬥岩治一婦人病厥逆脈伏一日夜不蘇藥不能進陳視之曰可活也針手足陽明氣少回灸百會穴乃醒初大泣既而曰我被數人各執凶器逐潛入匱中聞小兒啼百計不能出又聞擊匱者隙見微明俄覺火燃其蓋遂躍出其擊匱者針也燃匱蓋者灸也韓光武寓洋洲得異疾與神物遇頗不省人事神氣恍惚或食或不食國醫陳易簡教服蘇合香丸即愈蓋蘇合香丸能辟邪故也潘溫叟治貴江令王齊夜夢與婦人謳歌飲酒晝不能食如是三歲溫叟治之疾益平則婦人色益沮飲酒益怠而謳歌不樂久之遂無所見溫叟曰疾雖衰然未愈也如夢男子青巾白衣者方瘥後果夢此能食源按此症屬於脾脾為坤土坤乃陰象因胃陽弱而坤陰用事故每夢見婦人歌者內經所云脾主歌是也至所夢惟酒何故故胃陽弱而本不思食酒乃虛而不實之物且又五穀所作乃脾之所好故夢中飲此也溫叟所治必補中益氣湯之類使胃陽漸動而坤陰之疾自退即易所謂坤至柔而動也剛至柔得剛而所夢已無自當能食而仍不思食何也因坤土之氣始復猶冬至一陽內復之候而氣之根原未旺所謂母虛子亦虛也蓋肺為脾之子而氣之原發於肺故肺主氣脾主運行因肺未旺而肝木未平脾仍失健運之職所以疾雖衰然未愈也乃初因病甚於坤故但夢婦人至坤陰之夢已退而肺肝所患未除故二臟之氣未和所以又當夢見青巾白衣男子青巾肝所屬也蓋肝屬木其色青故夢見青色之物肺屬金其色白故所夢白人然必是夢亦無方得病痊而食也或問內臟有病何故每見於夢豫曰人當寐時則神歸肝腎之所如一臟有病則一臟之氣不和不和則神不安不安則多夢如肝腎有病即夢見肝腎所屬之物即如前症脾病則夢脾臟所屬肺肝病則夢肺肝所屬然夢婦人而又謳歌飲酒夢男子而乃青巾白衣青巾乃肝臟所屬之物而以冠白人之首此中之奇特皆臟氣所為蓋氣之變化誠難測之又問如夢親戚長幼及所故之人所屬何臟豫曰神自病耳因用神又過神不能靜故有是夢耳羅謙甫治副使許可道脈來乍大乍小乍長乍短此乃氣血不勻邪傷正氣許云路至邯鄲夜夢一婦人所服青衣因用拳打下卻打自脅遂一點痛往來不止兼寒熱不能食羅曰此名鬼擊可服八毒赤丸遂與藥三粒臨臥服明旦下清水二斗而愈又陳青玉子因晝臥水仙廟中夢得一餅食之心懷憂慮復即痞滿飲食減少約一載余漸瘦弱腹脹如蠱屢醫不效羅診之問其病始末又非外感風寒內傷生冷因思李子豫八毒丸頗有相當遂與五七丸服之下清黃之涎鬥余漸漸氣調而以別藥理之數月良愈或問二症之夢屬何臟病乎豫曰此內感不正之氣因心氣不寧故感而成夢蓋邪氣入內正氣必傷致病患多端非辟邪不愈八毒赤丸因辟邪故也凡夢如是者脈必乍大乍小乍有乍無也呂滄洲治一在室女病不月諸醫療治皆不得其當視之腹大如娠求其色脈頗怪之曰汝病非有異夢即鬼靈所憑耳女不答趨入臥內密語其侍嫗曰我去夏過涼廟廡下薄暮遇木神心動是夕夢一男子如暮間所見者即我寢親狎由是感病我慚赧不敢以報醫言是也嫗以告呂呂曰汝面色乍赤乍白者愧也乍大乍小者祟也病與色脈相符雖劇無苦乃以桃仁煎下血類豚肝者六七枚俱有竅如魚目病已朱丹溪治一少年每夜有夢朱連診兩日觀其動止頭不仰舉但俯視不正必陰邪相留叩之不言其狀詢其僕乃言至廟見侍女以手撫摩久之不三日而寢疾朱令法師入廟毀其像小腹中泥土皆濕其疾遂瘳一女許嫁後夫經商二年不歸因不食困臥如癡無他病多向里臥朱診之肝脈弦出寸口曰此思想氣結也藥難獨治得喜可解不然令其怒脾至思過思則脾氣結而不食怒屬肝木木能剋土怒則氣升發而衝開脾氣矣令激之大怒而哭至三時許令慰解之與藥一服即索酒食朱曰思氣雖解必得喜則庶不再結乃詐以夫有書旦夕且歸後三月夫果歸而愈一婦患心中如火一燒便入小腸急去小便大便隨時亦出如是者三年求治脈滑數此相火送入小腸經朱以四物湯加炒黃柏小茴香木香四帖而安一婦病不知人稍蘇即號叫數四而復昏朱診之肝脈弦而且滑曰此怒心所為蓋得之怒而強酒也詰之不得於夫每夜必飲滿自酌解其懷朱治以清痰降火之劑而加香附以散肝經之郁乃愈一婦因久積憂患後心痛食減羸瘦渴不能飲心與頭更換而痛不寐大溲燥結與四物湯加陳皮甘草百餘帖不效朱曰此肺久為火所郁氣不得行血亦蓄塞遂成汙濁氣壅則頭痛血不流則心痛通一病也治肺當自愈遂效東垣青空膏例以黃芩細切酒浸透炒赤色為細末以熱白湯調下頭稍汗十餘帖汗漸通身而愈因其膝下無汗瘦弱脈澀小溲數大溲澀當補血以防後患以四物湯加陳皮甘草桃仁酒苓服之許文懿公因飲食作痰成心脾疼後觸冒風雪腿骨疼痛醫以烏附等藥治十餘年艾灸萬計又冒寒而病加胯難開合脾疼則胯痛止胯痛則脾疼止初因中脘有食積痰飲續冒寒濕抑遏經絡氣血不行津液不通痰飲注入骨節往來如潮湧上則為脾疼降下則為胯痛須湧泄之時深秋而以甘遂末一錢入豬腰子內煨食之連泄七行足便能步後嘔吐大作不食煩躁氣弱不語金匱云病人無寒熱而短氣不足以息者實也其病多年鬱結一旦泄之徒行動其猖狂之勢無他制御之藥故也仍以吐劑達其上焦次第治及中下二焦連日用瓜蒂藜蘆苦參俱吐不透而噦燥愈甚乃用附子尖三枚和醬水與蜜飲之方大吐膠痰一大桶以朴硝滑石黃芩石膏連翹等一斤濃煎置井中極冷飲之四日服四斤後腹滿二溲閉脈歇至於卯酉時夫卯酉為手足陽明之應此乃胃與大腸有積滯未盡當速瀉之群醫惑阻乃作紫雪二日服至五兩神思稍安腹亦減安後又小溲閉痛飲以蘿蔔子半盂得吐立通又小腹滿痛不可捫摸神思不佳以大黃牽牛等分水丸服至三百丸下如爛魚腸二升許神思稍安診其脈不歇又大溲迸痛小腹滿悶又與前丸百粒腹大絞痛腰胯重眼熱如火不言語瀉穢如柏油條一尺許肛門如火以水沃之自病半月不食不語此方啜稀粥始有生意數日平安自嘔吐至安日脈皆平常弦大次年行倒倉法痊愈一婦春末心脾疼自言腹滿手足寒兩膝間須綿裹火烘胸畏熱喜掀露風涼脈沉細澀稍重則絶輕似弦而短渴喜熱飲不食以草豆蔻丸加黃連滑石神麯為丸白朮為君陳皮為使作湯下百丸服至二斤而愈虞恆德治一婦四月間因多食青梅得痰因病日間胸膈中大如刀錐至晚氣胸中痛止而膝髂大痛蓋痰飲隨氣升降故也一醫作胃寒治用乾薑良薑官桂烏附丁沉輩與之病日劇加之口渴小水淋瀝虞診其六脈洪數而滑作清痰處治令其急烹竹瀝服三日口不渴小水亦不淋瀝但胸中與膝互痛如舊用蘿蔔子研汁與半碗吐痰半升至夜痛尤甚而厥正所謂引動其猖狂之勢耳次日用參蘆一兩逆流水煎服不吐又次日苦參煎湯服亦不吐又與附子尖桔梗蘆皆不吐一日清晨用黎蘆末一錢麝香少許酸漿水調與始得大吐至次日天明吐方定前後得痰乃稠飲一小桶其痛如脫調理而安汪石山治一女年十五病心悸常若有人捕之狀欲避而無所其母抱之於懷數婢護之於內猶恐恐然不能安臥醫者以為病心用安神丸鎮心丸不效汪診之脈皆細弱而緩曰此膽病也用溫膽湯服之而安或問人因心恐遂覺皮膚寒而起栗何故豫曰恐則氣下氣下則陽氣內入故若此恐定氣還便即如故又問前症亦因恐而病蓋恐則氣下而何故反用溫膽湯降其氣乎豫曰此乃少陽膽疾非因恐而病實因病而恐也蓋膽以溫為候虛則寒寒則氣滯滯則生痰痰生膽腑則神不歸舍故令人心恐不寐汪訒庵云此湯橘皮半夏生薑辛溫導痰即以之溫膽枳實破滯茯苓除飲甘草和中竹茹開胃土之郁清肺金之燥涼肺金即所以平甲木也膽為甲木如是則不寒不燥而膽常溫矣一人年逾七十忽病瞀昧但其目系漸急即閣眼昏懵如睡瞌者頭面有所觸皆不避少頃而蘇問之曰不知也一日或發二三次醫作風治病轉劇汪診其脈結止蘇則皆浮洪數不任尋按坐起則覺略小亦不甚數脈書曰數脈所主為熱其症為虛三日後再診左脈小而滑右脈大而滑獨肺部浮軟按之似蟄有聲與昨脈不同者虛之故也夫陽氣者清順調和之氣也或勞動過度或酒食過傷則擾動其陽變而為邪熱矣然脾胃以陽氣為主陽變為熱血必沸騰而越出於上矣昏暈者由熱熏灼故神昏運倒而類風也風之旋動轉運與火相類每覺下焦熱上胸膈壅塞而即發者脾脈從足入腹至胸令下焦熱上乃脾火也然胸膈心肺之分為陽之位清陽居上而邪熱擾之則陽不得暢達而心脾之神魂不免為之昏亂矣況五臟皆賴胃氣以培養胃受火邪則五臟皆無所稟而所藏之神亦無所依故肺之魄心之神肝之魂脾之意腎之志安得不隨之潰亂而昏瞀耶多發於午前後者乃陽氣所生之時脈如常但浮虛耳曰此虛病也蓋病發而脈結者血少氣劣耳蘇則氣血流通心志皆得所養故又脈如常也遂以十全大補湯去桂加麥冬陳皮而安其子問之汪曰三年之內可保無恙越此非豫所知果驗一人年十五色悴十二月間忽嘔瘀血一二碗隨止延小兒醫調治肌體尚弱常覺頭暈近三月間天熱途步出汗連日又勞倦日昃頓然昏暈不省人事手足擾亂顛倒將一時久方定次日亦然續後每午前後如期發一次近來漸早自辰至午連發二次漸發三四次比前稍輕發時自下焦熱上至胸壅塞則昏暈良久方蘇始疑為瘧成癇醫云火動又云痰症用牛黃清心丸以竹瀝薑汁磨服二次共四丸又與煎藥多清痰火之劑服後每日只發一次止則汗多口乾食少身熱時多涼時少汪脈之陽為邪擾不能用事故每至其時而輒發也且汗多津液泄口乾津液少醫用牛黃硃砂琥珀南星半夏等而復燥之是愈益其燥故暫止而復發不能去拔病根也因取參耆各二錢半遠志山楂川芎黃芩各七分天麻麥冬防風茯神各一錢甘草陳皮各五分歸身八分白朮一錢半煎服十餘劑而病不復作矣張子和治一婦年逾三十夜夢鬼交驚怕異常及見神堂陰府舟楫橋梁如此一十五年竟無妊娠巫祈覡禱無所不至針肌灸肉孔穴萬千黃瘦發熱引飲中滿足腫張曰陽火盛於上陰水盛於下鬼神者陰之靈神堂者陰之所舟楫橋梁水之用兩手寸脈皆沉而伏知胸中有痰實也凡三湧三泄三汗不旬日而無夢一月而孕一婦喜笑不休半年矣諸醫治之術窮張曰此易治耳以食鹽三兩成塊燒令通紅放冷研細以河水一大碗煎三五沸溫分三服須臾探吐出痰半升次服大劑黃連解毒湯不數日而笑止沈宗常治臨淄人自謂無病忽覺神思有異晚歌笑不節沈曰此陰火乘肝晚動宜以柔劑少加利之良愈莊先生治喜樂之極而病者莊切其脈為之失聲佯曰吾取藥去數日更不來病者愁泣辭其親友曰吾不久矣莊知其將愈慰之詰其故莊引素問曰懼勝喜可謂得元關者陳尚古簪云樓雜説云先達李其姓歸德府鹿邑人也世為農家癸卯獲雋於鄉伊父以喜故失聲大笑及春舉進士其笑彌甚歷十年擢諫垣遂成痼疾初猶間發後宵旦不能休大諫甚憂之從容語太醫院某因得所授命家人給乃父云大諫已歿乃父慟絶幾殞如是者十日病漸瘳佯為郵語云大諫治以趙大夫絶而復蘇李因不悲而笑症永不作矣蓋醫者意也過喜則傷濟以悲而仍和技進乎進矣薛己治一小兒喜笑常作不安面赤飲冷手足並熱先用黃連瀉心湯二服稍定又用六味地黃丸料煎服頓愈常服此丸則安月許不服仍前病作又服愈矣許學士治一婦人數次無故悲泣不止或謂之有祟祈讓請禱備至終不應許忽憶金匱有一症婦人臟躁悲傷欲哭象如鬼物神靈數欠伸者宜甘麥大棗湯急令治藥數劑而愈源按經云在臟為肺在志為悲又云精氣並於肺則悲是也蓋喜屬陽心主之怒屬陰肝主之婦人稟性陰柔故喜常少而怒常多或悲泣不止皆陰類也又云神有餘則笑神不足則悲所以人之幼時神魂未足善於啼哭也邵氏聞見録云州監軍病悲思郝因告其子曰法當得悸而愈時通守李宋卿御史嚴甚監軍內所憚也允與子請於宋卿一造問責其過失監軍惶怖汗出疾乃已紹興癸丑許待次四明有董生者患神氣不寧每臥則魂飛揚覺身體在床而神魂離體驚悸多魘通夕無寐更醫不效許為診視詢之曰醫作何病治董曰衆皆以為心病許曰以脈言之肝經受邪非心病也肝氣因虛邪氣襲之肝藏魂者也遊魂為變平人肝不受邪臥則魂歸於肝神靜而得寐今肝有邪魂不得歸是以臥則魂飛揚若離體也肝主怒故小怒則劇董欣然曰前此未之聞雖未服藥已覺沉病去體矣願求治之許曰公且持此説與衆醫議所治之方而徐質之閲旬日復至云醫遍議古今無與病相對者許即處珍珠母丸獨活湯以贈服一月而病悉除此方用珍珠母為君龍齒佐之珍珠母入肝經為第一龍齒虎睛今人例以為鎮心藥殊不知龍齒安魂虎睛定魄各言其類也蓋東方蒼龍木也屬肝而藏魂西方白虎金也屬肺而藏魄龍能變化故魂遊而不定虎能專靜故魄止而有守許謂治魄不寧者宜以虎睛治魂飛揚者宜以龍齒萬物皆有成理而不失在夫人達之而已徐仲子士緯曰家君肄業過勞場屋屢屈志堅不懈吐血盈盆虛羸骨立夜臥合睫則夢爭鬥轉鬥轉負恐畏之態無可名狀呼號之聲轟然若雷而不能騰出於口家人侍睡者莫不縮手伸舌如是者十年餘矣每五七夜必一發過勞則連發發尤猛歷訪師友多作心血不足治惟補心安神藥投之漠如也終莫識其為何症捫心苦思思每達旦更幾寒暑矣一日偶觀素問藏氣法時篇論有曰肝病令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之恍然警悟乃知為魂遊症也何言之夫夜臥屬氣於肝肝主藏血藏魂作文既言若衄血過度則魂失養惟是交睫若魔則夢爭鬥肝虛則膽怯故多負多恐也非峻補不奏功又思草木之劑不堪任重乃以鹿角膠三錢清晨酒溶服五日而睡臥安半月而肌肉生一月而神氣完始能出戶厥後每見血症虛憊者崩中眩暈者投前劑莫不響應夫人但知鹿角膠補虛之功勝於參耆而不知鹿角膠可以峻補肝血蓋血盛而魂自安也黃師文治一婦臥病三年狀若勞瘵諸醫以虛損治不瘥黃視之曰此食陰物時或遭驚也問之婦方自省悟也襄者食米團時忽有報其夫墜水由此一驚病延至今不能愈黃以青木香丸兼以利藥一帖與之須臾下一塊乃痰裹一米團耳當時被驚怏怏在下而不自覺也自後安康無恙一人驚氣入心絡喑不能言以密陀僧研細一匕許茶調服遂愈有一人伐木山中為狼所逐而得是疾或授此方而愈又一軍尉採藤入谷逢惡蛇而疾其症狀同亦用此藥治之而愈或問有鄰人年六十餘因怒而發聲其音遂失諸治不效約數年適食飯蒸白花百合食後聲忽有音連食旬日約二斤余其音如舊何故豫曰聲為怒發此火傷肺金百合補中兼清不寒不燥中和之品故得中病遊以春治一婦年三十餘忽午前吐酸水至未時心前作痛至申痛極暈絶交戌方醒如故每日如此醫治期年不愈遊治用二陳下氣之劑不效熟思其故忽記針經有云未申時氣行膀胱想有瘀血滯於此經使然遂用歸尾紅花各三錢乾漆五錢煎服吐止痛定暈亦不舉次日復進一服前症俱愈第三日前方加大黃桃仁飲之小便去凝血三四碗而痊滑伯仁治一婦氣實多恐忽大叫而欲厥蓋痰閉於上火起於下而上衝滑用香附五錢生甘草三錢川芎七錢童便薑汁炒煎服又用青黛人中白香附丸服稍愈後用吐法乃安再用導痰湯加薑汁黃連香附生薑下龍薈丸而安孫東宿治白仰云內眷每觸怒即暈厥必閉門合目靜坐不留一人在房中是皆冷汗出如雨氣息幾微越一時許醒如常原以頸生瘰癧多服草頭藥及專科用斑蝥等毒因而脾胃損元氣虧也年三十八尚未生育每日令二婢敲兩腿俟其熟睡乃已夜半心多驚跳指甲皆無血色經將行小腹先痛二日色紫有塊諸病雖如是而肌肉飲食卻如無事人孫診其脈而寸短弱左關大而有力右關左尺俱滑右尺沉微據脈肺氣虛肝木實胃中有痰之症也用六君子湯加丹參酒連青皮外與珍珠母丸及獨活湯調理而安喻嘉言治熊仲紓之子髫齡患一症飲食如常但脈細神呆氣奪色夭仲紓曰此病何也喻曰病名淹牒左傳所謂近女室晦即是此病彼因近女又遭室晦又不可為令郎受室晦之邪而未近女是可為也即以羚羊角犀角龍齒虎骨牡蠣鹿角霜人參黃耆等藥合末令以羊肉半斤煎濃汁調末少加牛黃丸服旬日而安源按左傳晉侯求醫於秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱公曰女不可近乎對曰天有六氣降生五味發為五色徵為五聲淫生六疾六氣者陰陽風雨晦明也陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾女陽物而晦時淫則生內熱惑蠱之疾今君不節不時能無及此乎龔子才治一男子忽低頭往暗處藏身不言亦不答以飲食俱背人竊食人見之則食不下諸人以為中邪用三牲祭之其物經宿乃妻食之亦如是諸醫莫識龔云必中鼠涎蓋鼠涎有大毒用吳茱萸塞貓口以貓涎自出將涎水令夫婦服之悉愈康熙年間豫里地藏庵有一僧名鶴松忽一日藏身暗處若見人或聞人語即驚避每進飲食必置之外室窺視無人然後出食之如是數年適有方士視之曰病名鼠魂鼠竊食為貓所逼因驚失其魂於食物間食之乃得是症治以安神藥外加貓涎和服而愈源按此症即中鼠涎云鼠魂者士好名故耳有一人痞塞不飲食心中常有所歉愛處暗地或倚門後見人即避似失志狀此為卑惵之病以血不足故爾人參養榮湯主之學士盧抱經為侍讀時每寤心必驚惕醫用安神補血之劑數年不效時值乾隆戊寅豫至燕京與公同寓初寓之日公即問豫曰此症何故使然豫視其脈獨左關弦數豫曰內經云臥而驚者屬肝臥則血歸於肝今血不靜血不歸肝故驚悸於臥也三因用羌活勝濕湯加柴胡治臥而多驚悸多魘溲者為風寒在少陽厥陰也非風藥行經不可今切肝脈弦數此風熱內侵肝臟正經所謂血不靜血不歸肝故也當用加味逍遙散涼血舒肝更加防風以祛其風使風散熱解血自歸經矣公從之服數劑而愈大生脈湯人參麥冬五味子天冬黃柏川歸牛膝紅花枸杞生地水煎服有汁加黃耆平胃散蒼朮泔水浸二錢厚朴陳皮甘草炙各一錢薑棗煎桃仁散桃仁大黃朴硝各一兩虻蟲半兩炒黑四味為末先以醇醋二升半銀石器內慢火煎取一升五合下大黃桃仁虻蟲等藥不住手攪良久出丸如梧子大前一日不晚食五更初溫酒吞下五丸清空膏黃芩酒炒黃連酒炒羌活防風各一兩柴胡各七錢川芎五錢甘草炙兩半為末每服三錢茶調如膏白湯送下紫雪黃金百兩寒水石石膏滑石磁石水煮三斤搗煎去滓入後藥升麻玄參各一斤甘草炙半斤羚羊角沉香木香各五兩犀角丁香一兩並搗銼入前藥汁中煎去渣入後藥朴硝硝石各二斤提淨入前藥汁中微火煎不住手將柳木攪候汁欲凝再加入後二味麝香一兩二錢研入前藥拌勻合成退火氣冷水調服每一二錢溫膽湯陳皮半夏茯苓甘草枳實竹茹薑棗煎導痰湯陳皮半夏南星赤苓枳實甘草水煎黃連解毒湯黃連二錢黃芩黃柏梔子各一錢水煎熱服甘麥大棗湯甘草三兩小麥一升大棗十枚水六升煮三升去渣分三服珍珠母丸珍珠母另研末五錢當歸熟地各一兩半人參茯苓酸棗仁柏子仁犀角各一兩沉香龍齒蜜丸梧子大辰砂為衣每服四五十丸金銀薄荷湯下日午及夜服獨活湯獨活羌活前胡細辛半夏棗仁沙參茯苓甘草五味子各等分每七錢薑三片烏梅一個不拘時煎服青木香丸青木香補骨脂蓽澄茄黑豆檳榔飯裹煨為末糊丸如豆百沸湯下二十丸蘇合香丸白朮青木香犀角香附硃砂水飛檀香訶梨勒煨去皮安息香酒熬膏沉香麝香丁香蓽茇各二兩龍腦薰陸香別研蘇合香各一兩上為末細研藥勻用安息香膏並蘇合香油和劑丸如彈子大以蠟櫝固緋絹當心帶之一切邪神不敢近清魂散澤蘭葉人參各三分川芎五分荊芥一錢炙甘草三分為末溫酒調下更宜燒漆器淬醋炭於床前使聞其氣人參養榮湯人參白朮黃耆甘草陳皮桂心當歸酒拌各一錢熟地五味子茯苓各七分遠志五分白芍錢半薑棗煎倒倉法黃牡牛肉肥嫩者二三十斤上牛肉須切碎洗淨用長流水桑柴火煮爛濾去渣取淨汁再入鍋中文武熬至琥珀色則成矣擇一靜室明快不通風者令病人先一夜不食坐其中每飲一鍾少時又飲積數十鍾病在上者必吐病在下者必利病在中者吐而且利視所出物可盡病根乃止吐利後必渴不得與湯其小便必長取以飲之名輪回酒非惟止渴兼滌余垢行後倦臥覺飢先與米飯次與稀粥三日後方與厚粥軟飯菜羹調養半月一月精神煥發沉疴悉痊矣須戒色欲半年一年戒牛肉數年四物湯見頭門八物湯見口門十全大補湯見手足門八毒赤丸見腹門六君子湯牛黃丸二方見目門
